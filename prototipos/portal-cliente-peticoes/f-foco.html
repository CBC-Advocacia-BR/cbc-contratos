<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
<meta name="robots" content="noindex, nofollow" />
<title>Meu Processo · CBC Advogados</title>
<meta name="theme-color" content="#f9fafb" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#161b20; --ink-soft:#3b4046; --ink-faint:#575b60;
    --paper:#f9fafb; --paper-2:#f2f4f5; --card:#FFFFFF; --hairline:#e2e5e7;
    --gold:#163d5b; --gold-soft:#c1d9f1; --gold-faint:#eff6fd; --gold-text:#163d5b;
    --ok:#00682a; --ok-bg:#dff6e3; --warn:#723f00; --warn-bg:#ffedcf;
    --due:#a9131f; --due-bg:#ffe4e1;
    --navy-grad:linear-gradient(155deg,#163d5b,#0f2233);
    --r:20px; --r-sub:16px; --r-in:12px;
    --shadow:0 1px 2px rgba(22,27,32,.04),0 12px 40px -18px rgba(22,27,32,.16);
    --shadow-soft:0 1px 2px rgba(22,27,32,.03),0 6px 22px -14px rgba(22,27,32,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  button:focus-visible,a:focus-visible,textarea:focus-visible,summary:focus-visible,.termo:focus-visible{outline:2.5px solid var(--gold);outline-offset:3px;border-radius:10px}
  body{
    font-family:'Lato',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--paper);color:var(--ink);
    font-size:1.0625rem;line-height:1.6;min-height:100dvh;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 22px calc(102px + env(safe-area-inset-bottom))}

  /* ---------- header enxuto ---------- */
  header{position:relative;padding:22px 0 2px;text-align:center}
  .a11y{position:absolute;top:14px;right:0;display:flex;gap:7px}
  .a11y button{width:44px;height:44px;border-radius:12px;border:1.5px solid var(--hairline);background:var(--card);
    color:var(--ink-soft);font-weight:700;cursor:pointer;font-family:'Lato';box-shadow:var(--shadow-soft);
    transition:border-color .15s,color .15s,transform .12s ease-out}
  .a11y button:hover{border-color:var(--gold);color:var(--ink)}
  .a11y button:active{transform:scale(.92)}
  .a11y button:first-child{font-size:0.6875rem}.a11y button:last-child{font-size:0.9375rem}
  .selo{
    width:46px;height:46px;margin:0 auto 10px;border-radius:50%;
    border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.0625rem;color:var(--gold);
    letter-spacing:.06em;background:linear-gradient(160deg,#fff,var(--gold-faint));
    box-shadow:var(--shadow-soft),0 0 0 4px var(--paper),0 0 0 5px var(--gold-soft);
  }
  .firma{font-size:0.625rem;letter-spacing:.30em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .oab-in{color:var(--gold-text)}
  .saud{font-family:'Cormorant Garamond',serif;font-weight:500;font-style:italic;
    font-size:1.0625rem;color:var(--ink-soft);margin-top:14px}
  .saud b{font-style:normal;font-weight:600;color:var(--ink)}

  /* ---------- o herói: a CALMA ---------- */
  .foco{margin-top:8px;text-align:center;padding:14px 4px 2px}
  .foco-rotulo{font-size:0.625rem;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:14px}
  .foco-marca{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:50%;
    margin:0 auto 18px;background:var(--ok-bg);border:1px solid var(--gold-soft)}
  .foco-marca.aviso{background:var(--gold-faint)}
  .foco-marca svg{width:30px;height:30px}
  .foco-titulo{font-family:'Cormorant Garamond',serif;font-weight:600;line-height:1.1;
    font-size:2.5rem;color:var(--ink);letter-spacing:-.01em}
  .foco-titulo.calmo{color:var(--ink)}
  .foco-sig{margin-top:16px;font-size:1.0625rem;color:var(--ink-soft);line-height:1.6;max-width:30rem;margin-left:auto;margin-right:auto}
  .foco-vez{display:inline-flex;align-items:center;gap:8px;margin-top:18px;
    font-size:0.78125rem;font-weight:700;letter-spacing:.04em;border-radius:999px;padding:9px 16px;text-transform:uppercase}
  .foco-vez.tribunal{background:var(--ok-bg);color:var(--ok)}
  .foco-vez.escritorio{background:var(--gold-faint);color:var(--warn)}
  .foco-vez .dot{width:7px;height:7px;border-radius:50%;background:currentColor}

  /* tranquilização central (nada a fazer) OU 1 item pendente */
  .resposta{margin-top:24px;border-radius:var(--r);background:var(--card);border:1px solid var(--hairline);
    box-shadow:var(--shadow);padding:20px 22px;text-align:left;display:flex;gap:14px;align-items:flex-start}
  .resposta .marca{flex:0 0 auto;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .resposta.calma .marca{background:var(--ok-bg)}
  .resposta.alerta .marca{background:var(--due-bg)}
  .resposta .marca svg{width:19px;height:19px}
  .resposta .corpo{flex:1}
  .resposta .ttl{font-size:1.0625rem;font-weight:700;color:var(--ink);line-height:1.4}
  .resposta.calma .ttl{color:var(--ok)}
  .resposta.alerta .ttl{color:var(--due)}
  .resposta .txt{margin-top:5px;font-size:0.9375rem;color:var(--ink-soft);line-height:1.6}
  .resposta .txt b{color:var(--ink)}
  .resposta-cta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:50px;margin-top:14px;
    border-radius:var(--r-in);background:var(--ink);color:#fff;border:none;font-family:'Lato';
    font-size:0.9375rem;font-weight:700;cursor:pointer;text-decoration:none;
    transition:transform .12s ease-out,background .2s}
  .resposta-cta:active{transform:scale(.97)}
  .resposta-cta svg{width:17px;height:17px;flex:0 0 auto}

  /* ouvir resumo — discreto, abaixo do herói */
  .ouvir-linha{text-align:center;margin-top:18px}
  .ouvir{display:inline-flex;align-items:center;gap:7px;font-size:0.8125rem;font-weight:700;min-height:44px;
    border:1.5px solid var(--hairline);border-radius:999px;padding:10px 18px;background:var(--card);color:var(--ink-soft);cursor:pointer;
    box-shadow:var(--shadow-soft);transition:transform .12s ease-out,border-color .15s,color .15s}
  .ouvir:active{transform:scale(.96)}
  .ouvir.tocando{border-color:var(--gold);color:var(--gold-text)}
  .ouvir.tocando svg{animation:tocando 1.1s ease-in-out infinite}
  @keyframes tocando{50%{opacity:.3;transform:scale(.85)}}

  /* selo verificado hoje — fino, sob o herói */
  .vigia{display:inline-flex;align-items:center;gap:7px;margin:18px auto 0;
    font-size:0.71875rem;font-weight:700;color:var(--ok);background:var(--ok-bg);border-radius:999px;padding:8px 15px}
  .vigia-row{text-align:center}
  .vigia .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulsa 2.4s infinite}
  @keyframes pulsa{0%,100%{box-shadow:0 0 0 0 rgba(0,104,42,.4)}50%{box-shadow:0 0 0 6px rgba(0,104,42,0)}}
  .vigia-prox{text-align:center;font-size:0.71875rem;color:var(--ink-faint);margin:8px auto 0;max-width:30rem;line-height:1.55;padding:0 8px}

  /* jornada: faixa FINA e discreta (não é o herói) */
  .faixa-jornada{margin-top:24px;padding:16px 8px 4px}
  .fj-track{display:flex;align-items:flex-start}
  .fj-step{flex:1;text-align:center;position:relative}
  .fj-step::before{content:'';position:absolute;top:5px;left:-50%;width:100%;height:2px;background:var(--hairline)}
  .fj-step:first-child::before{display:none}
  .fj-step.done::before{background:var(--gold-soft)}
  .fj-dot{width:12px;height:12px;border-radius:50%;margin:0 auto;background:var(--card);border:2px solid var(--hairline);position:relative;z-index:1}
  .fj-step.done .fj-dot{background:var(--gold-soft);border-color:var(--gold)}
  .fj-step.atual .fj-dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-faint);animation:pulsoAtual 2.8s ease-in-out infinite}
  @keyframes pulsoAtual{0%,100%{box-shadow:0 0 0 4px var(--gold-faint)}50%{box-shadow:0 0 0 7px rgba(22,61,91,.1)}}
  .fj-lbl{font-size:0.5625rem;letter-spacing:.02em;margin-top:8px;padding:0 1px;color:var(--ink-faint);font-weight:700;text-transform:uppercase;line-height:1.25;hyphens:auto;overflow-wrap:break-word}
  .fj-step.done .fj-lbl{color:var(--ink-soft)}
  .fj-step.atual .fj-lbl{color:var(--gold-text)}
  .fj-rapidez{margin-top:13px;text-align:center;font-size:0.71875rem;color:var(--gold-text);font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px}
  .fj-rapidez svg{width:13px;height:13px;flex:0 0 auto}

  /* ---------- carteira de casos (multi-processo, discreta) ---------- */
  .casos-titulo{font-size:0.625rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;
    text-align:center;margin:26px 0 12px}
  .casos{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 6px;scrollbar-width:none;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .casos::-webkit-scrollbar{display:none}
  .caso-card{
    flex:0 0 80%;max-width:340px;scroll-snap-align:center;text-align:left;cursor:pointer;
    background:var(--card);border:1.5px solid var(--hairline);border-radius:var(--r-sub);
    padding:14px 16px 13px;position:relative;font-family:'Lato';box-shadow:var(--shadow-soft);
    transition:border-color .18s,box-shadow .18s,opacity .18s,transform .12s ease-out;opacity:.82}
  .caso-card:active{transform:scale(.98)}
  .caso-card[aria-pressed="true"]{border-color:var(--gold);box-shadow:var(--shadow),0 0 0 1px var(--gold);opacity:1}
  .caso-topo{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .caso-num{font-size:0.625rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .caso-badge{font-size:0.5625rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-text);
    background:var(--gold-faint);border:1px solid var(--gold-soft);border-radius:999px;padding:2px 8px;white-space:nowrap}
  .caso-titulo{font-family:'Cormorant Garamond',serif;font-size:1.1875rem;font-weight:700;line-height:1.2;
    color:var(--ink);margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .caso-status{display:flex;align-items:center;gap:6px;margin-top:7px;font-size:0.75rem;font-weight:700}
  .caso-status .dotc{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .caso-fase{font-size:0.6875rem;color:var(--ink-faint);margin-top:4px}
  .caso-cnj{font-size:0.6875rem;color:var(--ink-faint);margin-top:7px;font-variant-numeric:tabular-nums;letter-spacing:.03em}
  .casos-dots{display:flex;justify-content:center;gap:6px;padding:4px 0 2px}
  .casos-dots span{width:6px;height:6px;border-radius:999px;background:var(--hairline);transition:background .25s,width .25s ease-out}
  .casos-dots span.on{background:var(--gold);width:18px}

  /* ---------- divulgação progressiva: accordions elegantes ---------- */
  .ver-detalhes{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;min-height:54px;margin-top:28px;
    border-radius:var(--r);background:var(--card);border:1.5px solid var(--hairline);box-shadow:var(--shadow-soft);
    font-family:'Lato';font-size:0.9375rem;font-weight:700;color:var(--ink-soft);cursor:pointer;
    transition:transform .12s ease-out,border-color .15s,color .15s}
  .ver-detalhes:hover{border-color:var(--gold-soft);color:var(--ink)}
  .ver-detalhes:active{transform:scale(.99)}
  .ver-detalhes svg{width:17px;height:17px;flex:0 0 auto;transition:transform .25s ease}
  .ver-detalhes[aria-expanded="true"] svg{transform:rotate(180deg)}

  .detalhes{margin-top:8px}
  .detalhes[hidden]{display:none}
  .acc{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-sub);margin-top:12px;overflow:hidden;box-shadow:var(--shadow-soft)}
  .acc>summary{padding:17px 18px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:13px;min-height:56px}
  .acc>summary::-webkit-details-marker{display:none}
  .acc-ico{flex:0 0 auto;width:38px;height:38px;border-radius:11px;background:var(--gold-faint);border:1px solid var(--gold-soft);
    display:flex;align-items:center;justify-content:center}
  .acc-ico svg{width:19px;height:19px;stroke:var(--gold-text)}
  .acc-meta{flex:1;min-width:0}
  .acc-meta .t{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:var(--ink);line-height:1.2}
  .acc-meta .s{font-size:0.8125rem;color:var(--ink-faint);margin-top:2px}
  .acc-mais{flex:0 0 auto;color:var(--gold);font-size:1.5rem;font-weight:300;line-height:1;transition:transform .25s ease}
  .acc[open] .acc-mais{transform:rotate(45deg)}
  @supports (interpolate-size: allow-keywords){
    :root{interpolate-size:allow-keywords}
    .acc::details-content{block-size:0;overflow:hidden;transition:block-size .3s ease,content-visibility .3s allow-discrete}
    .acc[open]::details-content{block-size:auto}
  }
  .acc-corpo{padding:2px 18px 18px}

  /* fase detalhada dentro do accordion */
  .fase-texto{font-size:0.9375rem;color:var(--ink-soft);line-height:1.65}
  .passos{margin-top:13px;padding:14px 15px;background:var(--gold-faint);border-radius:var(--r-in);font-size:0.9375rem;color:var(--ink)}
  .passos b{color:var(--gold-text);font-size:0.625rem;letter-spacing:.14em;text-transform:uppercase;display:block;margin-bottom:5px}
  .passos .prazo{color:var(--ink-faint)}
  .meta-proc{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--hairline)}
  .meta-proc div{font-size:0.71875rem;color:var(--ink-faint)}
  .meta-proc b{display:block;font-size:0.8125rem;color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}

  /* equipe em ação dentro do accordion */
  .equipe-stat{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:4px}
  .equipe-stat .c{background:var(--paper-2);border:1px solid var(--hairline);border-radius:var(--r-in);padding:14px 15px}
  .equipe-stat .rot{font-size:0.5625rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .equipe-stat .val{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:700;color:var(--gold-text);font-variant-numeric:tabular-nums;line-height:1.1;margin-top:3px}
  .equipe-stat .nota{font-size:0.6875rem;color:var(--ink-faint);margin-top:2px}
  .equipe-stat .nota b{color:var(--ok)}
  .extras{margin-top:12px;text-align:center;font-size:0.78125rem;color:var(--ink-soft);line-height:1.55}
  .extras .sep{color:var(--gold)}
  .mes-bloco{margin-top:14px;padding:14px 16px;background:var(--paper-2);border:1px solid var(--hairline);border-radius:var(--r-in)}
  .mes-bloco .rot{font-size:0.5625rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .mes-bloco .l{font-size:0.84375rem;color:var(--ink-soft);margin-top:5px}
  .mes-bloco .l b{color:var(--ink)}
  .ultima{margin-top:14px;display:flex;gap:11px;align-items:flex-start;padding-top:14px;border-top:1px dashed var(--hairline)}
  .ultima svg{flex:0 0 auto;margin-top:2px;width:20px;height:20px;stroke:var(--gold)}
  .ultima .rot{font-size:0.5625rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .ultima .l{font-size:0.875rem;margin-top:3px}
  .of-nota{margin-top:14px;text-align:center;font-size:0.75rem;color:var(--ink-faint);line-height:1.5}
  .of-nota b{color:var(--gold-text)}
  .prova-fase{margin-top:14px;text-align:center;font-size:0.78125rem;color:var(--ink-soft);line-height:1.55}
  .prova-fase b{color:var(--gold-text)}

  /* linha do tempo dentro do accordion */
  .tl-intro{font-size:0.8125rem;color:var(--ink-soft);margin:0 2px 16px;line-height:1.6}
  .tl-intro b{color:var(--ink)}
  .timeline{position:relative;padding-left:26px}
  .timeline::before{content:'';position:absolute;left:7px;top:7px;bottom:14px;width:1.5px;
    background:linear-gradient(180deg,var(--gold) 0%,var(--hairline) 70%,transparent)}
  .evento{position:relative;padding:0 0 22px}
  .evento::before{content:'';position:absolute;left:-23px;top:5px;width:11px;height:11px;border-radius:50%;
    background:var(--card);border:2.5px solid var(--gold);box-shadow:0 0 0 3px var(--paper)}
  .evento:first-child::before{background:var(--gold)}
  .evento:last-child{padding-bottom:0}
  .evento .data{font-size:0.6875rem;font-weight:700;letter-spacing:.1em;color:var(--gold-text);font-variant-numeric:tabular-nums}
  .evento .txt{margin-top:3px;font-size:0.9375rem;color:var(--ink);line-height:1.55}
  .evento .fonte{margin-top:3px;font-size:0.6875rem;color:var(--ink-faint);letter-spacing:.04em}
  .ver-mais{margin:14px 0 0;background:var(--card);border:1.5px solid var(--hairline);border-radius:999px;
    padding:11px 18px;font-size:0.8125rem;font-weight:700;color:var(--ink-soft);cursor:pointer;min-height:46px;width:100%;
    transition:transform .12s ease-out,border-color .15s}
  .ver-mais:active{transform:scale(.98)}
  .termo{border-bottom:1.5px dotted var(--gold);cursor:pointer;position:relative}
  .termo::after{content:'';position:absolute;inset:-12px -8px}

  /* contrato dentro do accordion */
  .ac-linha{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:11px 0;border-bottom:1px dashed var(--hairline);font-size:0.90625rem;color:var(--ink-soft)}
  .ac-linha:last-child{border-bottom:none}
  .ac-linha b{color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}
  .ac-linha small{color:var(--ink-faint)}
  .barra{height:8px;border-radius:5px;background:var(--gold-faint);overflow:hidden;margin-top:12px}
  .barra i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--gold),var(--ok))}
  .barra-nota{margin-top:6px;font-size:0.75rem;color:var(--ink-faint)}

  /* card de evento crítico (sentença favorável) — sempre visível, é importante */
  .evento-card{margin-top:18px;border-radius:var(--r);background:var(--card);box-shadow:var(--shadow);border:1.5px solid var(--gold-soft);padding:18px 20px}
  .evento-card .rot{display:inline-flex;align-items:center;gap:7px;font-size:0.625rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-text);font-weight:700}
  .evento-card .rot::before{content:'';width:18px;height:2px;border-radius:2px;background:var(--gold)}
  .evento-tit{font-family:'Cormorant Garamond',serif;font-size:1.375rem;font-weight:600;color:var(--ink);line-height:1.2;margin-top:5px}
  .evento-txt{margin-top:9px;font-size:0.90625rem;line-height:1.6;color:var(--ink-soft)}
  .evento-txt b{color:var(--ink)}
  .evento-data{margin-top:11px;font-size:0.6875rem;font-weight:700;letter-spacing:.08em;color:var(--gold-text);font-variant-numeric:tabular-nums}

  /* ---------- pagamentos ---------- */
  .secao-titulo{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:700;line-height:1.2;margin:0 2px 2px}
  .secao-sub{font-size:0.84375rem;color:var(--ink-soft);margin:0 2px 16px;line-height:1.55}
  .resumo{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:0}
  .resumo .card{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-sub);box-shadow:var(--shadow-soft);padding:16px}
  .resumo .rot{font-size:0.5625rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:5px}
  .resumo .valor{font-family:'Cormorant Garamond',serif;font-size:1.6875rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.15}

  // status humano GRANDE — o herói

  // ============ números que sobem ============
  function countUp(raiz){
    if(window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    raiz.querySelectorAll('[data-count]').forEach(function(el){
      var fim=+el.dataset.count||0; if(fim<2) return;
      var t0=null;
      function tick(t){ if(!t0)t0=t; var k=Math.min(1,(t-t0)/650); var e=1-Math.pow(1-k,3);
        el.textContent=Math.round(fim*(0.25+0.75*e)).toLocaleString('pt-BR');
        if(k<1)requestAnimationFrame(tick); else el.textContent=fim.toLocaleString('pt-BR'); }
      requestAnimationFrame(tick);
    });
  }

  // ============ ouvir resumo (voz nativa) ============
  var falando=false;
  function ouvirResumo(){
    if(!('speechSynthesis' in window)){ toast('Seu aparelho não suporta leitura em voz'); return; }
    var btn=$('ouvir-resumo');
    if(falando){ speechSynthesis.cancel(); falando=false; if(btn)btn.classList.remove('tocando'); return; }
    var ps=DADOS.processos||[]; var p=ps[Math.min(state.proc,ps.length-1)]; if(!p) return;
    var sh=statusHumano(p);
    var partes=['Situação do seu caso: '+sh.txt+'.','Fase atual: '+(p.fase||'em andamento')+'.'];
    if(!DADOS.tem_vencida) partes.push('Não há nada pendente do seu lado. Você não precisa fazer nada agora.');
    else partes.push('Há um boleto vencido na aba Pagamentos — é o único item que depende de você.');
    if(p.atividades&&p.atividades.vez==='tribunal') partes.push('Neste momento aguardamos o tribunal.');
    if(p.atividades&&p.atividades.vez==='escritorio') partes.push('Nossa equipe está trabalhando no seu caso agora.');
    if((p.andamentos||[])[0]) partes.push('Última movimentação, em '+dataBR(p.andamentos[0].data)+': '+p.andamentos[0].texto+'.');
    partes.push('Qualquer novidade, este portal e a nossa equipe avisam você.');
    var u=new SpeechSynthesisUtterance(partes.join(' '));
    u.lang='pt-BR'; u.rate=0.96;
    u.onend=function(){ falando=false; if(btn)btn.classList.remove('tocando'); };
    falando=true; if(btn)btn.classList.add('tocando');
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }

  // ============ lembrete de parcela no calendário ============
  function agendaCalendario(b){
    var d=String(b.vencimento||'').slice(0,10); if(!d) return;
    var dt=d.replace(/-/g,'');
    var tit='Parcela CBC Advogados — R$ '+(typeof b.valor==='number'?b.valor.toFixed(2).replace('.',','):b.valor);
    var det='Pagamento de honorários CBC Advogados. Boleto e PIX no seu portal.';
    if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){
      var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CBC Advogados//Portal//PT\r\nBEGIN:VEVENT\r\n'+
        'UID:cbc-'+dt+'-'+Math.random().toString(36).slice(2)+'\r\nDTSTART;VALUE=DATE:'+dt+'\r\n'+
        'SUMMARY:'+tit.replace(/,/g,'\\,')+'\r\nDESCRIPTION:'+det.replace(/,/g,'\\,')+'\r\n'+
        'BEGIN:VALARM\r\nTRIGGER:-PT15H\r\nACTION:DISPLAY\r\nDESCRIPTION:'+tit.replace(/,/g,'\\,')+'\r\nEND:VALARM\r\nEND:VEVENT\r\nEND:VCALENDAR';
      var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='parcela-cbc-'+d+'.ics';
      document.body.appendChild(a); a.click(); a.remove();
      toast('Abra o arquivo para salvar no seu Calendário');
    } else {
      window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(tit)+'&dates='+dt+'/'+dt+'&details='+encodeURIComponent(det),'_blank');
    }
  }

  // ============ extrato PDF (gerado no aparelho) ============
  function carregaJsPDF(){
    return new Promise(function(res,rej){
      if(window.jspdf) return res();
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload=res; s.onerror=function(){rej(new Error('sem conexão'));};
      document.head.appendChild(s);
    });
  }
  function geraExtratoPDF(){
    var btn=$('btn-extrato'); if(btn){btn.disabled=true;btn.textContent='Gerando…';}
    carregaJsPDF().then(function(){
      var doc=new window.jspdf.jsPDF();
      var W=doc.internal.pageSize.getWidth(); var y=20;
      doc.setFont('times','bold'); doc.setFontSize(16); doc.setTextColor('#161b20');
      doc.text('CBC Advogados',W/2,y,{align:'center'}); y+=6;
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor('#575b60');
      doc.text('Conforto, Bergonsi & Cavalari · OAB/SP 55227 · Americana-SP',W/2,y,{align:'center'}); y+=10;
      doc.setDrawColor('#163d5b'); doc.line(20,y,W-20,y); y+=10;
      doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor('#161b20');
      doc.text('Extrato de honorários',20,y); y+=6;
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor('#3b4046');
      var c=DADOS.cliente||{};
      doc.text('Cliente: '+(c.nome||''),20,y); y+=5;
      doc.text('Emitido em '+new Date().toLocaleString('pt-BR')+' pelo Portal do Cliente',20,y); y+=10;
      var pg=DADOS.pagamentos||{}; var r=pg.resumo||{};
      doc.setFont('helvetica','bold'); doc.setTextColor('#00682a');
      doc.text('Total pago: '+BRL.format(r.total_pago||0)+'  ('+(r.qtd_pagos||0)+' pagamento'+((r.qtd_pagos||0)===1?'':'s')+')',20,y); y+=6;
      doc.setTextColor('#723f00');
      doc.text('Em aberto: '+BRL.format(r.total_pendente||0)+'  ('+(r.qtd_pendentes||0)+' parcela'+((r.qtd_pendentes||0)===1?'':'s')+')',20,y); y+=10;
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor('#161b20');
      doc.text('Pago em',20,y); doc.text('Descrição',55,y); doc.text('Valor',W-20,y,{align:'right'});
      doc.setDrawColor('#e2e5e7'); doc.line(20,y+1.5,W-20,y+1.5); y+=7;
      doc.setFont('helvetica','normal'); doc.setTextColor('#3b4046');
      (pg.pagos||[]).forEach(function(b){
        if(y>270){doc.addPage();y=20;}
        doc.text(dataBR(b.pago_em||b.vencimento),20,y);
        doc.text(String(b.descricao||'Parcela de honorários').slice(0,52),55,y);
        doc.text(BRL.format(b.valor||0),W-20,y,{align:'right'}); y+=6;
      });
      if(!(pg.pagos||[]).length){doc.text('Nenhum pagamento registrado ainda.',20,y);y+=6;}
      y+=6; doc.setFontSize(7.5); doc.setTextColor('#575b60');
      doc.text('Documento informativo gerado automaticamente.',20,y);
      doc.save('extrato-honorarios-cbc.pdf');
      if(btn){btn.disabled=false;btn.textContent='Baixar extrato em PDF';}
    }).catch(function(){
      toast('Não foi possível gerar agora — verifique sua conexão');
      if(btn){btn.disabled=false;btn.textContent='Baixar extrato em PDF';}
    });
  }

  // ============ render orquestrador ============
  function render(){
    var alvo=$('conteudo');
    if(alvo._primeira===undefined) alvo._primeira=true;
    var prm=window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(!prm && !state.semEntra && alvo.innerHTML && !alvo._primeira){
      alvo.style.opacity='0';
      clearTimeout(alvo._fade);
      alvo._fade=setTimeout(function(){ pinta(); alvo.style.opacity='1'; }, 170);
      return;
    }
    alvo._primeira=false;
    pinta();

    function pinta(){
      var mudouAba = alvo._aba !== state.aba; alvo._aba = state.aba;
      alvo.innerHTML = state.aba==='proc' ? vProcesso() : state.aba==='pag' ? vPagamentos() : state.aba==='faq' ? vFaq() : vAcordo();
      if(!state.semEntra){
        alvo.querySelectorAll(':scope > .entra').forEach(function(el,i){ el.style.animationDelay = Math.min(i*55,440)+'ms'; });
      }
      $('nav-proc').setAttribute('aria-pressed', state.aba==='proc');
      $('nav-pag').setAttribute('aria-pressed', state.aba==='pag');
      $('nav-acordo').setAttribute('aria-pressed', state.aba==='acordo');
      $('nav-faq').setAttribute('aria-pressed', state.aba==='faq');

      // === divulgação progressiva ===
      var btnDet=$('btn-detalhes'), det=$('detalhes');
      if(btnDet && det){
        btnDet.addEventListener('click', function(){
          var aberto = det.hidden;
          det.hidden = !aberto;
          btnDet.setAttribute('aria-expanded', String(aberto));
          $('lbl-detalhes').textContent = aberto ? 'Ocultar os detalhes' : 'Ver os detalhes do meu caso';
          if(aberto) requestAnimationFrame(function(){ det.querySelector('.acc').scrollIntoView({behavior:'smooth',block:'nearest'}); });
        });
      }

      // ir para pagamentos a partir do herói
      var irPag=$('ir-pagamentos');
      if(irPag) irPag.addEventListener('click', function(){ state.aba='pag'; render(); });

      // ir para o Acerto a partir do aviso discreto em "Meu caso"
      var irAcerto=$('ir-acerto');
      if(irAcerto) irAcerto.addEventListener('click', function(){ state.aba='acordo'; render(); });

      // ouvir resumo
      var ouvirBtn=$('ouvir-resumo'); if(ouvirBtn) ouvirBtn.addEventListener('click', ouvirResumo);

      // extrato + calendario
      var extBtn=$('btn-extrato'); if(extBtn) extBtn.addEventListener('click', geraExtratoPDF);
      alvo.querySelectorAll('[data-cal]').forEach(function(el){
        el.addEventListener('click', function(){ var b=DADOS.pagamentos.pendentes[+el.dataset.cal]; if(b) agendaCalendario(b); });
      });

      // pergunte aqui
      var pqBtn=$('pq-envia');
      if(pqBtn) pqBtn.addEventListener('click', function(){
        var txt=($('pq-texto').value||'').trim();
        if(txt.length<5){ toast('Escreva sua pergunta com um pouco mais de detalhe'); return; }
        (DADOS.minhas_perguntas = DADOS.minhas_perguntas||[]).unshift({ pergunta:txt, status:'pendente', criado_em:new Date().toISOString() });
        toast('Pergunta enviada — respondemos em até 1 dia útil');
        $('pq-texto').value=''; state.semEntra=true; render();
      });

      // glossário no toque
      alvo.querySelectorAll('.termo').forEach(function(el){
        function abreDef(){ var g=(DADOS.glossario||[])[+el.dataset.gi]; if(g) toast('“'+g.t+'”: '+g.d, 7000); }
        el.addEventListener('click', abreDef);
        el.addEventListener('keydown', function(ev){ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); abreDef(); } });
      });

      // ver mais (timeline) — mantém aberto o accordion
      var vm=$('ver-mais'); if(vm) vm.addEventListener('click', function(){ state.expandTL=!state.expandTL; state.semEntra=true; var det=$('detalhes'); var aberto=det&&!det.hidden; render(); if(aberto){ var d=$('detalhes'); if(d){ d.hidden=false; var b=$('btn-detalhes'); if(b){b.setAttribute('aria-expanded','true'); $('lbl-detalhes').textContent='Ocultar os detalhes';} } } });

      // contadores
      countUp(alvo);

      // carteira de casos
      alvo.querySelectorAll('[data-proc]').forEach(function(el){
        el.addEventListener('click', function(){
          state.proc=+el.dataset.proc; state.expandTL=false; state.semEntra=true;
          try{ localStorage.setItem(CASO_KEY, String(state.proc)); }catch(e){}
          render();
          window.scrollTo({top:0,behavior:'smooth'});
        });
      });
      var casos=$('casos');
      if(casos){
        var sel=casos.querySelector('[aria-pressed="true"]');
        if(sel) casos.scrollLeft=Math.max(0, sel.offsetLeft-(casos.clientWidth-sel.clientWidth)/2);
        casos.addEventListener('scroll', function(){
          if(casos._raf) return;
          casos._raf=requestAnimationFrame(function(){
            casos._raf=null;
            var cards=casos.querySelectorAll('.caso-card'); if(!cards.length) return;
            var centro=casos.scrollLeft+casos.clientWidth/2, melhor=0, dist=1e9;
            cards.forEach(function(c,i){ var m=Math.abs((c.offsetLeft+c.clientWidth/2)-centro); if(m<dist){dist=m;melhor=i;} });
            document.querySelectorAll('#casos-dots span').forEach(function(d,i){ d.classList.toggle('on', i===melhor); });
          });
        }, {passive:true});
      }

      // copiar PIX
      alvo.querySelectorAll('[data-pix]').forEach(function(el){
        el.addEventListener('click', function(){
          var b=DADOS.pagamentos.pendentes[+el.dataset.pix];
          (navigator.clipboard?navigator.clipboard.writeText(b.pix):Promise.reject()).then(function(){
            el.classList.add('copiado'); el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="m5 13 4 4L19 7"/></svg>PIX copiado!';
            toast('Código PIX copiado — cole no app do seu banco');
            setTimeout(function(){ el.classList.remove('copiado'); el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copiar PIX'; }, 3200);
          }).catch(function(){ toast('Não foi possível copiar — segure para selecionar'); });
        });
      });

      if(mudouAba){ window.scrollTo({top:0,behavior:'instant'}); }
      state.semEntra=false;
    }
  }

  // ============ nav ============
  $('nav-proc').addEventListener('click', function(){ state.aba='proc'; render(); });
  $('nav-pag').addEventListener('click', function(){ state.aba='pag'; render(); });
  $('nav-acordo').addEventListener('click', function(){ state.aba='acordo'; render(); });
  $('nav-faq').addEventListener('click', function(){ state.aba='faq'; render(); });

  // ============ boot ============
  function boot(){
    var c=DADOS.cliente||{};
    // Acerto disponível se QUALQUER caso tiver prestação de contas / levantamento
    var temAcordo=(DADOS.processos||[]).some(temPrestacao);

    // multi-processo: lembra o caso, mas inicia no Caso 1 se nada salvo
    try{
      var lembrado=+localStorage.getItem(CASO_KEY);
      if(!isNaN(lembrado) && lembrado>=0 && lembrado<(DADOS.processos||[]).length) state.proc=lembrado;
    }catch(e){}

    var hora=new Date().getHours();
    var sauda=hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite';
    $('saudacao').innerHTML=sauda+', <b>'+esc(c.primeiro_nome||'cliente')+'</b>.';

    // autoridade (rodapé)
    var inst=DADOS.instituicao;
    if(inst){
      $('autoridade').innerHTML='Acompanhamos <b>'+Number(inst.processos_ativos||0).toLocaleString('pt-BR')+'</b> processos ativos · '+
        '<b>'+Number(inst.tarefas_ano||0).toLocaleString('pt-BR')+'</b> tarefas concluídas em '+(new Date().getFullYear())+' · '+
        '<b>'+Number(inst.casos_exito||0).toLocaleString('pt-BR')+'</b> casos conduzidos até o êxito';
    }
    var FRASES=[
      'Seu caso tem nome, rosto e responsável — não é um número.',
      'Verificamos cada processo todos os dias, automaticamente.',
      'Você não precisa entender de Direito: explicar é a nossa parte.',
      'Cada prazo do seu caso é monitorado pela nossa equipe.',
      'Transparência não é cortesia — é compromisso.'
    ];
    var doy=Math.floor((Date.now()-Date.UTC(new Date().getFullYear(),0,0))/86400000);
    $('frase-fe').textContent='“'+FRASES[doy%FRASES.length]+'”';

    // badge de pendência
    var pend=(DADOS.pagamentos&&DADOS.pagamentos.resumo&&DADOS.pagamentos.resumo.qtd_pendentes)||0;
    if(pend){ var bd=$('badge-pend'); bd.textContent=pend; bd.hidden=false; }

    // aba acordo só se existir (aqui null → fica oculta)
    if(temAcordo){
      $('nav-acordo').hidden=false;
      document.querySelector('.nav-inner').classList.add('quatro');
      $('lbl-proc').textContent='Caso';
    }

    $('nav').hidden=false;
    $('rodape').hidden=false;
    render();
  }

  boot();
})();
</script>
