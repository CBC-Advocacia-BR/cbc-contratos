<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Meu Processo · CBC Advogados</title>
<meta name="theme-color" content="#142A43" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#142A43; --ink-soft:#3D5570; --ink-faint:#5A6D82;
    --paper:#FBFAF7; --paper-2:#F7F3EB; --card:#FFFFFF; --hairline:#E7E0D2;
    --gold:#B99249; --gold-soft:#E7D9B8; --gold-faint:#F4EDDD; --gold-text:#7E5F26;
    --navy:#142A43; --navy-2:#1B3A5C;
    --ok:#5C7A4E; --ok-text:#4C6840; --ok-bg:#EDF2E6; --warn:#8F5A18; --warn-bg:#FBF1DE;
    --due:#8A5A2D; --due-bg:#F4E8DC;
    --r:20px; --r-sub:16px; --r-in:12px;
    --shadow:0 1px 2px rgba(20,42,67,.05),0 10px 34px -16px rgba(20,42,67,.18);
    --shadow-soft:0 1px 2px rgba(20,42,67,.04),0 4px 18px -10px rgba(20,42,67,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  button:focus-visible,a:focus-visible,textarea:focus-visible,summary:focus-visible,.termo:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}
  body{
    font-family:'Lato',-apple-system,sans-serif;background:var(--paper);color:var(--ink);
    font-size:1rem;line-height:1.55;min-height:100dvh;
    background-image:radial-gradient(rgba(185,146,73,.045) 1px,transparent 1px);
    background-size:24px 24px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 18px calc(100px + env(safe-area-inset-bottom))}

  /* ---------- header ---------- */
  header{position:relative;padding:18px 0 2px;text-align:center}
  .a11y{position:absolute;top:8px;right:0;display:flex;gap:6px}
  .a11y button{width:44px;height:44px;border-radius:11px;border:1.5px solid var(--hairline);background:var(--card);
    color:var(--ink-soft);font-weight:700;cursor:pointer;font-family:'Lato';
    transition:border-color .15s,color .15s,transform .12s ease-out}
  .a11y button:hover{border-color:var(--gold);color:var(--ink)}
  .a11y button:active{transform:scale(.93)}
  .a11y button:first-child{font-size:0.6875rem}.a11y button:last-child{font-size:0.9375rem}
  .brandline{display:flex;align-items:center;justify-content:center;gap:9px}
  .selo{
    width:38px;height:38px;border-radius:50%;flex:0 0 auto;
    border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:700;font-size:0.9375rem;color:var(--gold-text);
    letter-spacing:.04em;background:linear-gradient(160deg,#fff, var(--gold-faint));
    box-shadow:0 0 0 3px var(--paper),0 0 0 4px var(--gold-soft);
  }
  .firma{font-size:0.625rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;text-align:left}
  .firma .oab-in{color:var(--gold-text)}
  h1.ola{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.75rem;line-height:1.12;margin-top:14px}
  h1.ola em{font-style:italic;color:var(--gold-text)}
  .sub{color:var(--ink-soft);font-size:0.84375rem;margin-top:3px}
  /* vigilância */
  .vigia{display:inline-flex;align-items:center;justify-content:center;gap:7px;margin:12px auto 0;
    font-size:0.71875rem;font-weight:700;color:var(--ok-text);background:var(--ok-bg);border-radius:999px;padding:7px 15px}
  .vigia .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulsa 2.2s infinite}
  @keyframes pulsa{0%,100%{box-shadow:0 0 0 0 rgba(92,122,78,.45)}50%{box-shadow:0 0 0 5px rgba(92,122,78,0)}}
  .vigia-prox{text-align:center;font-size:0.71875rem;color:var(--ink-faint);margin:7px auto 0;max-width:34rem;line-height:1.5;padding:0 14px}

  /* ---------- seletor de casos (chips) ---------- */
  .casos-wrap{margin-top:16px}
  .casos-resumo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.9375rem;
    color:var(--ink-soft);text-align:center;margin-bottom:9px}
  .casos-resumo b{color:var(--gold-text);font-style:normal}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 4px;scrollbar-width:none;scroll-snap-type:x proximity}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;scroll-snap-align:start;cursor:pointer;text-align:left;
    background:var(--card);border:1.5px solid var(--hairline);border-radius:999px;
    padding:9px 15px 9px 13px;display:flex;align-items:center;gap:9px;min-height:46px;
    transition:border-color .18s,box-shadow .18s,transform .12s ease-out;font-family:'Lato'}
  .chip:active{transform:scale(.97)}
  .chip[aria-pressed="true"]{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
  .chip .cdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .chip .ctit{font-size:0.8125rem;font-weight:700;color:var(--ink);white-space:nowrap}
  .chip .csub{font-size:0.65625rem;color:var(--ink-faint);white-space:nowrap;letter-spacing:.02em}
  .chip .cnov{font-size:0.5625rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-text);
    background:var(--gold-faint);border:1px solid var(--gold-soft);border-radius:999px;padding:2px 7px;white-space:nowrap}

  /* ---------- ANEL HERÓI ---------- */
  .ring-card{margin-top:14px;padding:26px 20px 22px;text-align:center;position:relative;
    background:linear-gradient(180deg,#fff 0%,#fff 62%,var(--paper-2) 100%);
    border:1px solid var(--hairline);border-radius:24px;box-shadow:var(--shadow)}
  .ring-rotulo{font-size:0.625rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .ring-holder{position:relative;width:228px;height:228px;margin:14px auto 4px}
  .ring-holder svg{display:block;width:100%;height:100%;transform:rotate(-90deg)}
  /* O estado FINAL do anel vem do atributo stroke-dashoffset (markup), authoritative.
     A entrada e uma animacao CSS declarativa (sem depender de rAF/JS): parte de
     --ring-c (=circunferencia, vazio) ate o valor final pintado. Se a animacao
     nao rodar (aba oculta, reduced-motion), o anel ja descansa no valor correto. */
  .ring-prog.ring-anima{animation:anelEntra 1.1s cubic-bezier(.22,1,.36,1) both}
  @keyframes anelEntra{from{stroke-dashoffset:var(--ring-c)}}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 30px}
  .ring-pct{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:2.25rem;line-height:1;color:var(--gold-text);font-variant-numeric:tabular-nums}
  .ring-pct small{font-size:1.0625rem;font-weight:600;margin-left:1px}
  .ring-fase{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.375rem;line-height:1.12;color:var(--ink);margin-top:6px}
  .ring-quadro{margin-top:6px;font-size:0.625rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
  .ring-ritmo{display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    font-size:0.71875rem;font-weight:700;color:var(--gold-text);background:var(--gold-faint);
    border:1px solid var(--gold-soft);border-radius:999px;padding:6px 13px}
  .ring-ritmo svg{width:13px;height:13px;flex:0 0 auto}
  .ring-marcos{display:flex;justify-content:space-between;gap:2px;margin:16px 4px 0}
  .ring-marco{flex:1;text-align:center;font-size:0.5625rem;line-height:1.2;font-weight:700;text-transform:uppercase;
    letter-spacing:.01em;color:var(--ink-faint);position:relative;padding-top:14px}
  .ring-marco::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:9px;height:9px;border-radius:50%;background:var(--card);border:2px solid var(--hairline)}
  .ring-marco.done{color:var(--ink)}
  .ring-marco.done::before{background:var(--gold);border-color:var(--gold)}
  .ring-marco.atual{color:var(--gold-text)}
  .ring-marco.atual::before{box-shadow:0 0 0 3px var(--gold-faint)}
  .ring-prova{margin-top:14px;font-size:0.75rem;color:var(--ink-soft);line-height:1.5;padding:0 6px}
  .ring-prova b{color:var(--gold-text)}

  /* ---------- cards arejados ---------- */
  .stack{margin-top:14px;display:flex;flex-direction:column;gap:12px}
  .card{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r);box-shadow:var(--shadow-soft);overflow:hidden}
  .rotulo{font-size:0.625rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .bloco{padding:18px 20px}
  .bloco-tit{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;line-height:1.18;margin-top:5px;color:var(--ink)}
  .bloco-txt{margin-top:9px;font-size:0.90625rem;color:var(--ink-soft)}
  /* próximo passo */
  .passo-card{display:flex;gap:13px;align-items:flex-start;padding:18px 20px}
  .passo-ic{width:38px;height:38px;border-radius:11px;flex:0 0 auto;background:var(--gold-faint);
    border:1px solid var(--gold-soft);display:flex;align-items:center;justify-content:center}
  .passo-ic svg{width:19px;height:19px;color:var(--gold-text)}
  .passo-card .corpo{flex:1}
  .passo-card .corpo p{margin-top:4px;font-size:0.90625rem;color:var(--ink)}
  .passo-prazo{margin-top:7px;font-size:0.71875rem;color:var(--ink-faint)}
  /* de quem é a vez */
  .vez-head{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .vez{display:inline-flex;align-items:center;gap:6px;font-size:0.6875rem;font-weight:700;
    letter-spacing:.05em;border-radius:999px;padding:7px 13px;text-transform:uppercase}
  .vez.tribunal{background:var(--ok-bg);color:var(--ok-text)}
  .vez.escritorio{background:var(--gold-faint);color:var(--warn)}
  .ouvir{display:inline-flex;align-items:center;gap:6px;font-size:0.71875rem;font-weight:700;min-height:44px;
    border:1.5px solid var(--hairline);border-radius:999px;padding:9px 14px;background:var(--card);color:var(--ink-soft);cursor:pointer;
    transition:transform .12s ease-out,border-color .15s,color .15s;margin-left:auto}
  .ouvir:active{transform:scale(.96)}
  .ouvir.tocando{border-color:var(--gold);color:var(--gold-text)}
  .ouvir.tocando svg{animation:tocando 1.1s ease-in-out infinite}
  @keyframes tocando{50%{opacity:.3;transform:scale(.85)}}
  .vez-micro{margin-top:10px;font-size:0.84375rem;line-height:1.55;color:var(--ink-soft)}
  /* calma / pendência */
  .calma{margin-top:12px;display:flex;gap:9px;align-items:flex-start;font-size:0.84375rem;color:var(--ink-soft);
    padding:11px 13px;border-radius:var(--r-in);background:var(--ok-bg)}
  .calma b{color:var(--ok)}
  .calma.aviso{background:var(--due-bg)}
  .calma.aviso b{color:var(--due)}
  .calma .mk{font-weight:700;flex:0 0 auto;font-size:1rem;line-height:1.3}
  .meta-proc{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;padding-top:13px;border-top:1px dashed var(--hairline)}
  .meta-proc div{font-size:0.71875rem;color:var(--ink-faint)}
  .meta-proc b{display:block;font-size:0.8125rem;color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums;margin-top:1px}
  /* equipe em ação */
  .equipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:13px}
  .eq-cel{padding:14px 15px;border:1px solid var(--hairline);border-radius:var(--r-sub);background:var(--paper)}
  .eq-cel .num{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--gold-text);font-variant-numeric:tabular-nums;line-height:1.1}
  .eq-cel .lbl{font-size:0.6875rem;color:var(--ink-faint);margin-top:2px;line-height:1.35}
  .eq-extra{margin-top:11px;font-size:0.75rem;color:var(--ink-soft);line-height:1.5;text-align:center}
  .eq-extra .sep{color:var(--gold)}
  .eq-mes{margin-top:11px;padding-top:11px;border-top:1px dashed var(--hairline)}
  .eq-mes .linha{font-size:0.8125rem;color:var(--ink-soft);margin-top:3px}
  .eq-mes .linha b{color:var(--ink)}
  .eq-ultima{margin-top:11px;padding-top:11px;border-top:1px dashed var(--hairline);display:flex;gap:10px;align-items:flex-start}
  .eq-ultima svg{flex:0 0 auto;margin-top:1px;color:var(--gold)}
  .eq-ultima .t{font-size:0.875rem}
  .eq-ultima .t b{color:var(--ink)}
  .eq-inst{margin-top:11px;text-align:center;font-size:0.71875rem;color:var(--ink-faint)}
  .eq-inst b{color:var(--gold-text)}
  /* evento crítico */
  .evento-card{padding:17px 20px;border:1px solid var(--gold-soft);background:linear-gradient(180deg,#fff,var(--gold-faint))}
  .evento-tit{font-family:'Cormorant Garamond',serif;font-size:1.3125rem;font-weight:600;color:var(--ink);line-height:1.2;margin-top:4px}
  .evento-txt{margin-top:8px;font-size:0.875rem;line-height:1.6;color:var(--ink-soft)}
  .evento-txt b{color:var(--ink)}
  .evento-data{margin-top:10px;font-size:0.6875rem;font-weight:700;letter-spacing:.08em;color:var(--gold-text);font-variant-numeric:tabular-nums}

  /* ---------- linha do tempo recolhível ---------- */
  details.tl{border:1px solid var(--hairline);border-radius:var(--r);background:var(--card);box-shadow:var(--shadow-soft);overflow:hidden}
  details.tl>summary{list-style:none;cursor:pointer;padding:17px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:54px}
  details.tl>summary::-webkit-details-marker{display:none}
  .tl-sum-l{display:flex;flex-direction:column}
  .tl-sum-l .t{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:var(--ink);line-height:1.1}
  .tl-sum-l .s{font-size:0.6875rem;color:var(--ink-faint);margin-top:2px}
  .tl-chev{color:var(--gold);font-size:1.25rem;line-height:1;transition:transform .25s ease;flex:0 0 auto}
  details.tl[open] .tl-chev{transform:rotate(45deg)}
  .tl-body{padding:0 20px 18px}
  .tl-aviso{font-size:0.8125rem;color:var(--ink-soft);line-height:1.55;margin:0 0 14px;padding:11px 13px;background:var(--paper);border-radius:var(--r-in)}
  .tl-aviso b{color:var(--ink)}
  .timeline{position:relative;padding-left:24px}
  .timeline::before{content:'';position:absolute;left:6px;top:8px;bottom:14px;width:1.5px;
    background:linear-gradient(180deg,var(--gold) 0%,var(--hairline) 70%,transparent)}
  .evento{position:relative;padding:0 0 20px}
  .evento:last-child{padding-bottom:0}
  .evento::before{content:'';position:absolute;left:-22px;top:5px;width:10px;height:10px;border-radius:50%;
    background:var(--card);border:2.5px solid var(--gold);box-shadow:0 0 0 3px var(--card)}
  .evento:first-child::before{background:var(--gold)}
  .evento .data{font-size:0.6875rem;font-weight:700;letter-spacing:.08em;color:var(--gold-text);font-variant-numeric:tabular-nums}
  .evento .txt{margin-top:3px;font-size:0.90625rem;color:var(--ink)}
  .evento .fonte{margin-top:2px;font-size:0.6875rem;color:var(--ink-faint);letter-spacing:.03em}
  .ver-mais{margin:8px 0 0;background:none;border:1.5px solid var(--hairline);border-radius:999px;
    padding:11px 18px;font-size:0.8125rem;font-weight:700;color:var(--ink-soft);cursor:pointer;min-height:44px;width:100%;
    transition:transform .12s ease-out,border-color .15s}
  .ver-mais:active{transform:scale(.98)}
  .termo{border-bottom:1.5px dotted var(--gold);cursor:pointer;position:relative}
  .termo::after{content:'';position:absolute;inset:-12px -8px}

  /* whatsapp */
  .whats-foot{text-align:center;margin-top:6px}
  .btn-whats{display:inline-flex;align-items:center;gap:8px;background:#25613f;color:#fff;border:none;min-height:46px;padding:0 22px;border-radius:999px;font-family:Lato;font-size:0.875rem;font-weight:700;text-decoration:none}
  .btn-whats svg{flex:0 0 auto}
  .whats-nota{font-size:0.71875rem;color:var(--ink-faint);margin-top:8px}

  /* ---------- pagamentos ---------- */
  .resumo{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .resumo .card{padding:16px}
  .resumo .valor{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1;margin-top:3px}
  .resumo .ok{color:var(--ok)} .resumo .pend{color:var(--warn)}
  .nota-card{font-size:0.71875rem;color:var(--ink-faint);margin-top:3px}
  .pend-alerta{display:flex;gap:10px;align-items:flex-start;padding:13px 15px;border-radius:var(--r-sub);
    background:var(--due-bg);border:1px solid var(--gold-soft);font-size:0.84375rem;line-height:1.5}
  .pend-alerta b{color:var(--due)}
  .pend-alerta .mk{font-weight:700;flex:0 0 auto;color:var(--due);font-size:1.0625rem;line-height:1.3}
  .bol{padding:18px 20px}
  .bol-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .bol-head>div:last-child{text-align:right}
  .bol .venc{font-size:0.71875rem;color:var(--ink-faint)}
  .bol .venc b{display:block;font-size:1.0625rem;color:var(--ink);font-variant-numeric:tabular-nums;margin-top:1px}
  .bol .valor{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;line-height:1.12}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:0.625rem;font-weight:700;letter-spacing:.06em;
    border-radius:999px;padding:4px 11px;text-transform:uppercase;margin-top:4px}
  .pill.pago{background:var(--ok-bg);color:var(--ok-text)}
  .pill.pendente{background:var(--warn-bg);color:var(--warn)}
  .pill.vencido{background:var(--due-bg);color:var(--due)}
  .bol .desc{margin-top:9px;font-size:0.8125rem;color:var(--ink-soft)}
  .bol-acoes{display:flex;gap:10px;margin-top:14px}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;min-height:48px;border-radius:var(--r-in);
    font-size:0.875rem;font-weight:700;cursor:pointer;text-decoration:none;border:none;transition:transform .12s ease-out, background .18s}
  .btn:active{transform:scale(.97)}
  .btn-ouro{background:var(--ink);color:#fff}
  .btn-ouro.copiado{background:var(--ok)}
  .btn-claro{background:#fff;color:var(--ink);border:1.5px solid var(--hairline)}
  .btn svg{width:17px;height:17px;flex:0 0 auto}
  .link-cal{display:flex;align-items:center;justify-content:center;text-align:center;margin-top:11px;font-size:0.75rem;font-weight:700;color:var(--ink-soft);
    border:1.5px dashed var(--hairline);border-radius:var(--r-in);padding:9px 12px;min-height:46px;cursor:pointer;background:none;width:100%;
    transition:transform .12s ease-out,border-color .15s}
  .link-cal:active{transform:scale(.98)}
  .secao-tit{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:6px 2px 0}
  .secao-tit h2{font-family:'Cormorant Garamond',serif;font-size:1.375rem;font-weight:700;line-height:1.15}
  .btn-extrato{background:none;border:none;font-size:0.78125rem;font-weight:700;color:var(--gold-text);cursor:pointer;font-family:Lato;min-height:44px;padding:10px 0 10px 12px}
  .pago-card{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .pago-card .venc{font-size:0.6875rem}
  .pago-card .venc b{display:inline;font-size:0.8125rem}
  .pago-card .valor{font-size:1.1875rem}
  .barra{height:7px;border-radius:4px;background:var(--gold-faint);overflow:hidden;margin-top:10px}
  .barra i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--ok))}
  .ac-linha{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px dashed var(--hairline);font-size:0.875rem;color:var(--ink-soft)}
  .ac-linha:last-child{border-bottom:none}
  .ac-linha b{color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}
  .quadro-tag{display:inline-block;margin-top:7px;font-size:0.625rem;font-weight:700;letter-spacing:.06em;color:var(--gold-text);

    for(var i=0;i<gl.length;i++){
      var t=gl[i].t; if(!t||t.length<4) continue;
      try{
        var re=new RegExp('(^|[^\\wÀ-ÿ>])('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')(?![\\wÀ-ÿ])','i');
        if(re.test(s)){ s=s.replace(re,function(m,a,b){ return a+'<span class="termo" data-gi="'+i+'" role="button" tabindex="0">'+b+'</span>'; }); }
      }catch(e){}
    }
    return s;
  }

  // contador animado
  function countUp(raiz){
    if(prmReduce()) return;
    raiz.querySelectorAll('[data-count]').forEach(function(el){
      var fim=+el.dataset.count||0; if(fim<2) return;
      var t0=null;
      function tick(t){ if(!t0)t0=t; var k=Math.min(1,(t-t0)/650); var e=1-Math.pow(1-k,3);
        el.textContent=Math.round(fim*(0.25+0.75*e)).toLocaleString('pt-BR');
        if(k<1)requestAnimationFrame(tick); else el.textContent=fim.toLocaleString('pt-BR'); }
      requestAnimationFrame(tick);
    });
  }

  // ouvir resumo
  var falando=false;
  function ouvirResumo(){
    if(!('speechSynthesis' in window)){ toast('Seu aparelho não suporta leitura em voz'); return; }
    var btn=$('ouvir-resumo');
    if(falando){ speechSynthesis.cancel(); falando=false; if(btn)btn.classList.remove('tocando'); return; }
    var ps=state.dados.processos||[]; var p=ps[Math.min(state.proc,ps.length-1)]; if(!p) return;
    var partes=['Situação do seu caso: tudo caminhando bem.','Fase atual: '+(p.fase||'em andamento')+'.'];
    if(p.atividades&&p.atividades.vez==='tribunal') partes.push('Neste momento aguardamos o tribunal — você não precisa fazer nada.');
    if(p.atividades&&p.atividades.vez==='escritorio') partes.push('Nossa equipe está trabalhando no seu caso agora.');
    if((p.andamentos||[])[0]) partes.push('Última movimentação, em '+dataBR(p.andamentos[0].data)+': '+p.andamentos[0].texto);
    if(p.proximos_passos) partes.push('Próximos passos: '+p.proximos_passos);
    partes.push('Qualquer novidade, este portal e a nossa equipe avisam você.');
    var u=new SpeechSynthesisUtterance(partes.join(' '));
    u.lang='pt-BR'; u.rate=0.96;
    u.onend=function(){ falando=false; if(btn)btn.classList.remove('tocando'); };
    falando=true; if(btn)btn.classList.add('tocando');
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }

  // ====== ANEL SVG ======
  function svgAnel(p, animar){
    // percentual = Math.round(jornada/5*100) usando o indice existente
    var pct = Math.max(0, Math.min(100, Math.round((p.jornada||0)/5*100)));
    var R=100, cx=114, cy=114;
    var C = 2*Math.PI*R; // circunferência
    var dash = C * pct/100;
    var finalOff = (C - dash); // offset que mostra o arco preenchido (estado correto)
    // ESTADO FINAL pintado direto no atributo stroke-dashoffset (markup), authoritative.
    // A entrada e uma animacao CSS DECLARATIVA (classe .ring-anima): parte de
    // --ring-c (vazio) ate o valor final, sem depender de rAF/JS. So animamos
    // quando a aba esta VISIVEL — em aba oculta a animacao fica congelada no
    // 1o frame (vazio) e nao avanca; sem a classe, o anel ja descansa no valor
    // real (verificado ao vivo: atributo sozinho => 40% correto).
    var visivel = (typeof document==='undefined') || document.visibilityState!=='hidden';
    var anima = animar && !prmReduce() && visivel;
    return '<div class="ring-holder">'+
      '<svg viewBox="0 0 228 228" role="img" aria-label="'+pct+' por cento da jornada concluída">'+
        '<defs>'+
          '<linearGradient id="anelGrad" x1="0%" y1="0%" x2="100%" y2="100%">'+
            '<stop offset="0%" stop-color="var(--navy)"/>'+
            '<stop offset="55%" stop-color="var(--navy-2)"/>'+
            '<stop offset="100%" stop-color="var(--gold)"/>'+
          '</linearGradient>'+
        '</defs>'+
        '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="#EDE6D6" stroke-width="13"/>'+
        '<circle class="ring-prog'+(anima?' ring-anima':'')+'" cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="url(#anelGrad)" '+
          'stroke-width="13" stroke-linecap="round" '+
          'stroke-dasharray="'+C.toFixed(2)+'" stroke-dashoffset="'+finalOff.toFixed(2)+'" '+
          'style="--ring-c:'+C.toFixed(2)+'" '+
          'data-c="'+C.toFixed(2)+'" data-off="'+finalOff.toFixed(2)+'"/>'+
      '</svg>'+
      '<div class="ring-center">'+
        '<div class="ring-pct">'+pct+'<small>%</small></div>'+
        '<div class="ring-fase">'+esc(p.fase||'Em andamento')+'</div>'+
        '<div class="ring-quadro">'+esc(p.quadro||'')+'</div>'+
        (p.rapidez?'<div class="ring-ritmo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg>Acima do ritmo médio</div>':'')+
      '</div>'+
    '</div>';
  }

  // ====== RENDER: Meu caso ======
  function vProcesso(){
    var d = state.dados, ps = d.processos||[];

      var retaFinal = ps.filter(function(x){ return x.jornada >= 4; }).length;

            '<span class="cdot" style="background:'+st.cor+'"></span>'+
            '<span><span class="ctit">'+esc(tituloCaso(x))+'</span><br><span class="csub">'+st.txt+'</span></span>'+

      '</div>'+

      (vezMicrocopy(p)?'<p class="vez-micro">'+esc(vezMicrocopy(p))+'</p>':'')+
      (function(){

      if(extras.length) h += '<div class="eq-extra">'+extras.join(' <span class="sep">•</span> ')+'</div>';
      if(atv.mov_mes || atv.atv_mes){

      if(atv.ultima && atv.ultima.titulo){

    return h;
  }

  // ====== RENDER: Dúvidas ======
  function vFaq(){
    var h='<section class="card bloco entra">'+
      '<div class="rotulo">Canal direto com a equipe</div>'+
      '<div class="bloco-tit">Toda dúvida merece resposta</div>'+
      '<p class="bloco-txt">Reunimos abaixo o que os clientes mais perguntam. Se a sua dúvida não estiver aqui, escreva para a gente — respondemos em até 1 dia útil.</p>'+
      (function(){var b=btnWhats(null);return b?'<div style="margin-top:13px">'+b+'</div>':'';})()+
    '</section>';

    var faq=state.dados.faq||[];
    h += '<div class="secao-tit entra" style="margin-top:18px"><h2>Dúvidas frequentes</h2></div>';
    if(faq.length){
      h += '<div class="edu entra" style="margin-top:2px">'+faq.map(function(f){
        return '<details><summary>'+esc(f.pergunta)+'</summary><div class="corpo-edu">'+esc(f.resposta)+'</div></details>';
      }).join('')+'</div>';
    } else {
      h += '<div class="card estado entra"><p>Em breve reuniremos aqui as dúvidas mais comuns dos nossos clientes.</p></div>';
    }

    // glossário
    var gl=state.dados.glossario||[];
    if(gl.length){
      h += '<div class="secao-tit entra" style="margin-top:18px"><h2>Palavras do processo, em português claro</h2></div>';
      h += '<div class="gloss-grid entra">'+gl.map(function(g){
        return '<div class="gloss"><b>'+esc(g.t)+'</b><span>'+esc(g.d)+'</span></div>';
      }).join('')+'</div>';
    }

    // pergunte aqui
    h += '<div class="secao-tit entra" style="margin-top:18px"><h2>Não encontrou? Pergunte aqui</h2></div>';
    h += '<section class="card bloco entra" style="margin-top:2px">'+
      '<p style="font-size:0.84375rem;color:var(--ink-soft)">Sua pergunta vai direto para a nossa equipe — <b>respondemos em até 1 dia útil</b> e a resposta aparece aqui no portal.</p>'+
      '<textarea id="pq-texto" rows="3" class="nps-area" style="margin-top:10px" autocapitalize="sentences" autocorrect="on" spellcheck="true" enterkeyhint="send" placeholder="Escreva sua pergunta…"></textarea>'+
      '<button class="btn btn-ouro" id="pq-envia" style="margin-top:9px;width:100%">Enviar pergunta</button>'+
    '</section>';

    var mp=state.dados.minhas_perguntas||[];
    if(mp.length){
      h += '<div class="secao-tit entra" style="margin-top:18px"><h2>Suas perguntas</h2></div>';
      h += '<div class="stack" style="margin-top:12px">'+mp.map(function(q){
        return '<section class="card bloco entra">'+
          '<div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">'+
            '<div style="font-size:0.90625rem;font-weight:700;flex:1">'+esc(q.pergunta)+'</div>'+
            '<span class="pill '+(q.status==='respondida'?'pago':'pendente')+'">'+(q.status==='respondida'?'Respondida':'Aguardando')+'</span>'+
          '</div>'+
          '<div style="font-size:0.6875rem;color:var(--ink-faint);margin-top:3px">enviada em '+dataBR(q.criado_em)+'</div>'+
          (q.resposta?'<div style="margin-top:8px;padding:11px 13px;background:var(--ok-bg);border-radius:var(--r-in);font-size:0.875rem">'+esc(q.resposta)+'</div>':'')+
        '</section>';
      }).join('')+'</div>';
    }
    return h;
  }

  // ====== RENDER: Acordo (oculto neste seed pois acordo === null) ======
  function vAcordo(){
    var a=state.dados.acordo;
    if(!a) return '<div class="card estado entra"><h2>Nenhum acordo ativo</h2><p>Quando houver um acordo em prestação de contas, ele aparece aqui.</p></div>';
    return '';
  }

  // lembrete calendário
  function agendaCalendario(b){
    var d=String(b.vencimento||'').slice(0,10); if(!d) return;
    var dt=d.replace(/-/g,'');
    var tit='Parcela CBC Advogados — R$ '+(typeof b.valor==='number'?b.valor.toFixed(2).replace('.',','):b.valor);
    var det='Pagamento de honorários CBC Advogados.';
    if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){
      var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CBC Advogados//Portal//PT\r\nBEGIN:VEVENT\r\n'+
        'UID:cbc-'+dt+'-'+Math.random().toString(36).slice(2)+'\r\nDTSTART;VALUE=DATE:'+dt+'\r\n'+
        'SUMMARY:'+tit.replace(/,/g,'\\,')+'\r\nDESCRIPTION:'+det.replace(/,/g,'\\,')+'\r\n'+
        'BEGIN:VALARM\r\nTRIGGER:-PT15H\r\nACTION:DISPLAY\r\nDESCRIPTION:'+tit.replace(/,/g,'\\,')+'\r\nEND:VALARM\r\n'+
        'END:VEVENT\r\nEND:VCALENDAR';
      var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
      var aE=document.createElement('a'); aE.href=URL.createObjectURL(blob); aE.download='parcela-cbc-'+d+'.ics';
      document.body.appendChild(aE); aE.click(); aE.remove();
      toast('Abra o arquivo para salvar no seu Calendário');
    } else {
      window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(tit)+'&dates='+dt+'/'+dt+'&details='+encodeURIComponent(det),'_blank');
    }
  }

  // extrato PDF
  function carregaJsPDF(){
    return new Promise(function(res,rej){
      if(window.jspdf) return res();
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload=res; s.onerror=function(){rej(new Error('sem conexão'));};
      document.head.appendChild(s);
    });
  }
  function geraExtratoPDF(){
    var btn=$('btn-extrato'); if(btn){btn.disabled=true;btn.textContent='Gerando…';}
    carregaJsPDF().then(function(){
      var doc=new window.jspdf.jsPDF();
      var W=doc.internal.pageSize.getWidth(); var y=20;
      doc.setFont('times','bold'); doc.setFontSize(16); doc.setTextColor('#142A43');
      doc.text('CBC Advogados',W/2,y,{align:'center'}); y+=6;
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor('#7A8CA0');
      doc.text('Conforto, Bergonsi & Cavalari · OAB/SP 55227 · Americana-SP',W/2,y,{align:'center'}); y+=10;
      doc.setDrawColor('#B99249'); doc.line(20,y,W-20,y); y+=10;
      doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor('#142A43');
      doc.text('Extrato de honorários',20,y); y+=6;
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor('#3D5570');
      var c=state.dados.cliente||{};
      doc.text('Cliente: '+(c.nome||''),20,y); y+=5;
      doc.text('Emitido em '+new Date().toLocaleString('pt-BR')+' pelo Portal do Cliente',20,y); y+=10;
      var pg=state.dados.pagamentos||{}; var r=pg.resumo||{};
      doc.setFont('helvetica','bold'); doc.setTextColor('#5C7A4E');
      doc.text('Total pago: '+BRL.format(r.total_pago||0)+'  ('+(r.qtd_pagos||0)+' pagamento'+((r.qtd_pagos||0)===1?'':'s')+')',20,y); y+=6;
      doc.setTextColor('#A66A1F');
      doc.text('Em aberto: '+BRL.format(r.total_pendente||0)+'  ('+(r.qtd_pendentes||0)+' parcela'+((r.qtd_pendentes||0)===1?'':'s')+')',20,y); y+=10;
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor('#142A43');
      doc.text('Pago em',20,y); doc.text('Descrição',55,y); doc.text('Valor',W-20,y,{align:'right'});
      doc.setDrawColor('#E4DCCB'); doc.line(20,y+1.5,W-20,y+1.5); y+=7;
      doc.setFont('helvetica','normal'); doc.setTextColor('#3D5570');
      (pg.pagos||[]).forEach(function(b){
        if(y>270){doc.addPage();y=20;}
        doc.text(dataBR(b.pago_em||b.vencimento),20,y);
        doc.text(String(b.descricao||'Parcela de honorários').slice(0,52),55,y);
        doc.text(BRL.format(b.valor||0),W-20,y,{align:'right'}); y+=6;
      });
      if(!(pg.pagos||[]).length){doc.text('Nenhum pagamento registrado ainda.',20,y);y+=6;}
      y+=6; doc.setFontSize(7.5); doc.setTextColor('#7A8CA0');
      doc.text('Documento informativo gerado automaticamente.',20,y);
      doc.save('extrato-honorarios-cbc.pdf');
      if(btn){btn.disabled=false;btn.textContent='Baixar extrato em PDF';}
    }).catch(function(){
      toast('Não foi possível gerar agora — verifique sua conexão');
      if(btn){btn.disabled=false;btn.textContent='Baixar extrato em PDF';}
    });
  }

  // ====== render principal ======
  function render(){
    var alvo=$('conteudo');
    var mudouAba = alvo._aba !== state.aba; alvo._aba = state.aba;
    if(!prmReduce() && !state.semEntra && alvo.innerHTML && !alvo._primeira){
      alvo.style.opacity='0';
      clearTimeout(alvo._fade);
      alvo._fade=setTimeout(function(){ pinta(); alvo.style.opacity='1'; }, 170);
      return;
    }
    alvo._primeira=false; pinta();

    function pinta(){
      alvo.classList.toggle('sem-anim', !!state.semEntra);
      alvo.innerHTML = state.aba==='proc' ? vProcesso() : state.aba==='pag' ? vPagamentos() : state.aba==='faq' ? vFaq() : vAcordo();
      if(!state.semEntra){
        alvo.querySelectorAll(':scope > .entra').forEach(function(el,i){ el.style.animationDelay = Math.min(i*55,440)+'ms'; });
      }
      ['proc','pag','acordo','faq'].forEach(function(a){ var b=$('nav-'+a); if(b) b.setAttribute('aria-pressed', state.aba===a); });

      // O anel nao precisa de JS para ESTAR CORRETO: o estado final ja esta
      // pintado no atributo stroke-dashoffset (markup) e a entrada anima via CSS
      // (.ring-anima / @keyframes anelEntra). Deterministico, independente de
      // rAF/timing. Unica ressalva cosmetica: se a aba estiver OCULTA no render,
      // a classe de animacao nao e aplicada (ficaria congelada no frame vazio);
      // quando a aba volta a ficar visivel, aplicamos a animacao uma vez.
      var prog=alvo.querySelector('.ring-prog');
      if(prog && !prog.classList.contains('ring-anima') && !prmReduce()
         && typeof document!=='undefined' && document.visibilityState==='hidden'){
        var aoVoltar=function(){
          if(document.visibilityState!=='hidden'){
            document.removeEventListener('visibilitychange', aoVoltar);
            if(prog.isConnected){ prog.classList.remove('ring-anima'); void prog.getBoundingClientRect(); prog.classList.add('ring-anima'); }
          }
        };
        document.addEventListener('visibilitychange', aoVoltar);
      }

      // listeners
      var ouvirBtn=$('ouvir-resumo'); if(ouvirBtn) ouvirBtn.addEventListener('click', ouvirResumo);
      var extBtn=$('btn-extrato'); if(extBtn) extBtn.addEventListener('click', geraExtratoPDF);
      var det=$('tl-det'); if(det) det.addEventListener('toggle', function(){ state.tlOpen=det.open; });
      alvo.querySelectorAll('[data-cal]').forEach(function(el){
        el.addEventListener('click', function(){ var b=state.dados.pagamentos.pendentes[+el.dataset.cal]; if(b) agendaCalendario(b); });
      });
      var pqBtn=$('pq-envia');
      if(pqBtn) pqBtn.addEventListener('click', function(){
        var txt=($('pq-texto').value||'').trim();
        if(txt.length<5){ toast('Escreva sua pergunta com um pouco mais de detalhe'); return; }
        (state.dados.minhas_perguntas = state.dados.minhas_perguntas||[]).unshift({ pergunta:txt, status:'pendente', criado_em:new Date().toISOString() });
        toast('Pergunta enviada — respondemos em até 1 dia útil');
        render();
      });
      // glossário toque (na timeline)
      alvo.querySelectorAll('.termo').forEach(function(el){
        function abreDef(){ var g=(state.dados.glossario||[])[+el.dataset.gi]; if(g) toast('“'+g.t+'”: '+g.d, 7000); }
        el.addEventListener('click', abreDef);
        el.addEventListener('keydown', function(ev){ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); abreDef(); } });
      });
      countUp(alvo);
      // seletor de casos
      alvo.querySelectorAll('[data-proc]').forEach(function(el){
        el.addEventListener('click', function(){
          state.proc=+el.dataset.proc; state.expand=false; state.tlOpen=false; state.semEntra=false;
          render();
        });
      });
      var vm=$('ver-mais'); if(vm) vm.addEventListener('click', function(){ state.expand=!state.expand; state.tlOpen=true; state.semEntra=true; state.keepScroll=window.scrollY; render(); });
      alvo.querySelectorAll('[data-pix]').forEach(function(el){
        el.addEventListener('click', function(){
          var b=state.dados.pagamentos.pendentes[+el.dataset.pix];
          (navigator.clipboard?navigator.clipboard.writeText(b.pix):Promise.reject()).then(function(){
            el.classList.add('copiado'); el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="m5 13 4 4L19 7"/></svg>PIX copiado!';
            toast('Código PIX copiado — cole no app do seu banco');
            setTimeout(function(){ el.classList.remove('copiado'); el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copiar PIX'; }, 3200);
          }).catch(function(){ toast('Não foi possível copiar — segure para selecionar'); });
        });
      });
      if(state.keepScroll!=null){ window.scrollTo({top:state.keepScroll,behavior:'instant'}); }
      else if(mudouAba){ window.scrollTo({top:0,behavior:'instant'}); }
      state.semEntra=false; state.keepScroll=null;
    }
  }

  // nav
  ['proc','pag','acordo','faq'].forEach(function(a){
    var b=$('nav-'+a); if(b) b.addEventListener('click', function(){ state.aba=a; render(); });
  });

  // ====== boot ======
  function boot(){
    var j=state.dados, c=j.cliente||{};
    var temAcordo=!!j.acordo;
    var hora=new Date().getHours();
    var sauda = hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite';
    $('saudacao').innerHTML='<h1 class="ola">'+sauda+', <em>'+esc(c.primeiro_nome||'cliente')+'</em></h1>'+
      '<p class="sub">Acompanhe aqui o seu caso'+(temAcordo?', seus pagamentos e seu acordo':' e seus pagamentos')+'</p>';

    // vigilância
    var vg=j.vigilancia||{}, vhtml='';
    if(vg.ultima_verificacao){
      var dv=new Date(vg.ultima_verificacao); var opts={timeZone:'America/Sao_Paulo'};
      var ehHoje = dv.toLocaleDateString('pt-BR',opts) === new Date().toLocaleDateString('pt-BR',opts);
      var hhmm = dv.toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});
      vhtml += '<div class="vigia entra"><span class="dot"></span>'+
        (ehHoje?'Verificado hoje às '+hhmm:'Última verificação: '+dv.toLocaleDateString('pt-BR',opts)+' '+hhmm)+
        ' · monitoramento automático há '+(vg.dias_monitoramento||1)+' dias</div>';
      if(vg.proxima_verificacao) vhtml += '<div class="vigia-prox entra">Próxima verificação automática no próximo dia útil — você não precisa voltar todos os dias, a gente te avisa quando houver novidade.</div>';
    }
    $('vigia-box').innerHTML=vhtml;

    // autoridade rodapé
    var inst=j.instituicao;
    if(inst){
      $('autoridade').innerHTML='Acompanhamos <b>'+Number(inst.processos_ativos||0).toLocaleString('pt-BR')+'</b> processos ativos · '+
        '<b>'+Number(inst.tarefas_ano||0).toLocaleString('pt-BR')+'</b> tarefas concluídas em '+(new Date().getFullYear())+' · '+
        '<b>'+Number(inst.casos_exito||0).toLocaleString('pt-BR')+'</b> casos conduzidos até a fase de êxito';
    }

    // badge pendência
    var pend=(j.pagamentos&&j.pagamentos.resumo&&j.pagamentos.resumo.qtd_pendentes)||0;
    if(pend){ var bd=$('badge-pend'); bd.textContent=pend; bd.hidden=false; }

    // aba acordo só se existir (aqui é null → permanece oculta)
    if(temAcordo){
      $('nav-acordo').hidden=false;
      document.querySelector('.nav-inner').classList.add('quatro');
      $('nav-proc').lastChild.textContent=' Caso';
    }

    $('nav').hidden=false;

    // frase de fé rotativa
    var FRASES=[
      'Seu caso tem nome, rosto e responsável — não é um número.',
      'Verificamos cada processo todos os dias, automaticamente.',
      'Você não precisa entender de Direito: explicar é a nossa parte.',
      'Cada prazo do seu caso é monitorado pela nossa equipe.',
      'Transparência não é cortesia — é compromisso.'
    ];
    try{ var doy=Math.floor((Date.now()-Date.UTC(new Date().getFullYear(),0,0))/86400000);
      $('frase-fe').textContent='“'+FRASES[doy%FRASES.length]+'”'; }catch(e){}

    render();
  }

  boot();
})();
</script>
</body>
</html>
