<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Meu Processo · CBC Advogados — Sereno</title>
<meta name="theme-color" content="#142A43" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#142A43; --ink-soft:#3D5570; --ink-faint:#5A6D82;
    --paper:#FBFAF7; --paper-2:#F7F3EB; --card:#FFFFFF; --hairline:#E8E1D2; --hairline-soft:#F0EADD;
    --gold:#B99249; --gold-2:#C9A84C; --gold-soft:#E7D9B8; --gold-faint:#F4EDDD; --gold-text:#7E5F26;
    --ok:#5C7A4E; --ok-bg:#EDF2E6; --warn:#8F5A18; --warn-bg:#FBF1DE;
    --due:#9A4B2D; --due-bg:#F6E6DD;
    --navy-grad:linear-gradient(150deg,#0F2035,#1B3A5C);
    --r:18px; --r-sub:15px; --r-in:12px;
    --shadow:0 1px 2px rgba(20,42,67,.05),0 10px 30px -16px rgba(20,42,67,.16);
    --shadow-soft:0 1px 2px rgba(20,42,67,.04),0 6px 18px -12px rgba(20,42,67,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  button:focus-visible,a:focus-visible,textarea:focus-visible,summary:focus-visible,.termo:focus-visible,[role="button"]:focus-visible{
    outline:2px solid var(--gold);outline-offset:2px;border-radius:9px}
  body{
    font-family:'Lato',-apple-system,sans-serif;background:var(--paper);color:var(--ink);
    font-size:1rem;line-height:1.55;min-height:100dvh;
    background-image:radial-gradient(rgba(185,146,73,.045) 1px,transparent 1px);
    background-size:24px 24px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 16px calc(94px + env(safe-area-inset-bottom))}

  /* ---------- header compacto ---------- */
  header{position:relative;padding:16px 0 2px;text-align:center}
  .a11y{position:absolute;top:8px;right:0;display:flex;gap:6px}
  .a11y button{width:44px;height:44px;border-radius:11px;border:1.5px solid var(--hairline);background:var(--card);
    color:var(--ink-soft);font-weight:700;cursor:pointer;font-family:'Lato';box-shadow:var(--shadow-soft);
    transition:border-color .15s,color .15s,transform .12s ease-out}
  .a11y button:hover{border-color:var(--gold);color:var(--ink)}
  .a11y button:active{transform:scale(.93)}
  .a11y button:first-child{font-size:0.6875rem}.a11y button:last-child{font-size:0.9375rem}
  .brand-row{display:flex;align-items:center;justify-content:center;gap:11px;text-align:left}
  .selo{
    width:44px;height:44px;flex:0 0 auto;border-radius:50%;
    border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.0625rem;color:var(--gold);
    letter-spacing:.05em;background:linear-gradient(160deg,#fff, var(--gold-faint));
    box-shadow:var(--shadow-soft),0 0 0 3px var(--paper),0 0 0 4px var(--gold-soft);
  }
  .brand-txt{display:flex;flex-direction:column;gap:2px}
  .firma{font-size:0.625rem;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .firma .oab-in{color:var(--gold-text)}
  #saudacao h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.4375rem;line-height:1.1}
  #saudacao h1 em{font-style:italic;color:var(--gold)}
  .sub{display:none}
  #vigia-box{min-height:30px}
  .vigia{display:inline-flex;align-items:center;justify-content:center;gap:7px;margin:11px auto 0;
    font-size:0.71875rem;font-weight:700;color:var(--ok);background:var(--ok-bg);border-radius:999px;padding:7px 14px}
  .vigia .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulsa 2.2s infinite}
  @keyframes pulsa{0%,100%{box-shadow:0 0 0 0 rgba(92,122,78,.45)}50%{box-shadow:0 0 0 5px rgba(92,122,78,0)}}
  .vigia-prox{text-align:center;font-size:0.6875rem;color:var(--ink-faint);margin:6px auto 0;max-width:34rem;line-height:1.5;padding:0 14px}

  /* ---------- seletor de casos (chips) ---------- */
  .carteira-resumo{margin:14px 2px 8px;font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:0.9375rem;color:var(--ink-soft);text-align:center}
  .carteira-resumo b{color:var(--gold-text);font-style:normal}
  .casos-chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 8px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .casos-chips::-webkit-scrollbar{display:none}
  .caso-chip{flex:0 0 auto;display:flex;flex-direction:column;gap:4px;align-items:flex-start;text-align:left;cursor:pointer;
    background:var(--card);border:1.5px solid var(--hairline);border-radius:13px;padding:9px 14px;min-height:48px;
    font-family:'Lato';transition:border-color .18s,box-shadow .18s,transform .12s ease-out,background .18s}
  .caso-chip:active{transform:scale(.97)}
  .caso-chip[aria-pressed="true"]{border-color:var(--gold);background:var(--gold-faint);box-shadow:var(--shadow-soft)}
  .caso-chip .cc-top{display:flex;align-items:center;gap:7px}
  .caso-chip .cc-name{font-size:0.8125rem;font-weight:700;color:var(--ink);white-space:nowrap}
  .caso-chip .cc-dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .caso-chip .cc-sub{font-size:0.6875rem;color:var(--ink-faint);white-space:nowrap}
  .caso-chip .cc-badge{font-size:0.5625rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;
    background:var(--gold);border-radius:999px;padding:2px 7px;white-space:nowrap}

  /* ---------- barra de jornada horizontal segmentada ---------- */
  .jornada-bar{margin-top:6px;padding:16px 14px 13px;background:var(--card);border:1px solid var(--hairline);
    border-radius:var(--r);box-shadow:var(--shadow-soft)}
  .jb-cap{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:13px}
  .jb-cap .rotulo{font-size:0.625rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .jb-cap .jb-passo{font-size:0.6875rem;color:var(--gold-text);font-weight:700}
  .jb-track{display:flex;gap:6px;align-items:flex-end}
  .jb-seg{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;position:relative}
  .jb-bar{width:100%;height:6px;border-radius:999px;background:var(--hairline-soft);transition:background .3s}
  .jb-seg.done .jb-bar{background:linear-gradient(90deg,var(--gold),var(--gold-2))}
  .jb-seg.atual .jb-bar{background:linear-gradient(90deg,var(--gold-2),var(--gold));
    box-shadow:0 0 0 0 rgba(201,168,76,.5);animation:segPulse 2.6s ease-in-out infinite}
  @keyframes segPulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.0)}50%{box-shadow:0 0 8px 0 rgba(201,168,76,.45)}}
  .jb-num{width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:0.625rem;font-weight:700;font-variant-numeric:tabular-nums;
    background:var(--card);border:1.5px solid var(--hairline);color:var(--ink-faint)}
  .jb-seg.done .jb-num{background:var(--gold);border-color:var(--gold);color:#fff}
  .jb-seg.atual .jb-num{background:#fff;border-color:var(--gold);color:var(--gold-text);
    box-shadow:0 0 0 3px var(--gold-faint)}
  .jb-lbl{font-size:0.5625rem;letter-spacing:.01em;text-align:center;color:var(--ink-faint);font-weight:700;
    text-transform:uppercase;line-height:1.2;hyphens:auto;overflow-wrap:break-word}
  .jb-seg.done .jb-lbl{color:var(--ink-soft)}
  .jb-seg.atual .jb-lbl{color:var(--gold-text)}
  .jb-ritmo{margin-top:12px;padding-top:11px;border-top:1px dashed var(--hairline);
    display:flex;gap:7px;align-items:center;font-size:0.71875rem;color:var(--gold-text);font-weight:700;line-height:1.4}
  .jb-ritmo svg{flex:0 0 auto}

  /* ---------- dashboard de cards glanceaveis ---------- */
  .dash{display:grid;grid-template-columns:1fr;gap:11px;margin-top:11px}
  @media(min-width:430px){ .dash{grid-template-columns:1fr 1fr} .dash .col-2{grid-column:1 / -1} }
  .gcard{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r);box-shadow:var(--shadow-soft);
    padding:16px 17px;display:flex;flex-direction:column;position:relative;overflow:hidden}
  .gcard .rotulo{font-size:0.625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  /* card 1 — situacao */
  .g-status{border-left:none}
  .g-status .status-humano{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;line-height:1.16;
    margin-top:7px;display:flex;align-items:center;gap:8px}
  .g-status .fase-sub{margin-top:9px;font-size:0.6875rem;color:var(--ink-faint);text-transform:uppercase;
    letter-spacing:.06em;font-weight:700}
  .g-status .fase-sub b{color:var(--ink-soft)}
  .g-status .calma{margin-top:12px;display:flex;gap:8px;align-items:flex-start;font-size:0.78125rem;color:var(--ink-soft);
    background:var(--ok-bg);border-radius:11px;padding:10px 12px;line-height:1.45}
  .g-status .calma b{color:var(--ok)}
  .g-status .calma.aviso{background:var(--due-bg)}
  .g-status .calma.aviso b{color:var(--due)}
  .g-status .calma .mark{flex:0 0 auto;font-weight:700}
  .g-status .calma .mark.ok{color:var(--ok)} .g-status .calma .mark.due{color:var(--due)}
  /* card 2 — proximo passo + de quem e a vez */
  .g-vez .vez{display:inline-flex;align-items:center;gap:6px;font-size:0.6875rem;font-weight:700;letter-spacing:.05em;
    border-radius:999px;padding:6px 12px;text-transform:uppercase;margin-top:8px;align-self:flex-start}
  .g-vez .vez.tribunal{background:var(--ok-bg);color:var(--ok)}
  .g-vez .vez.escritorio{background:var(--gold-faint);color:var(--warn)}
  .g-vez .passo-txt{margin-top:11px;font-size:0.84375rem;color:var(--ink);line-height:1.5}
  .g-vez .prazo{margin-top:8px;font-size:0.6875rem;color:var(--ink-faint)}
  .g-vez .prazo b{color:var(--ink-soft)}
  .g-vez .vez-micro{margin-top:9px;font-size:0.75rem;line-height:1.5;color:var(--ink-soft)}
  .g-vez .ouvir{display:inline-flex;align-items:center;gap:6px;font-size:0.75rem;font-weight:700;min-height:42px;margin-top:11px;
    border:1.5px solid var(--hairline);border-radius:999px;padding:8px 15px;background:var(--card);color:var(--ink-soft);
    cursor:pointer;align-self:flex-start;transition:transform .12s ease-out,border-color .15s,color .15s}
  .g-vez .ouvir:active{transform:scale(.96)}
  .g-vez .ouvir.tocando{border-color:var(--gold);color:var(--gold-text)}
  .g-vez .ouvir.tocando svg{animation:tocandoA 1.1s ease-in-out infinite}
  @keyframes tocandoA{50%{opacity:.3;transform:scale(.85)}}
  /* card 3 — equipe em acao (contadores) */
  .g-equipe .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 8px;margin-top:11px}
  .mini-kpi .v{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums;
    color:var(--gold-text);line-height:1.05}
  .mini-kpi .l{font-size:0.625rem;color:var(--ink-faint);margin-top:2px;line-height:1.25}
  .g-equipe .equipe-extra{margin-top:11px;padding-top:10px;border-top:1px dashed var(--hairline);
    font-size:0.71875rem;color:var(--ink-soft);line-height:1.5}
  .g-equipe .ultima{margin-top:9px;display:flex;gap:8px;align-items:flex-start;font-size:0.75rem;color:var(--ink-soft)}
  .g-equipe .ultima svg{flex:0 0 auto;margin-top:1px}
  .g-equipe .ultima b{color:var(--ink)}
  /* card 4 — pagamentos snapshot */
  .g-pag .pag-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:11px}
  .pag-num{display:flex;flex-direction:column}
  .pag-num .v{font-family:'Cormorant Garamond',serif;font-size:1.4375rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}
  .pag-num .v.ok{color:var(--ok)} .pag-num .v.pend{color:var(--warn)}
  .pag-num .l{font-size:0.625rem;color:var(--ink-faint);margin-top:2px}
  .g-pag .alerta-venc{margin-top:11px;display:flex;gap:8px;align-items:center;background:var(--due-bg);border-radius:11px;
    padding:9px 12px;font-size:0.75rem;color:var(--ink);line-height:1.4}
  .g-pag .alerta-venc b{color:var(--due)}
  .g-pag .ir-pag{margin-top:11px;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:42px;
    border:none;border-radius:var(--r-in);background:var(--ink);color:#fff;font-family:'Lato';font-size:0.8125rem;font-weight:700;
    cursor:pointer;width:100%;transition:transform .12s ease-out,background .18s}
  .g-pag .ir-pag:active{transform:scale(.98)}

  /* evento critico (sentenca favoravel) */
  .evento-card{margin-top:12px;padding:16px 18px;background:var(--card);border:1px solid var(--gold-soft);
    border-radius:var(--r);box-shadow:var(--shadow);position:relative}
  .evento-card::before{content:'';position:absolute;inset:0 auto 0 0;width:4px;border-radius:18px 0 0 18px;
    background:linear-gradient(180deg,var(--gold),var(--gold-2))}
  .evento-card .rotulo{font-size:0.625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-text);font-weight:700}
  .evento-tit{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;color:var(--ink);line-height:1.2;margin-top:4px}
  .evento-txt{margin-top:8px;font-size:0.84375rem;line-height:1.6;color:var(--ink-soft)}
  .evento-txt b{color:var(--ink)}
  .evento-data{margin-top:10px;font-size:0.6875rem;font-weight:700;letter-spacing:.06em;color:var(--gold-text);font-variant-numeric:tabular-nums}

  /* ---------- timeline ---------- */
  .divisor{width:54px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
    margin:26px auto 4px;border:0}
  .tl-titulo{display:flex;align-items:baseline;justify-content:space-between;margin:20px 2px 8px}
  .tl-titulo h2{font-family:'Cormorant Garamond',serif;font-size:1.375rem;font-weight:700;line-height:1.2}
  .tl-titulo span{font-size:0.71875rem;color:var(--ink-faint)}
  .tl-intro{font-size:0.78125rem;color:var(--ink-soft);margin:-2px 2px 12px;line-height:1.55}
  .tl-intro b{color:var(--ink)}
  .timeline{position:relative;padding-left:26px}
  .timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:14px;width:1.5px;
    background:linear-gradient(180deg,var(--gold) 0%,var(--hairline) 70%,transparent)}
  .evento{position:relative;padding:0 0 22px}
  .evento::before{content:'';position:absolute;left:-24px;top:5px;width:11px;height:11px;border-radius:50%;
    background:var(--card);border:2.5px solid var(--gold);box-shadow:0 0 0 3px var(--paper)}
  .evento:first-child::before{background:var(--gold)}
  .evento .data{font-size:0.6875rem;font-weight:700;letter-spacing:.08em;color:var(--gold-text);font-variant-numeric:tabular-nums}
  .evento .txt{margin-top:3px;font-size:0.875rem;color:var(--ink)}
  .evento .fonte{margin-top:2px;font-size:0.6875rem;color:var(--ink-faint);letter-spacing:.03em}
  .ver-mais{margin:2px 0 8px;background:var(--card);border:1.5px solid var(--hairline);border-radius:999px;
    padding:10px 18px;font-size:0.8125rem;font-weight:700;color:var(--ink-soft);cursor:pointer;min-height:46px;width:100%;
    transition:transform .12s ease-out,border-color .15s}
  .ver-mais:active{transform:scale(.98)}
  .termo{border-bottom:1.5px dotted var(--gold);cursor:pointer;position:relative}
  .termo::after{content:'';position:absolute;inset:-12px -8px}

  /* ---------- pagamentos (aba) ---------- */
  .card{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r);box-shadow:var(--shadow-soft);overflow:hidden}
  .resumo{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:13px}
  .resumo .card{padding:16px}
  .resumo .rotulo{font-size:0.625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:4px}
  .resumo .valor{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.15}
  .resumo .ok{color:var(--ok)} .resumo .pend{color:var(--warn)}
  .nota-card{font-size:0.6875rem;color:var(--ink-faint);margin-top:2px}
  .pag-ok{display:flex;gap:11px;align-items:flex-start;background:var(--ok-bg);border:1px solid var(--gold-soft);
    border-radius:var(--r-sub);padding:13px 15px;margin-top:13px;font-size:0.84375rem;line-height:1.5}
  .pag-ok b{color:var(--ok)}
  .bol{margin-top:11px;padding:17px}
  .bol-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .bol-head>div:last-child{text-align:right}
  .bol .venc{font-size:0.71875rem;color:var(--ink-faint)}
  .bol .venc b{display:block;font-size:1.0625rem;color:var(--ink);font-variant-numeric:tabular-nums}
  .bol .valor{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;line-height:1.15}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:0.625rem;font-weight:700;letter-spacing:.06em;
    border-radius:999px;padding:4px 10px;text-transform:uppercase;margin-top:5px}
  .pill.pago{background:var(--ok-bg);color:var(--ok)}
  .pill.pendente{background:var(--warn-bg);color:var(--warn)}
  .pill.vencido{background:var(--due-bg);color:var(--due)}
  .bol .desc{margin-top:8px;font-size:0.78125rem;color:var(--ink-soft)}
  .bol-acoes{display:flex;gap:10px;margin-top:13px}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;min-height:48px;border-radius:var(--r-in);
    font-size:0.84375rem;font-weight:700;cursor:pointer;text-decoration:none;border:none;font-family:'Lato';
    transition:transform .12s ease-out, background .18s}
  .btn:active{transform:scale(.97)}
  .btn-ouro{background:var(--ink);color:#fff}
  .btn-ouro.copiado{background:var(--ok)}
  .btn-claro{background:#fff;color:var(--ink);border:1.5px solid var(--hairline)}
  .btn svg{width:16px;height:16px;flex:0 0 auto}
  .link-cal{display:flex;align-items:center;justify-content:center;text-align:center;margin-top:11px;font-size:0.75rem;
    font-weight:700;color:var(--ink-soft);text-decoration:none;border:1.5px dashed var(--hairline);border-radius:var(--r-in);
    padding:9px 12px;min-height:46px;cursor:pointer;background:none;width:100%;
    transition:transform .12s ease-out,border-color .15s}
  .link-cal:active{transform:scale(.98)}
  .fase-card{padding:18px 17px;position:relative}
  .fase-card::before{content:'';position:absolute;inset:0 auto 0 0;width:4px;background:linear-gradient(180deg,var(--gold),var(--gold-soft))}
  .fase-card .rotulo{font-size:0.625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .fase-nome{font-family:'Cormorant Garamond',serif;font-size:1.375rem;font-weight:700;line-height:1.18;margin-top:6px}
  .quadro-tag{display:inline-block;margin-top:8px;font-size:0.625rem;font-weight:700;letter-spacing:.06em;color:var(--gold-text);
    background:var(--gold-faint);border:1px solid var(--gold-soft);border-radius:6px;padding:3px 9px;text-transform:uppercase}
  .ac-linha{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:9px 0;border-bottom:1px dashed var(--hairline);font-size:0.84375rem;color:var(--ink-soft)}
  .ac-linha:last-child{border-bottom:none}
  .ac-linha b{color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}
  .barra{height:7px;border-radius:4px;background:var(--gold-faint);overflow:hidden;margin-top:10px}
  .barra i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--ok))}
  .secao-pagos{margin-top:8px}
  .bol.pago-card{padding:14px 17px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px}
  .bol.pago-card .valor{font-size:1.125rem}
  .pago-card .venc b{display:inline;font-size:0.8125rem}

  // glossario: termos sublinhados na timeline
  function marcaTermos(txtEsc){
    var gl=state.dados.glossario||[]; if(!gl.length) return txtEsc;
    var s=txtEsc;
    for(var i=0;i<gl.length;i++){
      var t=gl[i].t; if(!t||t.length<4) continue;
      try{
        var re=new RegExp('(^|[^\\wÀ-ÿ>])('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')(?![\\wÀ-ÿ])','i');
        if(re.test(s)){ s=s.replace(re,function(m,a,b){ return a+'<span class="termo" data-gi="'+i+'" role="button" tabindex="0">'+b+'</span>'; }); }
      }catch(e){}
    }
    return s;
  }
  // numeros que sobem
  function countUp(raiz){
    if(window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    raiz.querySelectorAll('[data-count]').forEach(function(el){
      var fim=+el.dataset.count||0; if(fim<2) return; var t0=null;
      function tick(t){ if(!t0)t0=t; var k=Math.min(1,(t-t0)/650); var e=1-Math.pow(1-k,3);
        el.textContent=Math.round(fim*(0.25+0.75*e)).toLocaleString('pt-BR');
        if(k<1)requestAnimationFrame(tick); else el.textContent=fim.toLocaleString('pt-BR'); }
      requestAnimationFrame(tick);
    });
  }

  // ---------- render: MEU CASO (dashboard sereno) ----------
  function vProcesso(){
    var d = state.dados, ps = d.processos||[];
    if(!ps.length) return '<div class="card estado entra"><h2>Seu processo está sendo preparado</h2><p>Assim que for distribuído, ele aparece aqui automaticamente.</p></div>';
    var p = ps[Math.min(state.proc, ps.length-1)];
    var h = '';

    // seletor de casos (chips) — multi-processo
    if(ps.length>1){
      var comNovidade = ps.filter(function(x){ return diasDesde((x.andamentos||[])[0]&&x.andamentos[0].data) <= 7; }).length;
      var retaFinal = ps.filter(function(x){ return x.jornada >= 4; }).length;
      var partes = ['<b>'+ps.length+'</b> casos sob nossos cuidados'];
      if(comNovidade) partes.push('<b>'+comNovidade+'</b> com novidade esta semana');
      if(retaFinal) partes.push('<b>'+retaFinal+'</b> na reta final');
      h += '<p class="carteira-resumo entra">'+partes.join(' · ')+'</p>';
      h += '<div class="casos-chips entra" role="group" aria-label="Seus casos">'+ps.map(function(x,i){
        var st = statusCurto(x);
        return '<button class="caso-chip" aria-pressed="'+(i===state.proc)+'" data-proc="'+i+'" aria-label="Caso '+(i+1)+' de '+ps.length+': '+esc(tituloCaso(x))+' — '+st.txt+'">'+
          '<div class="cc-top"><span class="cc-dot" style="background:'+st.cor+'"></span>'+
          '<span class="cc-name">'+esc(tituloCaso(x))+'</span>'+
          (st.novidade?'<span class="cc-badge">novo</span>':'')+'</div>'+
          '<span class="cc-sub">'+esc(x.fase||'Em andamento')+'</span>'+
        '</button>';
      }).join('')+'</div>';
    }

    // === barra de jornada horizontal segmentada (acima da dobra) ===
    if(typeof p.jornada === 'number'){
      var marcos=['Contrato','Distribuição','Citação','Sentença','Cumprimento','Êxito'];
      h += '<section class="jornada-bar entra">'+
        '<div class="jb-cap"><span class="rotulo">A jornada do seu caso</span>'+
          '<span class="jb-passo">Marco '+(p.jornada+1)+' de 6</span></div>'+
        '<div class="jb-track">'+marcos.map(function(m,i){
          var cls = i<p.jornada ? 'done' : (i===p.jornada ? 'done atual' : '');

            '<div class="jb-num">'+(i+1)+'</div>'+

        (p.rapidez?'<div class="jb-ritmo"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="m13 2-9 12h6l-2 8 9-12h-6l2-8Z"/></svg><span>Seu processo está avançando acima do ritmo médio de casos semelhantes</span></div>':'')+
        (p.mesma_fase>=5?'<div class="jb-ritmo" style="color:var(--ink-soft);font-weight:400"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2"><circle cx="9" cy="8" r="3.2"/><path stroke-linecap="round" d="M3.5 20a5.5 5.5 0 0 1 11 0M16 5.5a3 3 0 0 1 0 5.4M19 20a5.4 5.4 0 0 0-3-4.8"/></svg><span>Você não está sozinho — <b style="color:var(--gold-text)">'+p.mesma_fase+'</b> outros clientes estão nesta mesma fase agora.</span></div>':'')+
      '</section>';

    // === dashboard de cards glanceaveis ===

    var au=atv.audiencia;
    var auProx=au&&diasAte(au.data)>=0&&diasAte(au.data)<=7;
    var temPend=!!state.dados.tem_vencida||auProx;

    h += '<div class="dash">';

    // card 1 — situacao do caso
    h += '<section class="gcard g-status entra">'+
      '<div class="rotulo">Situação do seu caso</div>'+
      '<div class="status-humano" style="color:'+sh.cor+'">'+sh.html+'</div>'+
      '<div class="fase-sub">Fase: <b>'+esc(p.fase||'Em andamento')+'</b>'+(p.quadro?' · '+esc(p.quadro):'')+'</div>'+
      (function(){
        if(!temPend){
          return '<div class="calma"><span class="mark ok">✓</span>'+
            '<span><b>Nada pendente do seu lado.</b> Você não precisa fazer nada agora. Se algo precisar de você, a gente avisa.</span></div>';
        }
        var msg=state.dados.tem_vencida?'Há um boleto vencido na aba <b>Pagamentos</b>.':'Você tem uma audiência nos próximos dias.';
        return '<div class="calma aviso"><span class="mark due">!</span>'+

    // card 2 — proximo passo + de quem e a vez
    h += '<section class="gcard g-vez entra">'+
      '<div class="rotulo">De quem é a vez</div>'+
      (atv.vez?(atv.vez==='escritorio'
        ?'<span class="vez escritorio">Com a nossa equipe agora</span>'

      (p.proximos_passos?'<div class="passo-txt"><b style="color:var(--gold-text);font-size:0.625rem;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:4px">Próximo passo</b>'+esc(p.proximos_passos)+'</div>':'')+
      (p.prazo_medio?'<div class="prazo">Prazo médio desta fase: <b>'+esc(p.prazo_medio)+'</b></div>':'')+
      (vezMicrocopy(p)?'<div class="vez-micro">'+esc(vezMicrocopy(p))+'</div>':'')+
      '<button class="ouvir" id="ouvir-resumo" type="button"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Ouvir resumo</button>'+
    '</section>';

    // card 3 — nossa equipe em acao (contadores) — coluna inteira
    if(atv.tarefas_concluidas || atv.movimentos){
      var extras=[];
      if(atv.horas>=1) extras.push('~'+String(atv.horas).replace('.',',')+' h de trabalho dedicadas');
      if(atv.publicacoes) extras.push(atv.publicacoes+' '+plural(atv.publicacoes,'publicação analisada','publicações analisadas'));
      h += '<section class="gcard g-equipe col-2 entra">'+
        '<div class="rotulo">Nossa equipe em ação</div>'+
        '<div class="mini-grid">'+
          '<div class="mini-kpi"><div class="v" data-count="'+(atv.tarefas_concluidas||0)+'">'+(atv.tarefas_concluidas||0)+'</div><div class="l">tarefas concluídas</div></div>'+
          '<div class="mini-kpi"><div class="v" data-count="'+(atv.movimentos||0)+'">'+(atv.movimentos||0)+'</div><div class="l">movimentações acompanhadas</div></div>'+
          (atv.publicacoes?'<div class="mini-kpi"><div class="v" data-count="'+atv.publicacoes+'">'+atv.publicacoes+'</div><div class="l">publicações oficiais analisadas</div></div>':'')+
          (atv.horas>=1?'<div class="mini-kpi"><div class="v">'+String(atv.horas).replace('.',',')+'</div><div class="l">horas dedicadas ao seu caso</div></div>':'')+
        '</div>'+
        (atv.ultima&&atv.ultima.titulo?'<div class="ultima"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>'+
          '<span><b>'+esc(titulo(atv.ultima.titulo))+'</b>'+
          (atv.ultima.por?' — '+esc(titulo(String(atv.ultima.por).trim().split(/\s+/)[0])):'')+
          (atv.ultima.em?' <span style="color:var(--ink-faint)">('+dataBR(atv.ultima.em)+')</span>':'')+'</span></div>':'')+
      '</section>';
    }

    // card 4 — snapshot de pagamentos — coluna inteira
    var pg=state.dados.pagamentos||{}, r=pg.resumo||{};
    h += '<section class="gcard g-pag col-2 entra">'+
      '<div class="rotulo">Seus pagamentos</div>'+
      '<div class="pag-grid">'+
        '<div class="pag-num"><span class="v ok">'+BRL.format(r.total_pago||0)+'</span><span class="l">já pago · '+(r.qtd_pagos||0)+' '+plural(r.qtd_pagos,'parcela','parcelas')+'</span></div>'+
        '<div class="pag-num"><span class="v pend">'+BRL.format(r.total_pendente||0)+'</span><span class="l">em aberto · '+(r.qtd_pendentes||0)+' '+plural(r.qtd_pendentes,'parcela','parcelas')+'</span></div>'+
      '</div>'+
      (state.dados.tem_vencida?'<div class="alerta-venc"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--due)" stroke-width="2" style="flex:0 0 auto"><circle cx="12" cy="12" r="9.5"/><path stroke-linecap="round" d="M12 8v4.5m0 3.2v.05"/></svg><span><b>Há um boleto vencido.</b> Toque abaixo para ver o PIX e o boleto.</span></div>':'')+
      '<button class="ir-pag" id="ir-pag" type="button">Ver parcelas e pagar →</button>'+
    '</section>';

    h += '</div>'; // .dash

    // evento critico (sentenca favoravel — processo 2)
    h += cardEvento(p);

    // === linha do tempo completa (por ultimo) ===
    var evs = p.andamentos||[];
    h += '<hr class="divisor entra" />';
    h += '<div class="tl-titulo entra"><h2>Linha do tempo</h2><span>'+evs.length+' '+plural(evs.length,'movimentação','movimentações')+'</span></div>';
    h += '<p class="tl-intro entra">A maior parte das movimentações são registros normais do tribunal e <b>não exigem nenhuma ação</b> — nem sua, nem nossa. Quando algo depende do escritório, nossa equipe cria a tarefa e conclui antes do prazo judicial.</p>';
    if(!evs.length){
      h += '<div class="card estado"><p>Ainda não há movimentações registradas pelos tribunais.<br/>Verificamos seu processo todos os dias e este espaço se atualiza sozinho.</p></div>';
    } else {
      var vis = state.expand ? evs : evs.slice(0,5);
      h += '<div class="timeline entra">'+vis.map(function(e){
        return '<div class="evento"><div class="data">'+dataBR(e.data)+'</div><div class="txt">'+marcaTermos(esc(e.texto))+'</div>'+(e.fonte?'<div class="fonte">Fonte: '+esc(e.fonte)+'</div>':'')+'</div>';

    return h;
  }

    h += '<section class="card fase-card entra" style="margin-top:0;padding:16px 17px">'+
      '<p style="font-size:0.84375rem;color:var(--ink-soft)">Sua pergunta vai direto para a nossa equipe — <b>respondemos em até 1 dia útil</b> e a resposta aparece aqui no portal.</p>'+
      '<textarea id="pq-texto" rows="3" class="nps-area" style="margin-top:10px" autocapitalize="sentences" autocorrect="on" spellcheck="true" enterkeyhint="send" placeholder="Escreva sua pergunta…"></textarea>'+
      '<button class="btn btn-ouro" id="pq-envia" style="margin-top:9px;width:100%">Enviar pergunta</button>'+
    '</section>';
    var mp = state.dados.minhas_perguntas||[];
    if(mp.length){
      h += '<div class="tl-titulo entra"><h2>Suas perguntas</h2></div>';
      h += mp.map(function(q){
        return '<section class="card entra" style="padding:14px 17px;margin-top:10px">'+
          '<div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">'+
            '<div style="font-size:0.875rem;font-weight:700;flex:1">'+esc(q.pergunta)+'</div>'+
            '<span class="pq-status '+(q.status==='respondida'?'respondida':'pendente')+'">'+(q.status==='respondida'?'Respondida':'Aguardando')+'</span>'+
          '</div>'+
          '<div style="font-size:0.6875rem;color:var(--ink-faint);margin-top:3px">enviada em '+dataBR(q.criado_em)+'</div>'+
          (q.resposta?'<div class="pq-resposta">'+esc(q.resposta)+'</div>':'')+
        '</section>';
      }).join('');
    }
    return h;
  }

  // ---------- lembrete de parcela no calendario ----------
  function agendaCalendario(b){
    var d = String(b.vencimento||'').slice(0,10); if(!d) return;
    var dt = d.replace(/-/g,'');
    var tit = 'Parcela CBC Advogados — R$ '+(typeof b.valor==='number'?b.valor.toFixed(2).replace('.',','):b.valor);
    var det = 'Pagamento de honorários CBC Advogados.';
    if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){
      var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CBC Advogados//Portal//PT\r\nBEGIN:VEVENT\r\n'+
        'UID:cbc-'+dt+'-'+Math.random().toString(36).slice(2)+'\r\nDTSTART;VALUE=DATE:'+dt+'\r\n'+
        'SUMMARY:'+tit.replace(/,/g,'\\,')+'\r\nDESCRIPTION:'+det.replace(/,/g,'\\,')+'\r\n'+
        'BEGIN:VALARM\r\nTRIGGER:-PT15H\r\nACTION:DISPLAY\r\nDESCRIPTION:'+tit.replace(/,/g,'\\,')+'\r\nEND:VALARM\r\n'+
        'END:VEVENT\r\nEND:VCALENDAR';
      var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='parcela-cbc-'+d+'.ics';
      document.body.appendChild(a); a.click(); a.remove();
      toast('Abra o arquivo para salvar no seu Calendário');
    } else {
      window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(tit)+'&dates='+dt+'/'+dt+'&details='+encodeURIComponent(det),'_blank');
    }
  }

  // ---------- extrato PDF (gerado no aparelho, jsPDF via CDN sob demanda) ----------
  function geraExtratoPDF(){
    var btn=$('btn-extrato'); if(btn){btn.disabled=true;btn.textContent='Gerando…';}
    new Promise(function(res,rej){
      if(window.jspdf) return res();
      var s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload=res; s.onerror=function(){rej(new Error('sem conexão'));}; document.head.appendChild(s);
    }).then(function(){
      var doc=new window.jspdf.jsPDF(); var W=doc.internal.pageSize.getWidth(); var y=20;
      doc.setFont('times','bold'); doc.setFontSize(16); doc.setTextColor('#142A43');
      doc.text('CBC Advogados',W/2,y,{align:'center'}); y+=6;
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor('#7A8CA0');
      doc.text('Conforto, Bergonsi & Cavalari · OAB/SP 55227 · Americana-SP',W/2,y,{align:'center'}); y+=10;
      doc.setDrawColor('#B99249'); doc.line(20,y,W-20,y); y+=10;
      doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor('#142A43');
      doc.text('Extrato de honorários',20,y); y+=6;
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor('#3D5570');
      var c=state.dados.cliente||{};
      doc.text('Cliente: '+(c.nome||''),20,y); y+=5;
      doc.text('Emitido em '+new Date().toLocaleString('pt-BR')+' pelo Portal do Cliente',20,y); y+=10;
      var pg=state.dados.pagamentos||{}; var r=pg.resumo||{};
      doc.setFont('helvetica','bold'); doc.setTextColor('#5C7A4E');
      doc.text('Total pago: '+BRL.format(r.total_pago||0)+'  ('+(r.qtd_pagos||0)+' pagamento'+((r.qtd_pagos||0)===1?'':'s')+')',20,y); y+=6;
      doc.setTextColor('#A66A1F');
      doc.text('Em aberto: '+BRL.format(r.total_pendente||0)+'  ('+(r.qtd_pendentes||0)+' parcela'+((r.qtd_pendentes||0)===1?'':'s')+')',20,y); y+=10;
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor('#142A43');
      doc.text('Pago em',20,y); doc.text('Descrição',55,y); doc.text('Valor',W-20,y,{align:'right'});
      doc.setDrawColor('#E4DCCB'); doc.line(20,y+1.5,W-20,y+1.5); y+=7;
      doc.setFont('helvetica','normal'); doc.setTextColor('#3D5570');
      (pg.pagos||[]).forEach(function(b){
        if(y>270){doc.addPage();y=20;}
        doc.text(dataBR(b.pago_em||b.vencimento),20,y);
        doc.text(String(b.descricao||'Parcela de honorários').slice(0,52),55,y);
        doc.text(BRL.format(b.valor||0),W-20,y,{align:'right'}); y+=6;
      });
      y+=6; doc.setFontSize(7.5); doc.setTextColor('#7A8CA0');
      doc.text('Documento informativo gerado automaticamente.',20,y);
      doc.save('extrato-honorarios-cbc.pdf');
      if(btn){btn.disabled=false;btn.textContent='Baixar extrato em PDF';}
    }).catch(function(){
      toast('Não foi possível gerar agora — verifique sua conexão');
      if(btn){btn.disabled=false;btn.textContent='Baixar extrato em PDF';}
    });
  }

  // ---------- ouvir resumo (voz nativa) ----------
  var falando=false;
  function ouvirResumo(){
    if(!('speechSynthesis' in window)){ toast('Seu aparelho não suporta leitura em voz'); return; }
    var btn=$('ouvir-resumo');
    if(falando){ speechSynthesis.cancel(); falando=false; if(btn)btn.classList.remove('tocando'); return; }
    var ps=state.dados.processos||[]; var p=ps[Math.min(state.proc,ps.length-1)]; if(!p) return;
    var partes=['Situação do seu caso: tudo caminhando bem.','Fase atual: '+(p.fase||'em andamento')+'.'];
    if(p.atividades&&p.atividades.vez==='tribunal') partes.push('Neste momento aguardamos o tribunal — você não precisa fazer nada.');
    if(p.atividades&&p.atividades.vez==='escritorio') partes.push('Nossa equipe está trabalhando no seu caso agora.');
    if((p.andamentos||[])[0]) partes.push('Última movimentação, em '+dataBR(p.andamentos[0].data)+': '+p.andamentos[0].texto);
    if(p.proximos_passos) partes.push('Próximos passos: '+p.proximos_passos);
    partes.push('Qualquer novidade, este portal e a nossa equipe avisam você.');
    var u=new SpeechSynthesisUtterance(partes.join(' ')); u.lang='pt-BR'; u.rate=0.96;
    u.onend=function(){ falando=false; if(btn)btn.classList.remove('tocando'); };
    falando=true; if(btn)btn.classList.add('tocando');
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }

  // ---------- render orquestracao ----------
  function render(){
    var alvo = $('conteudo');
    var mudouAba = alvo._aba !== state.aba; alvo._aba = state.aba;
    var prm = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(!prm && !state.semEntra && alvo.innerHTML && !alvo._primeira){
      alvo.style.opacity='0'; clearTimeout(alvo._fade);
      alvo._fade=setTimeout(function(){ pinta(); alvo.style.opacity='1'; }, 170);
      return;
    }
    alvo._primeira=false; pinta();

    function pinta(){
      alvo.classList.toggle('sem-anim', !!state.semEntra);
      alvo.innerHTML = state.aba==='proc' ? vProcesso() : state.aba==='pag' ? vPagamentos() : state.aba==='faq' ? vFaq() : vAcordo();
      if(!state.semEntra){
        alvo.querySelectorAll(':scope > .entra, .dash > .entra').forEach(function(el,i){
          el.style.animationDelay = Math.min(i*55, 440) + 'ms';
        });
      }
      $('nav-proc').setAttribute('aria-pressed', state.aba==='proc');
      $('nav-pag').setAttribute('aria-pressed', state.aba==='pag');
      $('nav-acordo').setAttribute('aria-pressed', state.aba==='acordo');
      $('nav-faq').setAttribute('aria-pressed', state.aba==='faq');

      var ouvirBtn=$('ouvir-resumo'); if(ouvirBtn) ouvirBtn.addEventListener('click', ouvirResumo);
      var irPag=$('ir-pag'); if(irPag) irPag.addEventListener('click', function(){ state.aba='pag'; render(); });
      var extBtn=$('btn-extrato'); if(extBtn) extBtn.addEventListener('click', geraExtratoPDF);

      alvo.querySelectorAll('[data-cal]').forEach(function(el){
        el.addEventListener('click', function(){ var b=state.dados.pagamentos.pendentes[+el.dataset.cal]; if(b) agendaCalendario(b); });
      });
      var pqBtn=$('pq-envia');
      if(pqBtn) pqBtn.addEventListener('click', function(){
        var txt=($('pq-texto').value||'').trim();
        if(txt.length<5){ toast('Escreva sua pergunta com um pouco mais de detalhe'); return; }
        (state.dados.minhas_perguntas=state.dados.minhas_perguntas||[]).unshift({pergunta:txt,status:'pendente',criado_em:new Date().toISOString()});
        toast('Pergunta enviada — respondemos em até 1 dia útil');
        render();
      });
      // glossario no toque
      alvo.querySelectorAll('.termo').forEach(function(el){
        function abreDef(){ var g=(state.dados.glossario||[])[+el.dataset.gi]; if(g) toast('“'+g.t+'”: '+g.d, 7000); }
        el.addEventListener('click', abreDef);
        el.addEventListener('keydown', function(ev){ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); abreDef(); } });
      });
      countUp(alvo);
      // seletor de casos
      alvo.querySelectorAll('[data-proc]').forEach(function(el){
        el.addEventListener('click', function(){
          state.proc=+el.dataset.proc; state.expand=false; state.semEntra=true;
          try{ localStorage.setItem('cbc_caso', String(state.proc)); }catch(e){}
          atualizaBadge(); render();
        });
      });
      var vm=$('ver-mais'); if(vm) vm.addEventListener('click', function(){ state.expand=!state.expand; state.semEntra=true; state.keepScroll=window.scrollY; render(); });
      // copiar PIX
      alvo.querySelectorAll('[data-pix]').forEach(function(el){
        el.addEventListener('click', function(){
          var b=state.dados.pagamentos.pendentes[+el.dataset.pix];
          var ok=function(){ el.classList.add('copiado'); el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="m5 13 4 4L19 7"/></svg>PIX copiado!';
            toast('Código PIX copiado — cole no app do seu banco');
            setTimeout(function(){ el.classList.remove('copiado'); el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copiar PIX'; }, 3200);
          };
          if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(b.pix).then(ok).catch(function(){ toast('Não foi possível copiar — segure para selecionar'); }); }
          else { try{ var ta=document.createElement('textarea'); ta.value=b.pix; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); ok(); }catch(e){ toast('Não foi possível copiar'); } }
        });
      });
      if(state.keepScroll!=null){ window.scrollTo({top:state.keepScroll,behavior:'instant'}); }
      else if(mudouAba){ window.scrollTo({top:0,behavior:'instant'}); }
      state.semEntra=false; state.keepScroll=null;
    }
  }

  $('nav-proc').addEventListener('click', function(){ state.aba='proc'; render(); });
  $('nav-pag').addEventListener('click', function(){ state.aba='pag'; render(); });
  $('nav-acordo').addEventListener('click', function(){ state.aba='acordo'; render(); });
  $('nav-faq').addEventListener('click', function(){ state.aba='faq'; render(); });

  function atualizaBadge(){
    var pend=(state.dados.pagamentos&&state.dados.pagamentos.resumo&&state.dados.pagamentos.resumo.qtd_pendentes)||0;
    var bd=$('badge-pend'); if(pend){ bd.textContent=pend; bd.hidden=false; } else { bd.hidden=true; }
  }

  // ---------- bootstrap (dados embutidos, sem fetch) ----------
  (function init(){
    var j=state.dados, c=j.cliente||{};
    var temAcordo=!!j.acordo;
    state.proc=0; // teste: sempre inicia no Caso 1 para comparacao limpa entre prototipos

    var hora=new Date().getHours();
    var sauda=hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite';
    $('saudacao').innerHTML='<h1>'+sauda+', <em>'+esc(c.primeiro_nome||'cliente')+'</em></h1>';

    // vigilancia (verificado hoje)
    var vg=j.vigilancia||{}, vhtml='';
    if(vg.ultima_verificacao){
      var dv=new Date(vg.ultima_verificacao); var opts={timeZone:'America/Sao_Paulo'};
      var ehHoje=dv.toLocaleDateString('pt-BR',opts)===new Date().toLocaleDateString('pt-BR',opts);
      var hhmm=dv.toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});
      vhtml+='<div class="vigia entra"><span class="dot"></span>'+
        (ehHoje?'Verificado hoje às '+hhmm:'Última verificação: '+dv.toLocaleDateString('pt-BR',opts)+' '+hhmm)+
        ' · monitoramento automático há '+(vg.dias_monitoramento||1)+' dias</div>';
      if(vg.proxima_verificacao) vhtml+='<div class="vigia-prox entra">Próxima verificação automática no próximo dia útil — você não precisa voltar todos os dias, a gente te avisa quando houver novidade.</div>';
    }
    $('vigia-box').innerHTML=vhtml;

    // autoridade (rodape)
    var inst=j.instituicao;
    if(inst){
      $('autoridade').innerHTML='Acompanhamos <b>'+Number(inst.processos_ativos||0).toLocaleString('pt-BR')+'</b> processos ativos · '+
        '<b>'+Number(inst.tarefas_ano||0).toLocaleString('pt-BR')+'</b> tarefas concluídas em '+(new Date().getFullYear())+' · '+
        '<b>'+Number(inst.casos_exito||0).toLocaleString('pt-BR')+'</b> casos conduzidos até a fase de êxito';
    }

    atualizaBadge();
    if(temAcordo){
      $('nav-acordo').hidden=false;
      document.querySelector('.nav-inner').classList.add('quatro');
      $('nav-proc').lastChild.textContent=' Caso';
    }
    $('nav').hidden=false;

    // frase de fe rotativa
    var FRASES=[
      'Seu caso tem nome, rosto e responsável — não é um número.',
      'Verificamos cada processo todos os dias, automaticamente.',
      'Você não precisa entender de Direito: explicar é a nossa parte.',
      'Cada prazo do seu caso é monitorado pela nossa equipe.',
      'Transparência não é cortesia — é compromisso.'
    ];
    try{
      var doy=Math.floor((Date.now()-Date.UTC(new Date().getFullYear(),0,0))/86400000);
      $('frase-fe').textContent='“'+FRASES[doy%FRASES.length]+'”';
    }catch(e){}

    render();
  })();
})();
</script>
</body>
