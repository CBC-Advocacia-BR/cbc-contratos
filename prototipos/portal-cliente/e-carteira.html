<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Meu Processo · CBC Advogados</title>
<meta name="theme-color" content="#F7F3EB" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#142A43; --ink-soft:#3D5570; --ink-faint:#5A6D82;
    --paper:#F7F3EB; --card:#FFFFFF; --hairline:#E4DCCB;
    --gold:#B99249; --gold-soft:#E7D9B8; --gold-faint:#F4EDDD; --gold-text:#7E5F26;
    --gold-line:#C9A84C;
    --ok:#5C7A4E; --ok-bg:#EDF2E6; --warn:#8F5A18; --warn-bg:#FBF1DE;
    --due:#8A5A2D; --due-bg:#F4E8DC;
    --r:18px; --r-sub:16px; --r-in:12px;
    --shadow:0 1px 2px rgba(20,42,67,.05),0 8px 28px -12px rgba(20,42,67,.14);
    --shadow-card:0 2px 4px rgba(20,42,67,.06),0 18px 40px -18px rgba(20,42,67,.32);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  button:focus-visible,a:focus-visible,textarea:focus-visible,summary:focus-visible,.termo:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}
  body{
    font-family:'Lato',-apple-system,sans-serif;background:var(--paper);color:var(--ink);
    font-size:1rem;line-height:1.55;min-height:100dvh;
    background-image:radial-gradient(rgba(185,146,73,.05) 1px,transparent 1px);
    background-size:22px 22px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 18px calc(96px + env(safe-area-inset-bottom))}
  /* ---------- header ---------- */
  header{position:relative;padding:18px 0 4px;text-align:center}
  .a11y{position:absolute;top:8px;right:0;display:flex;gap:6px}
  .a11y button{width:44px;height:44px;border-radius:11px;border:1.5px solid var(--hairline);background:var(--card);
    color:var(--ink-soft);font-weight:700;cursor:pointer;font-family:'Lato';
    transition:border-color .15s,color .15s,transform .12s ease-out}
  .a11y button:hover{border-color:var(--gold);color:var(--ink)}
  .a11y button:active{transform:scale(.93)}
  .a11y button:first-child{font-size:0.6875rem}.a11y button:last-child{font-size:0.9375rem}
  .selo{
    width:46px;height:46px;margin:0 auto 8px;border-radius:50%;
    border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.0625rem;color:var(--gold);
    letter-spacing:.06em;background:linear-gradient(160deg,#fff, var(--gold-faint));
    box-shadow:var(--shadow),0 0 0 3px var(--paper),0 0 0 4px var(--gold-soft);
  }
  .firma{font-size:0.65625rem;letter-spacing:.30em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .oab-in{color:var(--gold-text)}
  h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.75rem;line-height:1.15;margin-top:9px}
  h1 em{font-style:italic;color:var(--gold)}
  .sub{color:var(--ink-soft);font-size:0.875rem;margin-top:3px}
  #vigia-box{min-height:34px;margin-top:12px}
  /* ---------- vigilancia (verificado hoje) + recesso ---------- */
  .vigia{display:flex;align-items:center;justify-content:center;gap:7px;margin:0 auto;max-width:fit-content;
    font-size:0.71875rem;font-weight:700;color:var(--ok);background:var(--ok-bg);border-radius:999px;padding:7px 15px}
  .vigia .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulsa 2.2s infinite}
  @keyframes pulsa{0%,100%{box-shadow:0 0 0 0 rgba(92,122,78,.45)}50%{box-shadow:0 0 0 5px rgba(92,122,78,0)}}
  .vigia-prox{text-align:center;font-size:0.71875rem;color:var(--ink-faint);margin:7px auto 0;max-width:34rem;line-height:1.5;padding:0 12px}

  /* ====================================================================
     CARTEIRA — o cartao do caso (boarding-pass de luxo, tema CLARO)
  ==================================================================== */
  .carteira-resumo{margin:14px 2px 0;font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:0.96875rem;color:var(--ink-soft);text-align:center}
  .carteira-resumo b{color:var(--gold-text);font-style:normal}

  .deck{position:relative;margin:14px 0 0}
  /* trilho horizontal com snap (carrossel de cartoes) */
  .deck-track{display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
    padding:6px 2px 10px;scroll-padding:0 2px}
  .deck-track::-webkit-scrollbar{display:none}
  .deck.single .deck-track{overflow:visible}

  .ticket{
    flex:0 0 100%;scroll-snap-align:center;position:relative;text-align:left;
    border-radius:22px;background:
      linear-gradient(157deg,#FFFFFF 0%,#FCF8EE 52%,#F8F0DC 100%);
    border:1px solid var(--gold-soft);
    box-shadow:var(--shadow-card);
    overflow:hidden;color:var(--ink);
    /* textura sutil impressa no cartao */
    background-image:
      linear-gradient(157deg,#FFFFFF 0%,#FCF8EE 52%,#F8F0DC 100%),
      repeating-linear-gradient(135deg, rgba(185,146,73,.05) 0 2px, transparent 2px 9px);
    background-blend-mode:normal;
  }
  /* filete dourado fino na borda interna */
  .ticket::before{content:'';position:absolute;inset:6px;border-radius:16px;
    border:1px solid var(--gold-line);opacity:.55;pointer-events:none}
  /* recorte de boarding-pass: perfuracao + ponta arredondada entre corpo e talao */
  .ticket-perf{position:absolute;left:0;right:0;height:0;pointer-events:none}
  .ticket-perf::before,.ticket-perf::after{content:'';position:absolute;top:-9px;width:18px;height:18px;
    border-radius:50%;background:var(--paper);box-shadow:inset 0 0 0 1px var(--gold-soft)}
  .ticket-perf::before{left:-9px}.ticket-perf::after{right:-9px}
  .ticket-perf .seam{position:absolute;left:14px;right:14px;top:0;border-top:1.5px dashed var(--gold-soft)}

  .ticket-body{position:relative;padding:18px 20px 14px;z-index:1}
  .ticket-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ticket-selo{display:flex;align-items:center;gap:9px}
  .ticket-selo .mark{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;
    font-weight:700;font-size:0.8125rem;color:var(--gold-text);letter-spacing:.04em;
    background:linear-gradient(160deg,#fff,var(--gold-faint))}
  .ticket-selo .firm{font-size:0.5625rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--ink-faint);font-weight:700;line-height:1.4}
  .ticket-selo .firm b{color:var(--gold-text);display:block;font-size:0.625rem;letter-spacing:.16em}
  .ticket-counter{font-size:0.5625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);
    font-weight:700;background:rgba(255,255,255,.7);border:1px solid var(--gold-soft);
    border-radius:999px;padding:4px 9px;white-space:nowrap}
  .ticket-novidade{display:inline-flex;align-items:center;gap:4px;font-size:0.5625rem;font-weight:700;
    letter-spacing:.10em;text-transform:uppercase;color:#fff;background:var(--gold-text);
    border-radius:999px;padding:4px 9px;white-space:nowrap}

  .ticket-name-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-top:14px}
  .ticket-name-lbl{font-size:0.5625rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .ticket-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.375rem;line-height:1.1;
    color:var(--ink);margin-top:2px}
  .ticket-tipo{font-size:0.6875rem;color:var(--ink-faint);margin-top:2px;font-weight:700;
    letter-spacing:.02em;text-transform:uppercase}

  /* status como manchete em Cormorant — impressa no cartao */
  .ticket-status{display:flex;align-items:center;gap:9px;margin-top:15px;
    padding:13px 14px;border-radius:13px;background:rgba(255,255,255,.66);
    border:1px solid var(--gold-soft)}
  .ticket-status .ic{width:26px;height:26px;flex:0 0 auto;border-radius:50%;
    display:flex;align-items:center;justify-content:center}
  .ticket-status .manchete{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.3125rem;
    line-height:1.12}
  .ticket-status .fase-sub{font-size:0.625rem;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-faint);font-weight:700;margin-top:1px}
  .ticket-status .fase-sub b{color:var(--ink-soft)}

  /* numero do processo em mono/tabular, como num bilhete */
  .ticket-cnj{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:14px}
  .ticket-cnj .cnj-lbl{font-size:0.5625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .ticket-cnj .cnj-num{font-family:'Lato';font-variant-numeric:tabular-nums;letter-spacing:.04em;
    font-size:0.84375rem;font-weight:700;color:var(--ink);margin-top:2px}
  .ticket-quadro{font-size:0.5625rem;font-weight:700;letter-spacing:.10em;text-transform:uppercase;
    color:var(--gold-text);background:var(--gold-faint);border:1px solid var(--gold-soft);
    border-radius:6px;padding:3px 8px;white-space:nowrap}

  /* talao inferior com a trilha de progresso da jornada IMPRESSA */
  .ticket-stub{position:relative;z-index:1;padding:16px 20px 18px;
    background:rgba(248,240,220,.5);border-top:1.5px dashed var(--gold-soft)}
  .stub-lbl{font-size:0.5625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);
    font-weight:700;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .stub-lbl .rapido{color:var(--gold-text);text-transform:none;letter-spacing:.02em;font-size:0.625rem}
  .j-track{display:flex;align-items:flex-start}
  .j-step{flex:1;text-align:center;position:relative}
  .j-step::before{content:'';position:absolute;top:6.5px;left:-50%;width:100%;height:2px;background:var(--gold-soft)}
  .j-step:first-child::before{display:none}
  .j-step.done::before{background:var(--gold)}
  .j-dot{width:14px;height:14px;border-radius:50%;margin:0 auto;background:#fff;
    border:2.5px solid var(--gold-soft);position:relative;z-index:1}
  .j-step.done .j-dot{background:var(--gold);border-color:var(--gold)}
  .j-step.atual .j-dot{border-color:var(--gold);background:var(--gold);
    box-shadow:0 0 0 4px var(--gold-faint);animation:pulsoAtual 2.6s ease-in-out infinite}
  @keyframes pulsoAtual{0%,100%{box-shadow:0 0 0 4px var(--gold-faint)}50%{box-shadow:0 0 0 7px rgba(185,146,73,.10)}}
  .j-lbl{font-size:0.5rem;letter-spacing:0;margin-top:7px;padding:0 1px;color:var(--ink-faint);
    font-weight:700;text-transform:uppercase;line-height:1.2;hyphens:auto;overflow-wrap:break-word;word-break:normal}
  .j-step.done .j-lbl{color:var(--ink-soft)}
  .j-step.atual .j-lbl{color:var(--gold-text)}

  /* pontinhos do carrossel */
  .deck-dots{display:flex;justify-content:center;align-items:center;gap:6px;padding:0 0 2px}
  .deck-dots span{width:18px;height:6px;border-radius:999px;background:var(--hairline);
    transform:scaleX(.333);transform-origin:center;transition:background .25s, transform .25s ease-out}
  .deck-dots span.on{background:var(--gold);transform:scaleX(1)}
  .deck-hint{text-align:center;font-size:0.6875rem;color:var(--ink-faint);margin-top:4px}

  /* ---------- cards (fundo claro arejado abaixo do cartao) ---------- */
  .card{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r);box-shadow:var(--shadow)}
  .rotulo{font-size:0.625rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .bloco{margin-top:13px;padding:17px 18px}
  .quadro-tag{display:inline-block;font-size:0.6875rem;font-weight:700;letter-spacing:.08em;color:var(--gold-text);
    background:var(--gold-faint);border:1px solid var(--gold-soft);border-radius:6px;padding:3px 9px;text-transform:uppercase}
  .fase-nome{font-family:'Cormorant Garamond',serif;font-size:1.6875rem;font-weight:700;line-height:1.18}
  .fase-nome.menor{font-size:1.375rem}
  .fase-texto{margin-top:11px;font-size:0.9375rem;color:var(--ink-soft)}

  /* "de quem e a vez" + ouvir */
  .fase-acoes{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:13px}
  .vez{display:inline-flex;align-items:center;gap:6px;font-size:0.71875rem;font-weight:700;
    letter-spacing:.04em;border-radius:999px;padding:8px 13px;text-transform:uppercase}
  .vez.tribunal{background:var(--ok-bg);color:var(--ok)}
  .vez.escritorio{background:var(--gold-faint);color:var(--warn)}
  .ouvir{display:inline-flex;align-items:center;gap:6px;font-size:0.78125rem;font-weight:700;min-height:44px;
    border:1.5px solid var(--hairline);border-radius:999px;padding:9px 16px;background:var(--card);color:var(--ink-soft);cursor:pointer;
    transition:transform .12s ease-out,border-color .15s,color .15s}
  .ouvir:active{transform:scale(.96)}
  .ouvir.tocando{border-color:var(--gold);color:var(--gold-text)}
  .ouvir.tocando svg{animation:tocando 1.1s ease-in-out infinite}
  @keyframes tocando{50%{opacity:.3;transform:scale(.85)}}
  .vez-micro{margin-top:11px;font-size:0.8125rem;line-height:1.55;color:var(--ink-soft)}

  .passos{margin-top:13px;padding:13px 14px;background:var(--gold-faint);border-radius:12px;font-size:0.90625rem;color:var(--ink)}
  .passos b{color:var(--gold-text);font-size:0.6875rem;letter-spacing:.14em;text-transform:uppercase;display:block;margin-bottom:4px}
  .calma{margin-top:13px;display:flex;gap:8px;align-items:flex-start;font-size:0.8125rem;color:var(--ink-soft)}
  .calma b{color:var(--ok)}
  .calma-aviso b{color:var(--due)}
  .meta-proc{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;padding-top:13px;border-top:1px dashed var(--hairline)}
  .meta-proc div{font-size:0.75rem;color:var(--ink-faint)}
  .meta-proc b{display:block;font-size:0.8125rem;color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}

  /* evento critico */
  .evento-card{margin-top:13px;padding:16px 18px}
  .evento-card.destaque{border:1px solid var(--gold-soft);box-shadow:var(--shadow),0 0 0 1px var(--gold-soft)}
  .evento-tit{font-family:'Cormorant Garamond',serif;font-size:1.3125rem;font-weight:600;color:var(--ink);line-height:1.2;margin-top:3px}
  .evento-txt{margin-top:8px;font-size:0.875rem;line-height:1.6;color:var(--ink-soft)}
  .evento-txt b{color:var(--ink)}
  .evento-data{margin-top:10px;font-size:0.71875rem;font-weight:700;letter-spacing:.08em;color:var(--gold-text);font-variant-numeric:tabular-nums}

  /* equipe em acao */
  .tl-titulo{display:flex;align-items:baseline;justify-content:space-between;margin:24px 2px 12px}
  .tl-titulo h2{font-family:'Cormorant Garamond',serif;font-size:1.4375rem;font-weight:700;line-height:1.2}
  .tl-titulo span{font-size:0.71875rem;color:var(--ink-faint)}
  .resumo{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .resumo .card{padding:16px}
  .resumo .valor{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.15}
  .resumo .valor.ok{color:var(--ok)} .resumo .valor.pend{color:var(--warn)}
  .nota-card{font-size:0.75rem;color:var(--ink-faint);margin-top:2px}
  .nota-card b{color:var(--ok)}
  .mes-card{margin-top:11px;padding:14px 18px}
  .mes-card .linha-mes{font-size:0.84375rem;color:var(--ink-soft);margin-top:4px}
  .mes-card .linha-mes b{color:var(--ink)}
  .equipe-fotos{display:flex;margin-top:10px;padding-left:10px}
  .equipe-fotos .av{width:42px;height:42px;border-radius:50%;border:2.5px solid #fff;box-shadow:var(--shadow);
    margin-left:-10px;background:var(--gold-faint);display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--gold-text);font-size:0.875rem}

  /* timeline */
  .timeline{position:relative;padding-left:26px}
  .timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:14px;width:1.5px;
    background:linear-gradient(180deg,var(--gold) 0%,var(--hairline) 70%,transparent)}
  .evento{position:relative;padding:0 0 22px}
  .evento::before{content:'';position:absolute;left:-24px;top:5px;width:11px;height:11px;border-radius:50%;
    background:var(--card);border:2.5px solid var(--gold);box-shadow:0 0 0 3px var(--paper)}
  .evento:first-child::before{background:var(--gold)}
  .evento .data{font-size:0.71875rem;font-weight:700;letter-spacing:.1em;color:var(--gold-text);font-variant-numeric:tabular-nums}
  .evento .txt{margin-top:3px;font-size:0.9375rem;color:var(--ink)}
  .evento .fonte{margin-top:2px;font-size:0.71875rem;color:var(--ink-faint);letter-spacing:.04em}
  .ver-mais{margin:2px 0 8px;background:none;border:1.5px solid var(--hairline);border-radius:999px;
    padding:10px 18px;font-size:0.8125rem;font-weight:700;color:var(--ink-soft);cursor:pointer;min-height:44px;width:100%;
    transition:transform .12s ease-out,border-color .15s}
  .ver-mais:active{transform:scale(.98)}
  .termo{border-bottom:1.5px dotted var(--gold);cursor:pointer;position:relative}
  .termo::after{content:'';position:absolute;inset:-12px -8px}

  /* educacao por fase */
  .edu{margin-top:12px}
  .edu details{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-sub);margin-top:8px;overflow:hidden}
  .edu summary{padding:14px 16px;font-size:0.875rem;font-weight:700;color:var(--ink);cursor:pointer;list-style:none;
    display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:48px}
  .edu summary::-webkit-details-marker{display:none}
  .edu summary::after{content:'+';color:var(--gold);font-size:1.1875rem;font-weight:400;line-height:1;transition:transform .25s ease;flex:0 0 auto}
  .edu details[open] summary::after{transform:rotate(45deg)}
  .edu .corpo-edu{padding:0 16px 15px;font-size:0.875rem;color:var(--ink-soft)}

  /* ---------- pagamentos ---------- */
  .bol{margin-top:12px;padding:18px}
  .bol-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .bol-head>div:last-child{text-align:right}
  .bol .venc{font-size:0.75rem;color:var(--ink-faint)}
  .bol .venc b{display:block;font-size:1.0625rem;color:var(--ink);font-variant-numeric:tabular-nums}
  .bol .valor{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;line-height:1.15}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:0.6875rem;font-weight:700;letter-spacing:.08em;
    border-radius:999px;padding:4px 11px;text-transform:uppercase}
  .pill.pago{background:var(--ok-bg);color:var(--ok)}
  .pill.pendente{background:var(--warn-bg);color:var(--warn)}
  .pill.vencido{background:var(--due-bg);color:var(--due)}
  .bol .desc{margin-top:8px;font-size:0.8125rem;color:var(--ink-soft)}
  .bol-acoes{display:flex;gap:10px;margin-top:14px}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;min-height:48px;border-radius:var(--r-in);
    font-size:0.875rem;font-weight:700;cursor:pointer;text-decoration:none;transition:transform .12s ease-out, background .18s}
  .btn:active{transform:scale(.97)}
  .btn-ouro{background:var(--ink);color:#fff;border:none}
  .btn-ouro.copiado{background:var(--ok)}
  .btn-claro{background:#fff;color:var(--ink);border:1.5px solid var(--hairline)}
  .btn svg{width:17px;height:17px;flex:0 0 auto}
  .link-cal{display:flex;align-items:center;justify-content:center;text-align:center;margin-top:12px;font-size:0.78125rem;font-weight:700;color:var(--ink-soft);
    text-decoration:none;border:1.5px dashed var(--hairline);border-radius:var(--r-in);padding:9px 12px;min-height:48px;cursor:pointer;background:none;width:100%;
    transition:transform .12s ease-out,border-color .15s}
  .link-cal:active{transform:scale(.98)}
  .secao-pagos{margin-top:24px}
  .bol.pago-card{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .bol.pago-card .valor{font-size:1.1875rem}

  }
  function diasSemPendencia(temPend){
    try{ var k='cbc_sempend_ecarteira';
      if(temPend){ localStorage.removeItem(k); return 0; }
      var v=localStorage.getItem(k);
      if(!v){ v=new Date().toISOString().slice(0,10); localStorage.setItem(k,v); }
      return Math.floor((Date.now()-new Date(v).getTime())/86400000);
    }catch(e){ return 0; }
  }

  /* glossario-tooltip na timeline */
  function marcaTermos(txtEsc){
    var gl=state.dados.glossario||[]; if(!gl.length) return txtEsc;
    var s=txtEsc;
    for(var i=0;i<gl.length;i++){
      var t=gl[i].t; if(!t||t.length<4) continue;
      try{
        var re=new RegExp('(^|[^\\wÀ-ÿ>])('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')(?![\\wÀ-ÿ])','i');
        if(re.test(s)){ s=s.replace(re,function(m,a,b){ return a+'<span class="termo" data-gi="'+i+'" role="button" tabindex="0">'+b+'</span>'; }); }
      }catch(e){}
    }
    return s;
  }

  /* iniciais para avatar fallback (equipe) */
  function iniciais(nome){
    var p=String(nome||'').trim().split(/\s+/);
    return ((p[0]||' ')[0]+((p[1]||' ')[0]||'')).toUpperCase();
  }

  /* trilha de progresso impressa no talao do cartao */
  function trilhaJornada(p){
    var marcos=['Contrato','Distribuição','Citação','Sentença','Cumprimento','Êxito'];
    var idx = typeof p.jornada==='number' ? p.jornada : 0;
    return '<div class="j-track">'+marcos.map(function(m,i){
      var cls = i<=idx ? 'done'+(i===idx?' atual':'') : '';
      return '<div class="j-step '+cls+'"><div class="j-dot"></div><div class="j-lbl">'+m+'</div></div>';
    }).join('')+'</div>';
  }

  /* ============ O CARTAO (boarding-pass) ============ */
  function ticketHTML(p,i,total){
    var st=manchete(p);
    var ehAtual = (i===state.proc);
    return '<button class="ticket" data-proc="'+i+'" aria-pressed="'+ehAtual+'" '+
        'aria-label="Cartão do caso '+(i+1)+' de '+total+': '+esc(tituloCaso(p))+' — '+st.txt+'">'+
      '<div class="ticket-body">'+
        '<div class="ticket-top">'+
          '<div class="ticket-selo"><span class="mark">CBC</span>'+
            '<span class="firm">Conforto, Bergonsi &amp; Cavalari<b>Cartão do seu caso</b></span></div>'+
          (total>1
            ? (st.novidade
                ? '<span class="ticket-novidade">● novidade</span>'
                : '<span class="ticket-counter">Caso '+(i+1)+' / '+total+'</span>')
            : '')+
        '</div>'+
        '<div class="ticket-name-row"><div>'+
          '<div class="ticket-name-lbl">Cliente</div>'+
          '<div class="ticket-name">'+esc((state.dados.cliente||{}).nome||'')+'</div>'+
          '<div class="ticket-tipo">'+esc(p.tipo||'Processo')+'</div>'+
        '</div></div>'+
        '<div class="ticket-status">'+iconeStatus(st.ok)+
          '<div><div class="manchete" style="color:'+st.cor+'">'+st.txt+'</div>'+
          '<div class="fase-sub">Fase atual: <b>'+esc(p.fase||'em andamento')+'</b></div></div></div>'+
        '<div class="ticket-cnj"><div><div class="cnj-lbl">Processo nº</div>'+
          '<div class="cnj-num">'+esc(p.numero)+'</div></div>'+
          (p.quadro?'<span class="ticket-quadro">'+esc(p.quadro)+'</span>':'')+'</div>'+
      '</div>'+
      '<div class="ticket-perf"><span class="seam"></span></div>'+
      '<div class="ticket-stub">'+
        '<div class="stub-lbl"><span>A jornada do seu caso</span>'+
          (p.rapidez?'<span class="rapido">✦ acima do ritmo médio</span>':'')+'</div>'+
        trilhaJornada(p)+
      '</div>'+
    '</button>';
  }

  /* ---------- render: Meu caso ---------- */
  function vProcesso(){
    var d=state.dados, ps=d.processos||[];
    if(!ps.length) return '<div class="card estado entra"><h2>Seu processo está sendo preparado</h2><p>Assim que for distribuído, ele aparece aqui automaticamente.</p></div>';
    var p=ps[Math.min(state.proc,ps.length-1)];
    var h='';

    /* carteira: resumo + deck de cartoes (carrossel/pilha) */
    if(ps.length>1){
      var comNovidade=ps.filter(function(x){ return diasDesde((x.andamentos||[])[0]&&x.andamentos[0].data)<=7; }).length;
      var retaFinal=ps.filter(function(x){ return x.jornada>=4; }).length;
      var partes=['<b>'+ps.length+'</b> casos sob nossos cuidados'];
      if(comNovidade) partes.push('<b>'+comNovidade+'</b> com novidade esta semana');
      if(retaFinal) partes.push('<b>'+retaFinal+'</b> na reta final');
      h+='<p class="carteira-resumo entra">'+partes.join(' · ')+'</p>';
    }
    h+='<div class="deck entra'+(ps.length<=1?' single':'')+'">'+
        '<div class="deck-track" id="deck-track" role="group" aria-label="Cartões dos seus casos">'+
          ps.map(function(x,i){ return ticketHTML(x,i,ps.length); }).join('')+
        '</div></div>';
    if(ps.length>1){
      h+='<div class="deck-dots" id="deck-dots" aria-hidden="true">'+ps.map(function(_,i){
        return '<span'+(i===state.proc?' class="on"':'')+'></span>'; }).join('')+'</div>';
      h+='<div class="deck-hint">Deslize para folhear seus casos</div>';
    }

    /* PROXIMO PASSO + de quem e a vez + ouvir (fundo claro arejado) */
    h+='<section class="card bloco entra" style="margin-top:16px">'+
      '<div class="rotulo">O que vem agora</div>'+
      (p.fase_texto?'<p class="fase-texto">'+esc(p.fase_texto)+'</p>':'')+
      '<div class="fase-acoes">'+
        (p.atividades&&p.atividades.vez?(p.atividades.vez==='escritorio'
          ?'<span class="vez escritorio">Com a nossa equipe agora</span>'
          :'<span class="vez tribunal">Aguardando o tribunal'+(p.atividades.vez_dias>1?' há '+p.atividades.vez_dias+' dias':'')+'</span>'):'')+
        '<button class="ouvir" id="ouvir-resumo" type="button"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Ouvir resumo</button>'+
      '</div>'+
      (vezMicrocopy(p)?'<p class="vez-micro">'+esc(vezMicrocopy(p))+'</p>':'')+
      (p.proximos_passos?'<div class="passos"><b>Próximos passos</b>'+esc(p.proximos_passos)+(p.prazo_medio?' <span style="color:var(--ink-faint)">(prazo médio: '+esc(p.prazo_medio)+')</span>':'')+'</div>':'')+
      (function(){
        var au=p.atividades&&p.atividades.audiencia;
        var auProx=au&&diasAte(au.data)>=0&&diasAte(au.data)<=7;
        var temPend=!!state.dados.tem_vencida||auProx;
        if(!temPend){
          var dd=diasSemPendencia(false);
          return '<div class="calma"><span style="color:var(--ok);font-weight:700;flex:0 0 auto">✓</span>'+
            '<span><b>Nada pendente do seu lado.</b> Você não precisa fazer nada agora'+(dd>=3?' — já são <b>'+dd+' dias</b> sem nenhuma pendência sua':'')+'. Se algo precisar de você, a gente avisa.</span></div>';
        }
        diasSemPendencia(true);
        var msg=state.dados.tem_vencida?'Há um boleto vencido na aba <b>Pagamentos</b>.':'Você tem uma audiência nos próximos dias — veja em <b>Compromisso marcado</b>.';
        return '<div class="calma calma-aviso"><span style="color:var(--due);font-weight:700;flex:0 0 auto">!</span>'+
          '<span><b>Há 1 item para você.</b> '+msg+'</span></div>';
      })()+
      '<div class="meta-proc">'+
        '<div>Processo<b>'+esc(p.numero)+'</b></div>'+
        (p.tipo?'<div>Ação<b>'+esc(p.tipo)+'</b></div>':'')+
        (p.distribuido_em?'<div>Distribuído em<b>'+dataBR(p.distribuido_em)+'</b></div>':'')+
      '</div></section>';

    /* novidade critica (sentenca favoravel no Caso 2) */
    h+=cardEvento(p);

    /* compromisso marcado (audiencia futura) */
    if(p.atividades&&p.atividades.audiencia){
      var au=p.atividades.audiencia;
      h+='<section class="card evento-card entra"><div class="rotulo">Compromisso marcado</div>'+
        '<div style="font-size:0.9375rem;margin-top:5px"><b>'+esc(titulo(au.titulo))+'</b> — '+dataBR(au.data)+'</div>'+
        '<div style="font-size:0.78125rem;color:var(--ink-faint);margin-top:3px">Perto da data entraremos em contato com todas as orientações. Você não precisa fazer nada agora.</div></section>';
    }

    /* educacao por fase (mantem o tom acolhedor) */
    h+='<div class="edu entra">'+
      '<details><summary>Entenda esta fase</summary><div class="corpo-edu">'+esc(p.fase_texto||'')+
        ' Em todas as etapas, acompanhamos o andamento e cuidamos dos prazos por você.</div></details></div>';

    /* NOSSA EQUIPE EM ACAO */
    var atv=p.atividades;
    if(atv&&(atv.tarefas_concluidas||atv.movimentos)){
      h+='<div class="tl-titulo entra"><h2>Nossa equipe em ação</h2></div>';
      h+='<div class="resumo entra">'+
        '<div class="card" style="padding:16px"><div class="rotulo">Tarefas concluídas</div><div class="valor" style="color:var(--gold-text)" data-count="'+(atv.tarefas_concluidas||0)+'">'+(atv.tarefas_concluidas||0)+'</div><div class="nota-card">'+(atv.tarefas_concluidas?'<b>todas antes do prazo judicial</b>':'pela nossa equipe no seu caso')+'</div></div>'+
        '<div class="card" style="padding:16px"><div class="rotulo">Movimentações</div><div class="valor" style="color:var(--gold-text)" data-count="'+(atv.movimentos||0)+'">'+(atv.movimentos||0)+'</div><div class="nota-card">acompanhadas e analisadas</div></div>'+
      '</div>';
      var extras=[];
      if(atv.horas>=1) extras.push('~'+String(atv.horas).replace('.',',')+' horas de trabalho dedicadas ao seu caso');
      if(atv.publicacoes) extras.push(atv.publicacoes+' '+plural(atv.publicacoes,'publicação oficial analisada','publicações oficiais analisadas'));
      if(extras.length) h+='<div class="entra" style="margin-top:10px;text-align:center;font-size:0.78125rem;color:var(--ink-soft)">'+extras.join(' <span style="color:var(--gold)">•</span> ')+'</div>';
      if(atv.mov_mes||atv.atv_mes){
        var mesNome=((state.dados.escritorio||{}).mes||''); mesNome=mesNome.charAt(0).toUpperCase()+mesNome.slice(1);
        var linhas=[];
        if(atv.mov_mes) linhas.push('<b>'+atv.mov_mes+'</b> '+plural(atv.mov_mes,'movimentação do tribunal acompanhada','movimentações do tribunal acompanhadas'));
        if(atv.atv_mes) linhas.push('<b>'+atv.atv_mes+'</b> '+plural(atv.atv_mes,'atividade concluída pela equipe','atividades concluídas pela equipe'));
        h+='<section class="card mes-card entra"><div class="rotulo">'+esc(mesNome)+' no seu caso</div>'+
          linhas.map(function(l){return '<div class="linha-mes">• '+l+'</div>';}).join('')+'</section>';
      }
      if(atv.ultima&&atv.ultima.titulo){
        h+='<section class="card entra" style="margin-top:12px;padding:14px 18px">'+
          '<div style="display:flex;gap:11px;align-items:flex-start">'+
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" style="flex:0 0 auto;margin-top:2px"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>'+
            '<div><div class="rotulo">Última atividade da equipe</div>'+
            '<div style="font-size:0.90625rem;margin-top:3px"><b>'+esc(titulo(atv.ultima.titulo))+'</b>'+
            (atv.ultima.por?' — '+esc(titulo(String(atv.ultima.por).trim().split(/\s+/)[0])):'')+
            (atv.ultima.em?' <span style="color:var(--ink-faint)">('+dataBR(atv.ultima.em)+')</span>':'')+
            '</div>'+
            (atv.ultima.por?'<div class="equipe-fotos"><span class="av">'+iniciais(atv.ultima.por)+'</span></div>':'')+
            '</div></div></section>';
      }
      var of=state.dados.escritorio;
      if(of&&of.tarefas_mes>=50){
        h+='<div class="entra" style="margin-top:12px;text-align:center;font-size:0.78125rem;color:var(--ink-faint)">Em '+esc(of.mes)+', nossa equipe já concluiu <b style="color:var(--gold-text)">'+Number(of.tarefas_mes).toLocaleString('pt-BR')+'</b> tarefas processuais para clientes como você.</div>';
      }
    }

    /* LINHA DO TEMPO */
    var evs=p.andamentos||[];
    h+='<hr class="divisor entra" />';
    h+='<div class="tl-titulo entra"><h2>Linha do tempo</h2><span>'+evs.length+' '+plural(evs.length,'movimentação','movimentações')+'</span></div>';
    h+='<p class="entra" style="font-size:0.8125rem;color:var(--ink-soft);margin:-4px 2px 12px;line-height:1.55">A maior parte das movimentações são registros normais do tribunal e <b>não exigem nenhuma ação</b> — nem sua, nem nossa. Quando algo depende do escritório, nossa equipe cria a tarefa e conclui antes do prazo judicial.</p>';
    if(!evs.length){
      h+='<div class="card estado"><p>Ainda não há movimentações registradas pelos tribunais.<br/>Verificamos seu processo todos os dias e este espaço se atualiza sozinho.</p></div>';
    } else {
      var vis=state.expand?evs:evs.slice(0,5);
      h+='<div class="timeline entra">'+vis.map(function(e){
        return '<div class="evento"><div class="data">'+dataBR(e.data)+'</div><div class="txt">'+marcaTermos(esc(e.texto))+'</div>'+(e.fonte?'<div class="fonte">Fonte: '+esc(e.fonte)+'</div>':'')+'</div>';
      }).join('')+'</div>';
      if(evs.length>5) h+='<button class="ver-mais" id="ver-mais">'+(state.expand?'Mostrar menos':'Ver histórico completo ('+evs.length+')')+'</button>';
    }
    var bw=btnWhats(p);
    if(bw) h+='<div class="entra" style="text-align:center;margin-top:20px">'+bw+'<div style="font-size:0.75rem;color:var(--ink-faint);margin-top:7px">Atendemos '+esc(((state.dados.contato||{}).horario)||'em horário comercial')+' e respondemos cada dúvida com calma.</div></div>';
    return h;
  }

  /* ---------- render: Acordo (oculto, acordo=null) ---------- */
  function vAcordo(){
    return '<div class="card estado entra"><h2>Nenhum acordo ativo</h2><p>Quando houver um acordo em prestação de contas, ele aparece aqui.</p></div>';
  }

  /* ---------- render: Duvidas ---------- */
  function vFaq(){
    var h='<section class="card bloco entra">'+
      '<div class="rotulo">Canal direto com a equipe</div>'+
      '<div class="fase-nome menor" style="margin-top:4px">Toda dúvida merece resposta</div>'+
      '<p class="fase-texto">Reunimos abaixo o que os clientes mais perguntam. Se a sua dúvida não estiver aqui, escreva para a gente — respondemos em até 1 dia útil.</p>'+
      (function(){var b=btnWhats(null);return b?'<div style="margin-top:13px">'+b+'</div>':'';})()+
    '</section>';
    h+='<div class="tl-titulo entra"><h2>Dúvidas frequentes</h2></div>';
    var faq=state.dados.faq||[];
    if(faq.length){
      h+='<div class="edu entra" style="margin-top:0">'+faq.map(function(f){
        return '<details><summary>'+esc(f.pergunta)+'</summary><div class="corpo-edu">'+esc(f.resposta)+'</div></details>';
      }).join('')+'</div>';
    } else {
      h+='<div class="card estado entra"><p>Em breve reuniremos aqui as dúvidas mais comuns dos nossos clientes.</p></div>';
    }
    /* glossario navegavel */
    var gl=state.dados.glossario||[];
    if(gl.length){
      h+='<div class="tl-titulo entra"><h2>Glossário sem juridiquês</h2></div>';
      h+='<div class="edu entra" style="margin-top:0">'+gl.map(function(g){
        return '<details><summary>'+esc(g.t)+'</summary><div class="corpo-edu">'+esc(g.d)+'</div></details>';
      }).join('')+'</div>';
    }
    /* pergunte aqui (visual) */
    h+='<div class="tl-titulo entra"><h2>Não encontrou? Pergunte aqui</h2></div>';
    h+='<section class="card bloco entra" style="margin-top:0">'+
      '<p style="font-size:0.84375rem;color:var(--ink-soft)">Sua pergunta vai direto para a nossa equipe — <b>respondemos em até 1 dia útil</b> e a resposta aparece aqui no portal.</p>'+
      '<textarea id="pq-texto" rows="3" class="nps-area" style="margin-top:10px" placeholder="Escreva sua pergunta…"></textarea>'+
      '<button class="btn btn-ouro" id="pq-envia" style="margin-top:9px;width:100%">Enviar pergunta</button>'+
    '</section>';
    var mp=state.dados.minhas_perguntas||[];
    if(mp.length){
      h+='<div class="tl-titulo entra"><h2>Suas perguntas</h2></div>';
      h+=mp.map(function(q){
        return '<section class="card entra" style="padding:14px 18px;margin-top:10px">'+
          '<div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">'+
            '<div style="font-size:0.90625rem;font-weight:700;flex:1">'+esc(q.pergunta)+'</div>'+
            '<span class="pq-status '+(q.status==='respondida'?'respondida':'pendente')+'">'+(q.status==='respondida'?'Respondida':'Aguardando')+'</span>'+
          '</div>'+
          '<div style="font-size:0.6875rem;color:var(--ink-faint);margin-top:3px">enviada em '+dataBR(q.criado_em)+'</div>'+
          (q.resposta?'<div class="pq-resposta">'+esc(q.resposta)+'</div>':'')+
        '</section>';
      }).join('');
    }
    return h;
  }

  /* ---------- lembrete de parcela no calendario ---------- */
  function agendaCalendario(b){
    var d=String(b.vencimento||'').slice(0,10); if(!d) return;
    var dt=d.replace(/-/g,'');
    var tit='Parcela CBC Advogados — '+(typeof b.valor==='number'?BRL.format(b.valor):b.valor);
    var det='Pagamento de honorários CBC Advogados. Boleto e PIX no seu portal.';
    if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){
      var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CBC Advogados//Portal//PT\r\nBEGIN:VEVENT\r\n'+
        'UID:cbc-'+dt+'-'+Math.random().toString(36).slice(2)+'\r\nDTSTART;VALUE=DATE:'+dt+'\r\n'+
        'SUMMARY:'+tit.replace(/,/g,'\\,')+'\r\nDESCRIPTION:'+det.replace(/,/g,'\\,')+'\r\n'+
        'BEGIN:VALARM\r\nTRIGGER:-PT15H\r\nACTION:DISPLAY\r\nDESCRIPTION:'+tit.replace(/,/g,'\\,')+'\r\nEND:VALARM\r\n'+
        'END:VEVENT\r\nEND:VCALENDAR';
      var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='parcela-cbc-'+d+'.ics';
      document.body.appendChild(a); a.click(); a.remove();
      toast('Abra o arquivo para salvar no seu Calendário');
    } else {
      window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(tit)+
        '&dates='+dt+'/'+dt+'&details='+encodeURIComponent(det),'_blank');
    }
  }

  /* ---------- ouvir resumo (voz nativa) ---------- */
  var falando=false;
  function ouvirResumo(){
    if(!('speechSynthesis' in window)){ toast('Seu aparelho não suporta leitura em voz'); return; }
    var btn=$('ouvir-resumo');
    if(falando){ speechSynthesis.cancel(); falando=false; if(btn)btn.classList.remove('tocando'); return; }
    var ps=state.dados.processos||[]; var p=ps[Math.min(state.proc,ps.length-1)]; if(!p) return;
    var partes=['Situação do seu caso: tudo caminhando bem.','Fase atual: '+(p.fase||'em andamento')+'.'];
    if(p.atividades&&p.atividades.vez==='tribunal') partes.push('Neste momento aguardamos o tribunal — você não precisa fazer nada.');
    if(p.atividades&&p.atividades.vez==='escritorio') partes.push('Nossa equipe está trabalhando no seu caso agora.');
    if((p.andamentos||[])[0]) partes.push('Última movimentação, em '+dataBR(p.andamentos[0].data)+': '+p.andamentos[0].texto);
    if(p.proximos_passos) partes.push('Próximos passos: '+p.proximos_passos);
    partes.push('Qualquer novidade, este portal e a nossa equipe avisam você.');
    var u=new SpeechSynthesisUtterance(partes.join(' '));
    u.lang='pt-BR'; u.rate=0.96;
    u.onend=function(){ falando=false; if(btn)btn.classList.remove('tocando'); };
    falando=true; if(btn)btn.classList.add('tocando');
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }

  /* numeros que sobem */
  function countUp(raiz){
    if(window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    raiz.querySelectorAll('[data-count]').forEach(function(el){
      var fim=+el.dataset.count||0; if(fim<2) return; var t0=null;
      function tick(t){ if(!t0)t0=t; var k=Math.min(1,(t-t0)/650); var e=1-Math.pow(1-k,3);
        el.textContent=Math.round(fim*(0.25+0.75*e)).toLocaleString('pt-BR');
        if(k<1)requestAnimationFrame(tick); else el.textContent=fim.toLocaleString('pt-BR'); }
      requestAnimationFrame(tick);
    });
  }

  /* ---------- render principal (com crossfade entre abas) ---------- */
  function render(opts){
    opts=opts||{};
    var alvo=$('conteudo');
    var prm=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(!prm && !opts.semCross && alvo.innerHTML){
      alvo.style.opacity='0';
      clearTimeout(alvo._fade);
      alvo._fade=setTimeout(function(){ pinta(); alvo.style.opacity='1'; },150);
      return;
    }
    pinta();

    function pinta(){
      alvo.innerHTML = state.aba==='proc'?vProcesso():state.aba==='pag'?vPagamentos():state.aba==='faq'?vFaq():vAcordo();
      if(!prm){
        alvo.querySelectorAll(':scope > .entra').forEach(function(el,i){ el.style.animationDelay=Math.min(i*50,420)+'ms'; });
      }
      $('nav-proc').setAttribute('aria-pressed',state.aba==='proc');
      $('nav-pag').setAttribute('aria-pressed',state.aba==='pag');
      $('nav-acordo').setAttribute('aria-pressed',state.aba==='acordo');
      $('nav-faq').setAttribute('aria-pressed',state.aba==='faq');
      var soNoCaso=state.aba==='proc';
      ['divisor-servicos','familia','indicar'].forEach(function(id){ var el=$(id); if(el) el.style.display=soNoCaso?'':'none'; });

      bindEventos(alvo);
      countUp(alvo);
      if(opts.keepScroll!=null) window.scrollTo({top:opts.keepScroll,behavior:'instant'});
      else if(opts.scrollTop) window.scrollTo({top:0,behavior:'instant'});
    }
  }

  function bindEventos(alvo){
    var ouvirBtn=$('ouvir-resumo'); if(ouvirBtn) ouvirBtn.addEventListener('click',ouvirResumo);
    var extBtn=$('btn-extrato'); if(extBtn) extBtn.addEventListener('click',function(){ toast('Extrato gerado e baixado (demonstração)'); });
    alvo.querySelectorAll('[data-cal]').forEach(function(el){
      el.addEventListener('click',function(){ var b=state.dados.pagamentos.pendentes[+el.dataset.cal]; if(b) agendaCalendario(b); });
    });
    var pqBtn=$('pq-envia');
    if(pqBtn) pqBtn.addEventListener('click',function(){
      var txt=($('pq-texto').value||'').trim();
      if(txt.length<5){ toast('Escreva sua pergunta com um pouco mais de detalhe'); return; }
      (state.dados.minhas_perguntas=state.dados.minhas_perguntas||[]).unshift({pergunta:txt,status:'pendente',criado_em:new Date().toISOString()});
      toast('Pergunta enviada — respondemos em até 1 dia útil');
      render({semCross:true,keepScroll:window.scrollY});
    });
    /* glossario no toque */
    alvo.querySelectorAll('.termo').forEach(function(el){
      function abreDef(){ var g=(state.dados.glossario||[])[+el.dataset.gi]; if(g) toast('"'+g.t+'": '+g.d,7000); }
      el.addEventListener('click',abreDef);
      el.addEventListener('keydown',function(ev){ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); abreDef(); } });
    });
    /* trocar de caso (cartao) */
    alvo.querySelectorAll('[data-proc]').forEach(function(el){
      el.addEventListener('click',function(){
        var i=+el.dataset.proc;
        if(i===state.proc){ return; }
        state.proc=i; state.expand=false;
        try{ localStorage.setItem(STORE,String(state.proc)); }catch(e){}
        render({scrollTop:true});
      });
    });
    /* carrossel: centraliza o cartao ativo + sincroniza pontinhos */
    var track=$('deck-track');
    if(track){
      var sel=track.querySelector('[aria-pressed="true"]');
      if(sel) track.scrollLeft=Math.max(0,sel.offsetLeft - (track.clientWidth - sel.clientWidth)/2);
      track.addEventListener('scroll',function(){
        if(track._raf) return;
        track._raf=requestAnimationFrame(function(){
          track._raf=null;
          var cards=track.querySelectorAll('.ticket'); if(!cards.length) return;
          var centro=track.scrollLeft+track.clientWidth/2, melhor=0, dist=1e9;
          cards.forEach(function(c,i){ var m=Math.abs((c.offsetLeft+c.clientWidth/2)-centro); if(m<dist){dist=m;melhor=i;} });
          document.querySelectorAll('#deck-dots span').forEach(function(d,i){ d.classList.toggle('on',i===melhor); });
        });
      },{passive:true});
    }
    var vm=$('ver-mais'); if(vm) vm.addEventListener('click',function(){ state.expand=!state.expand; render({semCross:true,keepScroll:window.scrollY}); });
    /* copiar PIX */
    alvo.querySelectorAll('[data-pix]').forEach(function(el){
      el.addEventListener('click',function(){
        var b=state.dados.pagamentos.pendentes[+el.dataset.pix];
        var ok=function(){
          el.classList.add('copiado'); el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="m5 13 4 4L19 7"/></svg>PIX copiado!';
          toast('Código PIX copiado — cole no app do seu banco');
          setTimeout(function(){ el.classList.remove('copiado'); el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copiar PIX'; },3200);
        };
        if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(b.pix).then(ok).catch(function(){ toast('Não foi possível copiar — segure para selecionar'); }); }
        else ok();
      });
    });
  }

  /* ---------- modo familia ---------- */
  function montaFamilia(){
    var s=$('familia'); s.hidden=false; s.classList.add('entra');
    s.innerHTML='<div class="rotulo">Para a sua família</div>'+
      '<p style="font-size:0.875rem;margin-top:6px;color:var(--ink-soft)">Este portal é seu — e pode ser compartilhado com cônjuge e filhos. Assim todo mundo acompanha junto, sem precisar repetir explicações.</p>'+
      '<button class="btn btn-claro" id="btn-familia" style="margin-top:11px;width:100%" type="button">'+
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7.2 19 3 20l1.1-3.9A8.4 8.4 0 1 1 7.2 19Z"/></svg>'+
      'Compartilhar com a família</button>';
    $('btn-familia').addEventListener('click',function(){
      var msg='Acompanhe o nosso caso no portal do CBC Advogados (não precisa de senha).';
      if(navigator.share){ navigator.share({title:'Portal CBC Advogados',text:msg}).catch(function(){}); }
      else { toast('Link copiado para compartilhar'); }
    });
  }
  function montaIndicar(primeiro){
    var s=$('indicar'); s.hidden=false; s.classList.add('entra');
    var msg='Olá! Quero te indicar o *CBC Advogados* — eles cuidam do meu processo e eu acompanho tudo pelo celular, em tempo real. (Indicação de '+primeiro+')';
    s.innerHTML='<p style="font-size:0.8125rem;color:var(--ink-soft)">Conhece alguém passando por uma situação parecida?</p>'+
      '<a href="https://wa.me/?text='+encodeURIComponent(msg)+'" target="_blank" rel="noopener" '+
      'style="display:inline-flex;align-items:center;min-height:44px;margin-top:2px;font-size:0.84375rem;font-weight:700;color:var(--gold-text);text-decoration:none;border-bottom:1.5px dotted var(--gold)">Indicar o escritório a um amigo</a>';
  }

  /* ---------- nav ---------- */
  $('nav-proc').addEventListener('click',function(){ state.aba='proc'; render({scrollTop:true}); });
  $('nav-pag').addEventListener('click',function(){ state.aba='pag'; render({scrollTop:true}); });
  $('nav-acordo').addEventListener('click',function(){ state.aba='acordo'; render({scrollTop:true}); });
  $('nav-faq').addEventListener('click',function(){ state.aba='faq'; render({scrollTop:true}); });

  /* ---------- frases de fe (rodape) ---------- */
  var FRASES=[
    'Seu caso tem nome, rosto e responsável — não é um número.',
    'Verificamos cada processo todos os dias, automaticamente.',
    'Você não precisa entender de Direito: explicar é a nossa parte.',
    'Cada prazo do seu caso é monitorado pela nossa equipe.',
    'Transparência não é cortesia — é compromisso.'
  ];

  /* ================= BOOT ================= */
  function montaTudo(j){
    state.dados=j;
    var c=j.cliente||{};
    var temAcordo=!!j.acordo;

    /* sempre inicia no Caso 1, mas lembra o ultimo caso folheado (chave isolada) */
    state.proc=0;
    try{ var lembrado=+localStorage.getItem(STORE);
      if(!isNaN(lembrado)&&lembrado>=0&&lembrado<(j.processos||[]).length) state.proc=lembrado;
    }catch(e){}

    var hora=new Date().getHours();
    var sauda=hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite';
    $('saudacao').innerHTML='<h1>'+sauda+', <em>'+esc(c.primeiro_nome||'cliente')+'</em></h1>'+
      '<p class="sub">Acompanhe aqui o seu caso'+(temAcordo?', seus pagamentos e seu acordo':' e seus pagamentos')+'</p>';

    /* vigilancia (verificado hoje) */
    var vg=j.vigilancia||{}, vhtml='';
    if(vg.ultima_verificacao){
      var dv=new Date(vg.ultima_verificacao);
      var opts={timeZone:'America/Sao_Paulo'};
      var ehHoje=dv.toLocaleDateString('pt-BR',opts)===new Date().toLocaleDateString('pt-BR',opts);
      var hhmm=dv.toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});
      vhtml+='<div class="vigia entra"><span class="dot"></span>'+
        (ehHoje?'Verificado hoje às '+hhmm:'Última verificação: '+dv.toLocaleDateString('pt-BR',opts)+' '+hhmm)+
        ' · monitoramento automático há '+(vg.dias_monitoramento||1)+' dias</div>';
      if(vg.proxima_verificacao) vhtml+='<div class="vigia-prox entra">Próxima verificação automática no próximo dia útil — você não precisa voltar todos os dias, a gente te avisa quando houver novidade.</div>';
    }
    $('vigia-box').innerHTML=vhtml;

    /* autoridade por numeros reais */
    var inst=j.instituicao;
    if(inst){
      $('autoridade').innerHTML='Acompanhamos <b>'+Number(inst.processos_ativos||0).toLocaleString('pt-BR')+'</b> processos ativos · '+
        '<b>'+Number(inst.tarefas_ano||0).toLocaleString('pt-BR')+'</b> tarefas concluídas em '+(new Date().getFullYear())+' · '+
        '<b>'+Number(inst.casos_exito||0).toLocaleString('pt-BR')+'</b> casos conduzidos até a fase de êxito';
    }

    var pend=(j.pagamentos&&j.pagamentos.resumo&&j.pagamentos.resumo.qtd_pendentes)||0;
    if(pend){ var bd=$('badge-pend'); bd.textContent=pend; bd.hidden=false; }

    if(temAcordo){
      $('nav-acordo').hidden=false;
      document.querySelector('.nav-inner').classList.add('quatro');
      $('nav-proc').lastChild.textContent=' Caso';
    }
    $('nav').hidden=false;
    var dvs=$('divisor-servicos'); if(dvs) dvs.hidden=false;

    montaFamilia();
    montaIndicar(esc(c.primeiro_nome||'cliente'));
    render({semCross:true,scrollTop:false});

    /* frase de fe */
    try{
      var doy=Math.floor((Date.now()-Date.UTC(new Date().getFullYear(),0,0))/86400000);
      var ff=$('frase-fe'); if(ff) ff.textContent='"'+FRASES[doy%FRASES.length]+'"';
    }catch(e){}
  }

  montaTudo(DADOS);
})();
</script>
</body>
