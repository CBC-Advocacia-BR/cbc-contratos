<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Meu Processo · CBC Advogados</title>
<meta name="theme-color" content="#142A43" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#142A43; --ink-soft:#3D5570; --ink-faint:#5A6D82;
    --paper:#FBFAF7; --paper-warm:#F7F3EB; --card:#FFFFFF; --hairline:#E4DCCB;
    --gold:#B99249; --gold-bright:#C9A84C; --gold-soft:#E7D9B8; --gold-faint:#F4EDDD; --gold-text:#7E5F26;
    --ok:#5C7A4E; --ok-bg:#EDF2E6; --warn:#8F5A18; --warn-bg:#FBF1DE;
    --due:#8A5A2D; --due-bg:#F4E8DC;
    --navy-grad:linear-gradient(155deg,#1B3A5C,#0F2035);
    --r:18px; --r-sub:16px; --r-in:12px;
    --shadow:0 1px 2px rgba(20,42,67,.05),0 8px 28px -12px rgba(20,42,67,.14);
    --rail-x:21px; /* centro do trilho vertical */
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  button:focus-visible,a:focus-visible,textarea:focus-visible,summary:focus-visible,.termo:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}
  body{
    font-family:'Lato',-apple-system,sans-serif;background:var(--paper);color:var(--ink);
    font-size:1rem;line-height:1.55;min-height:100dvh;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 18px calc(96px + env(safe-area-inset-bottom))}

  /* ---------- header ---------- */
  header{position:relative;padding:22px 0 4px;text-align:center}
  .a11y{position:absolute;top:12px;right:0;display:flex;gap:6px}
  .a11y button{width:44px;height:44px;border-radius:11px;border:1.5px solid var(--hairline);background:var(--card);
    color:var(--ink-soft);font-weight:700;cursor:pointer;font-family:'Lato';
    transition:border-color .15s,color .15s,transform .12s ease-out}
  .a11y button:hover{border-color:var(--gold);color:var(--ink)}
  .a11y button:active{transform:scale(.93)}
  .a11y button:first-child{font-size:0.6875rem}.a11y button:last-child{font-size:0.9375rem}
  .selo{
    width:50px;height:50px;margin:0 auto 8px;border-radius:50%;
    border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.1875rem;color:var(--gold);
    letter-spacing:.06em;background:linear-gradient(160deg,#fff,var(--gold-faint));
    box-shadow:var(--shadow),0 0 0 3px var(--paper),0 0 0 4px var(--gold-soft);
  }
  .firma{font-size:0.65625rem;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .firma .oab-in{color:var(--gold-text)}
  h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.9375rem;line-height:1.14;margin-top:11px}
  h1 em{font-style:italic;color:var(--gold)}
  .sub{color:var(--ink-soft);font-size:0.875rem;margin-top:5px}
  .linha-ouro{width:54px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto 2px;border:0}
  .vigia{display:flex;align-items:center;justify-content:center;gap:7px;margin:12px auto 0;max-width:fit-content;
    font-size:0.71875rem;font-weight:700;color:var(--ok);background:var(--ok-bg);border-radius:999px;padding:7px 15px;text-align:center}
  .vigia .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulsa 2.2s infinite;flex:0 0 auto}
  @keyframes pulsa{0%,100%{box-shadow:0 0 0 0 rgba(92,122,78,.45)}50%{box-shadow:0 0 0 5px rgba(92,122,78,0)}}
  .vigia-prox{text-align:center;font-size:0.71875rem;color:var(--ink-faint);margin:6px auto 0;max-width:34rem;line-height:1.5;padding:0 12px}

  /* ---------- carteira de casos (multi-processo) ---------- */
  .carteira-resumo{margin:18px 2px 2px;font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:1rem;color:var(--ink-soft);text-align:center}
  .carteira-resumo b{color:var(--gold-text);font-style:normal}
  .casos{display:flex;gap:10px;overflow-x:auto;padding:12px 2px 6px;scrollbar-width:none;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .casos::-webkit-scrollbar{display:none}
  .caso-card{
    flex:0 0 80%;max-width:340px;scroll-snap-align:center;text-align:left;cursor:pointer;
    background:var(--card);border:1.5px solid var(--hairline);border-radius:var(--r-sub);
    padding:14px 16px 13px;position:relative;
    transition:border-color .18s,box-shadow .18s,opacity .18s,transform .12s ease-out;
    opacity:.86;font-family:'Lato'}
  .caso-card:active{transform:scale(.98)}
  .caso-card[aria-pressed="true"]{border-color:var(--gold);box-shadow:var(--shadow),0 0 0 1px var(--gold);opacity:1}
  .caso-topo{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .caso-num{font-size:0.625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .caso-badge{font-size:0.625rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-text);
    background:var(--gold-faint);border:1px solid var(--gold-soft);border-radius:999px;padding:2px 8px;white-space:nowrap}
  .caso-titulo{font-family:'Cormorant Garamond',serif;font-size:1.125rem;font-weight:700;line-height:1.2;
    color:var(--ink);margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .caso-status{display:flex;align-items:center;gap:6px;margin-top:7px;font-size:0.75rem;font-weight:700}
  .caso-status .dotc{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .caso-fase{font-size:0.6875rem;color:var(--ink-faint);margin-top:3px}
  .caso-cnj{font-size:0.6875rem;color:var(--ink-faint);margin-top:6px;font-variant-numeric:tabular-nums;letter-spacing:.03em}
  .casos-dots{display:flex;justify-content:center;gap:6px;padding:2px 0 4px}
  .casos-dots span{width:6px;height:6px;border-radius:999px;background:var(--hairline);transition:background .25s,width .25s ease-out}
  .casos-dots span.on{background:var(--gold);width:18px}

  /* ---------- abertura da trilha ---------- */
  .trilha-abre{margin:24px 2px 4px;text-align:center}
  .trilha-abre .kicker{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.0625rem;color:var(--gold-text)}
  .trilha-abre h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.625rem;line-height:1.2;margin-top:2px}
  .trilha-abre p{font-size:0.84375rem;color:var(--ink-soft);margin-top:6px;max-width:30rem;margin-left:auto;margin-right:auto}

  /* ---------- A TRILHA (linha do tempo vertical narrativa) ---------- */
  .trilha{position:relative;margin-top:18px;padding-left:48px}
  .trilha::before{content:'';position:absolute;left:var(--rail-x);top:14px;bottom:14px;width:2px;
    background:linear-gradient(180deg,var(--gold) 0%,var(--gold-soft) 55%,var(--hairline) 100%);border-radius:2px}
  .marco{position:relative;padding-bottom:18px}
  .marco:last-child{padding-bottom:0}
  /* nó do marco */
  .marco .no{position:absolute;left:calc(-48px + var(--rail-x));top:4px;transform:translateX(-50%);
    width:20px;height:20px;border-radius:50%;background:var(--card);border:2.5px solid var(--hairline);z-index:2}
  .marco.feito .no{background:var(--ink);border-color:var(--ink)}
  .marco.feito .no::after{content:'';position:absolute;inset:0;margin:auto;width:7px;height:7px;border-radius:50%;background:#fff}
  .marco.atual .no{background:var(--gold-bright);border-color:var(--gold-bright);
    box-shadow:0 0 0 5px var(--gold-faint);animation:pulsoAtual 2.8s ease-in-out infinite}
  @keyframes pulsoAtual{0%,100%{box-shadow:0 0 0 5px var(--gold-faint)}50%{box-shadow:0 0 0 9px rgba(201,168,76,.12)}}
  .marco .marco-rotulo{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.1875rem;line-height:1.15;
    color:var(--ink-faint);padding-top:1px;display:flex;align-items:center;gap:9px;min-height:24px}
  .marco.feito .marco-rotulo{color:var(--ink)}
  .marco.atual .marco-rotulo{color:var(--gold-text)}
  .marco .marco-tag{font-family:'Lato';font-size:0.5625rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    border-radius:999px;padding:3px 8px;white-space:nowrap}
  .marco.feito .marco-tag{background:var(--ok-bg);color:var(--ok)}
  .marco.atual .marco-tag{background:var(--gold-faint);color:var(--gold-text);border:1px solid var(--gold-soft)}
  .marco.futuro .marco-tag{background:var(--paper-warm);color:var(--ink-faint);border:1px solid var(--hairline)}
  .marco .marco-aqui{font-size:0.6875rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-text);
    margin-top:3px;display:flex;align-items:center;gap:6px}
  .marco .marco-aqui .seta{animation:descer 2.4s ease-in-out infinite}
  @keyframes descer{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}

  /* bloco ancorado no marco ATUAL (você está aqui) */
  .ancora{margin-top:13px;position:relative}
  /* conector: une o nó do marco atual ao card "você está aqui" */
  .ancora::before{content:'';position:absolute;left:calc(-48px + var(--rail-x));top:-13px;width:2px;height:24px;
    transform:translateX(-50%);background:var(--gold-bright);z-index:1}
  .ancora-card{background:var(--card);border:1.5px solid var(--gold-soft);border-radius:var(--r);
    box-shadow:var(--shadow),0 0 0 3px var(--gold-faint);padding:20px 18px 18px;position:relative}
  .rotulo{font-size:0.625rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .status-humano{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:700;line-height:1.18;
    margin-top:6px;color:var(--ok);display:flex;align-items:center;gap:8px}
  .fase-sub{margin-top:9px;font-size:0.75rem;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .fase-sub b{color:var(--ink-soft)}
  .fase-acoes{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:13px}
  .vez{display:inline-flex;align-items:center;gap:6px;font-size:0.71875rem;font-weight:700;
    letter-spacing:.06em;border-radius:999px;padding:8px 13px;text-transform:uppercase}
  .vez.tribunal{background:var(--ok-bg);color:var(--ok)}
  .vez.escritorio{background:var(--gold-faint);color:var(--warn)}
  .ouvir{display:inline-flex;align-items:center;gap:6px;font-size:0.78125rem;font-weight:700;min-height:44px;
    border:1.5px solid var(--hairline);border-radius:999px;padding:9px 16px;background:var(--card);color:var(--ink-soft);cursor:pointer;
    transition:transform .12s ease-out,border-color .15s,color .15s}
  .ouvir:active{transform:scale(.96)}
  .ouvir.tocando{border-color:var(--gold);color:var(--gold-text)}
  .ouvir.tocando svg{animation:tocando 1.1s ease-in-out infinite}
  @keyframes tocando{50%{opacity:.3;transform:scale(.85)}}
  .vez-micro{margin-top:10px;font-size:0.8125rem;line-height:1.55;color:var(--ink-soft)}
  .fase-texto{margin-top:13px;font-size:0.9375rem;color:var(--ink-soft)}
  .passos{margin-top:12px;padding:13px 14px;background:var(--gold-faint);border-radius:12px;font-size:0.90625rem;color:var(--ink)}
  .passos b{color:var(--gold-text);font-size:0.6875rem;letter-spacing:.14em;text-transform:uppercase;display:block;margin-bottom:4px}
  .calma{margin-top:14px;display:flex;gap:8px;align-items:flex-start;font-size:0.8125rem;color:var(--ink-soft)}
  .calma b{color:var(--ok)}
  .calma-aviso b{color:var(--due)}
  .meta-proc{display:flex;flex-wrap:wrap;gap:14px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--hairline)}
  .meta-proc div{font-size:0.75rem;color:var(--ink-faint)}
  .meta-proc b{display:block;font-size:0.8125rem;color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}

  /* selo de ritmo + prova social (dentro da âncora) */
  .ritmo{margin-top:14px;display:flex;gap:9px;align-items:flex-start;padding:12px 14px;background:var(--ok-bg);
    border:1px solid var(--gold-soft);border-radius:var(--r-sub);font-size:0.8125rem;line-height:1.5;color:var(--ink-soft)}
  .ritmo .estrela{color:var(--gold);font-size:1rem;flex:0 0 auto;line-height:1.3}
  .ritmo b{color:var(--gold-text)}
  .j-prova{margin-top:10px;font-size:0.78125rem;color:var(--ink-soft);line-height:1.5;padding:0 2px}
  .j-prova b{color:var(--gold-text)}

  /* card de evento crítico, ancorado abaixo do bloco atual */
  .evento-card{margin-top:13px;padding:16px 18px;background:linear-gradient(180deg,var(--gold-faint),var(--card) 60%);
    border:1.5px solid var(--gold-soft);border-radius:var(--r);box-shadow:var(--shadow)}
  .evento-card .rotulo{color:var(--gold-text)}
  .evento-tit{font-family:'Cormorant Garamond',serif;font-size:1.3125rem;font-weight:600;color:var(--ink);line-height:1.2;margin-top:3px}
  .evento-txt{margin-top:8px;font-size:0.875rem;line-height:1.6;color:var(--ink-soft)}
  .evento-txt b{color:var(--ink)}
  .evento-data{margin-top:10px;font-size:0.71875rem;font-weight:700;letter-spacing:.08em;color:var(--gold-text);font-variant-numeric:tabular-nums}

  /* ---------- seções abaixo da trilha ---------- */
  .secao-titulo{margin:30px 2px 4px;text-align:center}
  .secao-titulo h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.5rem;line-height:1.2}
  .secao-titulo .leg{font-size:0.71875rem;color:var(--ink-faint);margin-top:2px}
  .divisor{width:54px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto 0;border:0}

  /* equipe em ação */
  .equipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .card{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .eq-cel{padding:16px}
  .eq-cel .rotulo{margin-bottom:4px}
  .eq-cel .valor{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--gold-text);line-height:1.1}
  .nota-card{font-size:0.71875rem;color:var(--ink-faint);margin-top:3px}
  .nota-card b{color:var(--ok)}
  .eq-extra{margin-top:11px;text-align:center;font-size:0.78125rem;color:var(--ink-soft);line-height:1.5}
  .eq-extra .pt{color:var(--gold)}
  .mes-card{margin-top:12px;padding:14px 18px}
  .mes-card .linha-mes{font-size:0.84375rem;color:var(--ink-soft);margin-top:4px}
  .mes-card .linha-mes b{color:var(--ink)}
  .ultima-card{margin-top:12px;padding:14px 18px;display:flex;gap:11px;align-items:flex-start}
  .ultima-card .ico{flex:0 0 auto;margin-top:2px}
  .ultima-card .corpo{font-size:0.90625rem}
  .ultima-card .corpo b{color:var(--ink)}
  .ultima-card .corpo .qd{color:var(--ink-faint)}
  .of-nota{margin-top:12px;text-align:center;font-size:0.78125rem;color:var(--ink-faint);line-height:1.5}
  .of-nota b{color:var(--gold-text)}

  /* timeline de andamentos */
  .timeline{position:relative;padding-left:26px;margin-top:14px}
  .timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:14px;width:1.5px;
    background:linear-gradient(180deg,var(--gold) 0%,var(--hairline) 70%,transparent)}
  .evento{position:relative;padding:0 0 22px}
  .evento::before{content:'';position:absolute;left:-24px;top:5px;width:11px;height:11px;border-radius:50%;
    background:var(--card);border:2.5px solid var(--gold);box-shadow:0 0 0 3px var(--paper)}
  .evento:first-child::before{background:var(--gold)}
  .evento .data{font-size:0.71875rem;font-weight:700;letter-spacing:.1em;color:var(--gold-text);font-variant-numeric:tabular-nums}
  .evento .txt{margin-top:3px;font-size:0.9375rem;color:var(--ink)}
  .evento .fonte{margin-top:2px;font-size:0.71875rem;color:var(--ink-faint);letter-spacing:.04em}
  .tl-intro{font-size:0.8125rem;color:var(--ink-soft);margin:6px 2px 0;line-height:1.55}
  .tl-intro b{color:var(--ink)}
  .ver-mais{margin:2px 0 8px;background:none;border:1.5px solid var(--hairline);border-radius:999px;
    padding:10px 18px;font-size:0.8125rem;font-weight:700;color:var(--ink-soft);cursor:pointer;min-height:44px;width:100%;
    transition:transform .12s ease-out,border-color .15s}
  .ver-mais:active{transform:scale(.98)}
  .termo{border-bottom:1.5px dotted var(--gold);cursor:pointer;position:relative}
  .termo::after{content:'';position:absolute;inset:-12px -8px}

  /* whatsapp */
  .btn-whats{display:inline-flex;align-items:center;gap:8px;background:#25613f;color:#fff;border:none;min-height:48px;padding:0 22px;
    border-radius:999px;font-family:Lato;font-size:0.875rem;font-weight:700;text-decoration:none;transition:transform .12s ease-out}
  .btn-whats:active{transform:scale(.97)}
  .btn-whats svg{flex:0 0 auto}

  /* ---------- pagamentos ---------- */
  .resumo{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .resumo .card{padding:16px}
  .resumo .rotulo{margin-bottom:4px}
  .resumo .valor{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.15}
  .resumo .ok{color:var(--ok)} .resumo .pend{color:var(--warn)}
  .fase-card{padding:20px 18px}
  .fase-card .fase-nome{font-family:'Cormorant Garamond',serif;font-size:1.375rem;font-weight:700;line-height:1.18;margin-top:6px}
  .quadro-tag{display:inline-block;margin-top:8px;font-size:0.6875rem;font-weight:700;letter-spacing:.08em;color:var(--gold-text);
    background:var(--gold-faint);border:1px solid var(--gold-soft);border-radius:6px;padding:3px 9px;text-transform:uppercase}
  .bol{margin-top:12px;padding:18px}
  .bol-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .bol .venc{font-size:0.75rem;color:var(--ink-faint)}
  .bol .venc b{display:block;font-size:1.0625rem;color:var(--ink);font-variant-numeric:tabular-nums}
  .bol .valor{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;line-height:1.15}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:0.6875rem;font-weight:700;letter-spacing:.08em;
    border-radius:999px;padding:4px 11px;text-transform:uppercase}
  .pill.pago{background:var(--ok-bg);color:var(--ok)}
  .pill.pendente{background:var(--warn-bg);color:var(--warn)}
  .pill.vencido{background:var(--due-bg);color:var(--due)}
  .bol .desc{margin-top:8px;font-size:0.8125rem;color:var(--ink-soft)}
  .bol-acoes{display:flex;gap:10px;margin-top:14px}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;min-height:48px;border-radius:var(--r-in);
    font-size:0.875rem;font-weight:700;cursor:pointer;text-decoration:none;transition:transform .12s ease-out,background .18s}
  .btn:active{transform:scale(.97)}
  .btn-ouro{background:var(--ink);color:#fff;border:none}
  .btn-ouro.copiado{background:var(--ok)}
  .btn-claro{background:#fff;color:var(--ink);border:1.5px solid var(--hairline)}
  .btn svg{width:17px;height:17px;flex:0 0 auto}
  .link-cal{display:flex;align-items:center;justify-content:center;text-align:center;margin-top:12px;font-size:0.78125rem;font-weight:700;color:var(--ink-soft);
    text-decoration:none;border:1.5px dashed var(--hairline);border-radius:var(--r-in);padding:9px 12px;min-height:48px;cursor:pointer;background:none;width:100%;
    transition:transform .12s ease-out,border-color .15s}
  .link-cal:active{transform:scale(.98)}
  .barra{height:7px;border-radius:4px;background:var(--gold-faint);overflow:hidden;margin-top:10px}
  .barra i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--ok))}

  .edu details[open] summary::after{transform:rotate(45deg)}

  .estado h2{font-family:'Cormorant Garamond',serif;font-size:1.625rem;line-height:1.2;margin-top:6px}
  .estado p{color:var(--ink-soft);margin-top:8px;font-size:0.9375rem}

  .nav-btn[hidden]{display:none}
  .badge{min-width:18px;height:18px;border-radius:9px;background:var(--gold);color:#fff;font-size:0.65625rem;
    display:inline-flex;align-items:center;justify-content:center;padding:0 5px;font-variant-numeric:tabular-nums}

  /* footer */
  footer{margin-top:42px;text-align:center;font-size:0.6875rem;color:var(--ink-faint);line-height:1.7}
  footer .frase-fe{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.875rem;color:var(--ink-soft);margin-bottom:10px}
  footer .oab{letter-spacing:.18em;text-transform:uppercase}
  .autoridade{margin-top:8px;font-size:0.6875rem;color:var(--ink-faint)}
  .autoridade b{color:var(--gold-text)}

  /* toast */
  .toast{position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);
    background:var(--ink);color:#fff;font-size:0.84375rem;font-weight:700;padding:11px 20px;border-radius:999px;
    opacity:0;pointer-events:none;transition:all .25s ease-out;z-index:60;box-shadow:var(--shadow);max-width:88%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* animações de entrada */
  .entra{animation:entra .5s ease-out both}
  @keyframes entra{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  #conteudo{transition:opacity .18s ease-out}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}html{scroll-behavior:auto}}
</style>

  // glossário-tooltip na timeline
  function marcaTermos(txtEsc){
    var gl=state.dados.glossario||[]; if(!gl.length) return txtEsc;
    var s=txtEsc;
    for(var i=0;i<gl.length;i++){
      var t=gl[i].t; if(!t||t.length<4) continue;
      try{
        var re=new RegExp('(^|[^\\wÀ-ÿ>])('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')(?![\\wÀ-ÿ])','i');
        if(re.test(s)){ s=s.replace(re,function(m,a,b){ return a+'<span class="termo" data-gi="'+i+'" role="button" tabindex="0">'+b+'</span>'; }); }
      }catch(e){}
    }
    return s;
  }

  // ====== RENDER: MEU CASO (a trilha) ======
  function vProcesso(){
    var d=state.dados, ps=d.processos||[];
    if(!ps.length) return '<div class="card estado entra"><h2>Seu processo está sendo preparado</h2><p>Assim que for distribuído, ele aparece aqui automaticamente.</p></div>';
    var p=ps[Math.min(state.proc, ps.length-1)];
    var h='';

    // carteira de casos (multi-processo) — seletor com snap
    if(ps.length>1){
      var comNovidade=ps.filter(function(x){ return diasDesde((x.andamentos||[])[0]&&x.andamentos[0].data)<=7; }).length;
      var retaFinal=ps.filter(function(x){ return x.jornada>=4; }).length;
      var partes=['<b>'+ps.length+'</b> casos sob nossos cuidados'];
      if(comNovidade) partes.push('<b>'+comNovidade+'</b> com novidade esta semana');
      if(retaFinal) partes.push('<b>'+retaFinal+'</b> na reta final');
      h+='<p class="carteira-resumo entra">'+partes.join(' · ')+'</p>';
      h+='<div class="casos entra" id="casos" role="group" aria-label="Seus casos">'+ps.map(function(x,i){
        var st=statusCurto(x);
        return '<button class="caso-card" aria-pressed="'+(i===state.proc)+'" data-proc="'+i+'" aria-label="Caso '+(i+1)+' de '+ps.length+': '+esc(tituloCaso(x))+' — '+st.txt+', '+esc(x.fase||'em andamento')+'">'+
          '<div class="caso-topo"><span class="caso-num">Caso '+(i+1)+' de '+ps.length+'</span>'+
          (st.novidade?'<span class="caso-badge">novidade</span>':'')+'</div>'+
          '<div class="caso-titulo">'+esc(tituloCaso(x))+'</div>'+
          '<div class="caso-status" style="color:'+st.cor+'"><span class="dotc" style="background:'+st.cor+'"></span>'+st.txt+'</div>'+
          '<div class="caso-fase">'+esc(x.fase||'Em andamento')+(x.quadro?' · '+esc(x.quadro):'')+'</div>'+
          '<div class="caso-cnj">'+esc(x.numero)+'</div>'+
        '</button>';
      }).join('')+'</div>';
      h+='<div class="casos-dots" id="casos-dots" aria-hidden="true">'+ps.map(function(_,i){
        return '<span'+(i===state.proc?' class="on"':'')+'></span>';
      }).join('')+'</div>';
    }

    // abertura editorial da trilha
    h+='<div class="trilha-abre entra">'+
      '<div class="kicker">A história do seu caso</div>'+
      '<h2>Acompanhe a trilha, do início ao fim</h2>'+
      '<p>Cada marco abaixo é um capítulo da sua jornada. O ponto dourado mostra exatamente onde você está hoje.</p>'+
    '</div>';

    // ====== A TRILHA ======
    var marcos=['Contrato','Distribuição','Citação','Sentença','Cumprimento','Êxito'];
    var jornada=(typeof p.jornada==='number')?p.jornada:0;
    h+='<div class="trilha entra">';
    marcos.forEach(function(m,i){
      var feito=i<jornada, atual=i===jornada;
      var cls=feito?'feito':(atual?'atual':'futuro');
      var tag=feito?'Concluído':(atual?'Você está aqui':'A seguir');
      h+='<div class="marco '+cls+'">';
      h+='<div class="no" aria-hidden="true"></div>';
      h+='<div class="marco-rotulo"><span>'+m+'</span><span class="marco-tag">'+tag+'</span></div>';
      if(atual){
        h+='<div class="marco-aqui"><svg class="seta" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m0 0-6-6m6 6 6-6"/></svg> Você está aqui</div>';
        h+=ancoraAtual(p);
      }
      h+='</div>';
    });
    h+='</div>';

    // card de evento crítico (sentença favorável etc.) — ancorado logo após a trilha
    var ce=cardEvento(p);
    if(ce) h+='<div style="margin-top:14px">'+ce+'</div>';

    // compromisso marcado (audiência futura)
    if(p.atividades && p.atividades.audiencia){
      var au=p.atividades.audiencia;
      h+='<section class="evento-card entra" style="margin-top:13px"><div class="rotulo">Compromisso marcado</div>'+
        '<div style="font-size:0.9375rem;margin-top:5px"><b>'+esc(titulo(au.titulo))+'</b> — '+dataBR(au.data)+'</div>'+
        '<div style="font-size:0.78125rem;color:var(--ink-faint);margin-top:3px">Perto da data entraremos em contato com todas as orientações. Você não precisa fazer nada agora.</div></section>';
    }

    // ====== Nossa equipe em ação ======
    var atv=p.atividades;
    if(atv && (atv.tarefas_concluidas || atv.movimentos)){
      h+='<div class="secao-titulo entra"><h2>Nossa equipe em ação</h2><div class="leg">O trabalho que acontece nos bastidores do seu caso</div><hr class="divisor"/></div>';
      h+='<div class="equipe-grid entra">'+
        '<div class="card eq-cel"><div class="rotulo">Tarefas concluídas</div><div class="valor">'+(atv.tarefas_concluidas||0)+'</div><div class="nota-card">'+(atv.tarefas_concluidas?'<b>todas antes do prazo judicial</b>':'pela nossa equipe no seu caso')+'</div></div>'+
        '<div class="card eq-cel"><div class="rotulo">Movimentações</div><div class="valor">'+(atv.movimentos||0)+'</div><div class="nota-card">acompanhadas e analisadas</div></div>'+
      '</div>';
      var extras=[];
      if(atv.horas>=1) extras.push('~'+String(atv.horas).replace('.',',')+' horas de trabalho dedicadas ao seu caso');
      if(atv.publicacoes) extras.push(atv.publicacoes+' '+plural(atv.publicacoes,'publicação oficial analisada','publicações oficiais analisadas'));
      if(extras.length) h+='<div class="eq-extra entra">'+extras.join(' <span class="pt">•</span> ')+'</div>';
      // resumo do mês
      if(atv.mov_mes || atv.atv_mes){
        var mesNome=((state.dados.escritorio||{}).mes||'');
        mesNome=mesNome.charAt(0).toUpperCase()+mesNome.slice(1);
        var linhas=[];
        if(atv.mov_mes) linhas.push('<b>'+atv.mov_mes+'</b> '+plural(atv.mov_mes,'movimentação do tribunal acompanhada','movimentações do tribunal acompanhadas'));
        if(atv.atv_mes) linhas.push('<b>'+atv.atv_mes+'</b> '+plural(atv.atv_mes,'atividade concluída pela equipe','atividades concluídas pela equipe'));
        h+='<section class="card mes-card entra"><div class="rotulo">'+esc(mesNome)+' no seu caso</div>'+
          linhas.map(function(l){return '<div class="linha-mes">• '+l+'</div>';}).join('')+'</section>';
      }
      // última atividade da equipe (usa apenas atividades.ultima.por)
      if(atv.ultima && atv.ultima.titulo){
        h+='<section class="card ultima-card entra">'+
          '<svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>'+
          '<div class="corpo"><div class="rotulo">Última atividade da equipe</div>'+
          '<div style="margin-top:3px"><b>'+esc(titulo(atv.ultima.titulo))+'</b>'+
          (atv.ultima.por?' — '+esc(titulo(String(atv.ultima.por).trim().split(/\s+/)[0])):'')+
          (atv.ultima.em?' <span class="qd">('+dataBR(atv.ultima.em)+')</span>':'')+
          '</div></div></section>';
      }
      var of=state.dados.escritorio;
      if(of && of.tarefas_mes>=50){
        h+='<div class="of-nota entra">Em '+esc(of.mes)+', nossa equipe já concluiu <b>'+Number(of.tarefas_mes).toLocaleString('pt-BR')+'</b> tarefas processuais para clientes como você.</div>';
      }
    }

    // ====== Linha do tempo de andamentos ======
    var evs=p.andamentos||[];
    h+='<div class="secao-titulo entra"><h2>Linha do tempo</h2><div class="leg">'+evs.length+' '+plural(evs.length,'movimentação','movimentações')+'</div><hr class="divisor"/></div>';
    h+='<p class="tl-intro entra">A maior parte das movimentações são registros normais do tribunal e <b>não exigem nenhuma ação</b> — nem sua, nem nossa. Quando algo depende do escritório, nossa equipe cria a tarefa e conclui antes do prazo judicial.</p>';
    if(!evs.length){
      h+='<div class="card estado"><p>Ainda não há movimentações registradas pelos tribunais.<br/>Verificamos seu processo todos os dias e este espaço se atualiza sozinho.</p></div>';
    } else {
      var vis=state.expand?evs:evs.slice(0,5);
      h+='<div class="timeline entra">'+vis.map(function(e){
        return '<div class="evento"><div class="data">'+dataBR(e.data)+'</div><div class="txt">'+marcaTermos(esc(e.texto))+'</div>'+(e.fonte?'<div class="fonte">Fonte: '+esc(e.fonte)+'</div>':'')+'</div>';
      }).join('')+'</div>';
      if(evs.length>5) h+='<button class="ver-mais" id="ver-mais">'+(state.expand?'Mostrar menos':'Ver histórico completo ('+evs.length+')')+'</button>';
    }
    var bw=btnWhats(p);
    if(bw) h+='<div class="entra" style="text-align:center;margin-top:22px">'+bw+'<div style="font-size:0.75rem;color:var(--ink-faint);margin-top:8px">Atendemos '+esc(((state.dados.contato||{}).horario)||'em horário comercial')+' e respondemos cada dúvida com calma.</div></div>';
    return h;
  }

  // bloco ancorado no marco ATUAL: status humano + de quem é a vez + situação
  function ancoraAtual(p){
    var h='<div class="ancora"><section class="ancora-card">';
    var sh=statusHumano(p);
    h+='<div class="rotulo">Situação do seu caso</div>';
    h+='<div class="status-humano" style="color:'+sh.cor+'">'+sh.html+'</div>';
    h+='<div class="fase-sub">Fase: <b>'+esc(p.fase||'Em andamento')+'</b>'+(p.quadro?' · '+esc(p.quadro):'')+'</div>';
    h+='<div class="fase-acoes">'+
      (p.atividades&&p.atividades.vez?(p.atividades.vez==='escritorio'
        ?'<span class="vez escritorio">Com a nossa equipe agora</span>'
        :'<span class="vez tribunal">Aguardando o tribunal'+(p.atividades.vez_dias>1?' há '+p.atividades.vez_dias+' dias':'')+'</span>'):'')+
      '<button class="ouvir" id="ouvir-resumo" type="button"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Ouvir resumo</button>'+
    '</div>';
    if(vezMicrocopy(p)) h+='<p class="vez-micro">'+esc(vezMicrocopy(p))+'</p>';
    if(p.fase_texto) h+='<p class="fase-texto">'+esc(p.fase_texto)+'</p>';
    if(p.proximos_passos) h+='<div class="passos"><b>Próximos passos</b>'+esc(p.proximos_passos)+(p.prazo_medio?' <span style="color:var(--ink-faint)">(prazo médio: '+esc(p.prazo_medio)+')</span>':'')+'</div>';
    // calma / item pendente
    var au=p.atividades&&p.atividades.audiencia;
    var auProx=au&&diasAte(au.data)>=0&&diasAte(au.data)<=7;
    var temPend=!!state.dados.tem_vencida||auProx;
    if(!temPend){
      h+='<div class="calma"><span style="color:var(--ok);font-weight:700;flex:0 0 auto">✓</span>'+
        '<span><b>Nada pendente do seu lado.</b> Você não precisa fazer nada agora. Se algo precisar de você, a gente avisa.</span></div>';
    } else {
      var msg=state.dados.tem_vencida?'Há um boleto vencido na aba <b>Pagamentos</b>.':'Você tem uma audiência nos próximos dias — veja em <b>Compromisso marcado</b>.';
      h+='<div class="calma calma-aviso"><span style="color:var(--due);font-weight:700;flex:0 0 auto">!</span>'+
        '<span><b>Há 1 item para você.</b> '+msg+'</span></div>';
    }
    // selo de ritmo (rapidez) — MANTIDO
    if(p.rapidez){
      h+='<div class="ritmo"><span class="estrela">✦</span><span>Seu processo está <b>avançando acima do ritmo médio</b> de casos semelhantes.</span></div>';
    }
    // prova social (mesma fase)
    if(p.mesma_fase>=5){
      h+='<div class="j-prova">Você não está sozinho — <b>'+p.mesma_fase+'</b> outros clientes do escritório estão nesta mesma fase agora. O ritmo do seu caso está dentro do esperado.</div>';
    }
    // meta do processo
    h+='<div class="meta-proc">'+
      '<div>Processo<b>'+esc(p.numero)+'</b></div>'+
      (p.tipo?'<div>Ação<b>'+esc(p.tipo)+'</b></div>':'')+
      (p.distribuido_em?'<div>Distribuído em<b>'+dataBR(p.distribuido_em)+'</b></div>':'')+
    '</div>';
    h+='</section></div>';
    return h;
  }

  // ====== RENDER: PAGAMENTOS ======
  function vPagamentos(){
    var pg=state.dados.pagamentos||{resumo:{},pendentes:[],pagos:[]};
    var r=pg.resumo||{};
    var h='', hContrato='';
    var ct=state.dados.contrato;
    if(ct){
      var tot=numBR(ct.honorarios_total), vparc=numBR(ct.valor_parcela), pago=r.total_pago||0;
      var pct=tot?Math.min(100,Math.round(pago/tot*100)):0;
      hContrato='<section class="card fase-card entra" style="margin-top:14px">'+
        '<div class="rotulo">Seu contrato</div>'+
        '<div class="fase-nome">'+esc(ct.tipo||'Honorários contratados')+'</div>'+
        (ct.resort?'<span class="quadro-tag">'+esc(ct.resort)+'</span>':'')+
        '<div style="margin-top:12px">'+
          (tot!=null?'<div class="ac-linha"><span>Honorários iniciais'+(ct.parcelas>1&&vparc?'<br><small style="color:var(--ink-faint)">em '+ct.parcelas+' parcelas de '+BRL.format(vparc)+'</small>':'')+'</span><b>'+BRL.format(tot)+'</b></div>':'')+
          (ct.exito_pct?'<div class="ac-linha"><span>Honorários de êxito<br><small style="color:var(--ink-faint)">somente sobre o que você receber no final</small></span><b>'+esc(ct.exito_pct)+'%</b></div>':'')+
        '</div>'+
        (tot?'<div style="margin-top:10px"><div class="barra"><i style="width:'+pct+'%"></i></div>'+
          '<div class="nota-card" style="margin-top:5px">'+pct+'% dos honorários iniciais quitados — '+BRL.format(pago)+' pagos</div></div>':'')+
      '</section>';
    }
    h+='<div class="resumo entra">'+
      '<div class="card"><div class="rotulo">Já pago</div><div class="valor ok">'+BRL.format(r.total_pago||0)+'</div><div class="nota-card">'+(r.qtd_pagos||0)+' '+plural(r.qtd_pagos,'pagamento','pagamentos')+'</div></div>'+
      '<div class="card"><div class="rotulo">Em aberto</div><div class="valor pend">'+BRL.format(r.total_pendente||0)+'</div><div class="nota-card">'+(r.qtd_pendentes||0)+' '+plural(r.qtd_pendentes,'parcela','parcelas')+'</div></div>'+
    '</div>';
    if((pg.pendentes||[]).length){
      h+='<div class="secao-titulo entra" style="margin-top:24px"><h2>Próximas parcelas</h2><hr class="divisor"/></div>';

        return '<section class="card bol entra">'+
          '<div class="bol-head"><div class="venc">Vencimento<b>'+dataBR(b.vencimento)+'</b></div>'+
          '<div style="text-align:right"><div class="valor">'+BRL.format(b.valor)+'</div>'+
          '<span class="pill '+(b.vencido?'vencido':'pendente')+'">'+(b.vencido?'Vencido':'Em aberto')+'</span></div></div>'+
          '<div class="desc">'+esc(b.descricao)+(b.parcela?' · parcela '+esc(b.parcela):'')+'</div>'+
          '<div class="bol-acoes">'+
            (b.pix?'<button class="btn btn-ouro" data-pix="'+i+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copiar PIX</button>':'')+
            (b.boleto_url?'<a class="btn btn-claro" href="'+esc(b.boleto_url)+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 5v14M8 5v14M12 5v10m4-10v14m4-14v10"/></svg>Ver boleto</a>':'')+
          '</div>'+
          '<button class="link-cal" data-cal="'+i+'" type="button">+ Adicionar lembrete no calendário do celular</button>'+
        '</section>';
      }).join('');
    } else if(state.dados.so_exito){
      h+='<div class="card estado entra"><h2>Você só paga se ganhar</h2><p>Seu contrato é exclusivamente por êxito: <b>não há honorários iniciais nem parcelas</b>. Você só paga quando — e se — receber o resultado do seu caso.</p></div>';
    } else {
      h+='<div class="card estado entra"><h2>Tudo em dia</h2><p>Você não tem parcelas em aberto no momento.<br/>Se houver novas parcelas, elas aparecem aqui automaticamente.</p></div>';
    }
    h+=hContrato;
    if((pg.pagos||[]).length){
      h+='<div class="secao-titulo entra" style="margin-top:24px"><h2>Histórico de pagamentos</h2><hr class="divisor"/></div>';
      h+='<div class="secao-pagos"><div style="text-align:right;margin:8px 2px 0"><button id="btn-extrato" class="btn-extrato" type="button">Baixar extrato em PDF</button></div>'+
        pg.pagos.map(function(b){
          return '<section class="card bol pago-card entra"><div><div class="venc">Pago em <b>'+dataBR(b.pago_em||b.vencimento)+'</b></div>'+
          '<div class="desc" style="margin-top:3px">'+esc(b.descricao)+(b.parcela?' · '+esc(b.parcela):'')+'</div></div>'+

        }).join('')+'</div>';

    return h;

  // ====== RENDER: DÚVIDAS (FAQ + glossário + pergunte aqui) ======
  function vFaq(){
    var h='<section class="card duvidas-intro entra">'+
      '<div class="rotulo">Canal direto com a equipe</div>'+
      '<div class="fase-nome">Toda dúvida merece resposta</div>'+
      '<p>Reunimos abaixo o que os clientes mais perguntam. Se a sua dúvida não estiver aqui, escreva para a gente — respondemos em até 1 dia útil.</p>'+
      (function(){var b=btnWhats(null);return b?'<div style="margin-top:13px">'+b+'</div>':'';})()+
    '</section>';
    h+='<div class="secao-titulo entra" style="margin-top:24px"><h2>Dúvidas frequentes</h2><hr class="divisor"/></div>';
    var faq=state.dados.faq||[];
    if(faq.length){
      h+='<div class="edu entra">'+faq.map(function(f){
        return '<details><summary>'+esc(f.pergunta)+'</summary><div class="corpo-edu">'+esc(f.resposta)+'</div></details>';
      }).join('')+'</div>';
    } else {
      h+='<div class="card estado entra"><p>Em breve reuniremos aqui as dúvidas mais comuns dos nossos clientes.</p></div>';
    }
    // glossário (termos do caso, em formato de glossário)
    var gl=state.dados.glossario||[];
    if(gl.length){
      h+='<div class="secao-titulo entra" style="margin-top:24px"><h2>Palavras do seu processo</h2><div class="leg">Termos comuns, explicados sem juridiquês</div><hr class="divisor"/></div>';
      h+='<div class="edu entra">'+gl.map(function(g){
        return '<details><summary>'+esc(g.t)+'</summary><div class="corpo-edu">'+esc(titulo(g.t.charAt(0))+g.t.slice(1))+' é '+esc(g.d)+'</div></details>';
      }).join('')+'</div>';
    }
    // pergunte aqui
    h+='<div class="secao-titulo entra" style="margin-top:24px"><h2>Não encontrou? Pergunte aqui</h2><hr class="divisor"/></div>';
    h+='<section class="card duvidas-intro entra" style="padding:16px 18px">'+
      '<p style="margin-top:0;font-size:0.84375rem;color:var(--ink-soft)">Sua pergunta vai direto para a nossa equipe — <b>respondemos em até 1 dia útil</b> e a resposta aparece aqui no portal.</p>'+
      '<textarea id="pq-texto" rows="3" class="nps-area" style="margin-top:10px" placeholder="Escreva sua pergunta…"></textarea>'+
      '<button class="btn btn-ouro" id="pq-envia" style="margin-top:9px;width:100%">Enviar pergunta</button>'+
    '</section>';
    // minhas perguntas (estado local desta sessão)
    var mp=state.dados.minhas_perguntas||[];
    if(mp.length){
      h+='<div class="secao-titulo entra" style="margin-top:24px"><h2>Suas perguntas</h2><hr class="divisor"/></div>';
      h+=mp.map(function(q){
        return '<section class="card entra" style="padding:14px 18px;margin-top:10px">'+
          '<div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">'+
            '<div style="font-size:0.90625rem;font-weight:700;flex:1">'+esc(q.pergunta)+'</div>'+
            '<span class="pq-status '+(q.status==='respondida'?'respondida':'pendente')+'">'+(q.status==='respondida'?'Respondida':'Aguardando')+'</span>'+
          '</div>'+
          '<div style="font-size:0.6875rem;color:var(--ink-faint);margin-top:3px">enviada em '+dataBR(q.criado_em)+'</div>'+
          (q.resposta?'<div class="pq-resposta">'+esc(q.resposta)+'</div>':'')+
        '</section>';
      }).join('');
    }
    return h;
  }

  // ====== lembrete no calendário (iOS .ics / Android Google) ======
  function agendaCalendario(b){
    var d=String(b.vencimento||'').slice(0,10); if(!d) return;
    var dt=d.replace(/-/g,'');
    var tit='Parcela CBC Advogados — R$ '+(typeof b.valor==='number'?b.valor.toFixed(2).replace('.',','):b.valor);
    var det='Pagamento de honorários CBC Advogados. Boleto e PIX no seu portal do cliente.';
    if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){
      var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CBC Advogados//Portal//PT\r\nBEGIN:VEVENT\r\n'+
        'UID:cbc-'+dt+'-'+Math.random().toString(36).slice(2)+'\r\nDTSTART;VALUE=DATE:'+dt+'\r\n'+
        'SUMMARY:'+tit.replace(/,/g,'\\,')+'\r\nDESCRIPTION:'+det.replace(/,/g,'\\,')+'\r\n'+
        'BEGIN:VALARM\r\nTRIGGER:-PT15H\r\nACTION:DISPLAY\r\nDESCRIPTION:'+tit.replace(/,/g,'\\,')+'\r\nEND:VALARM\r\n'+
        'END:VEVENT\r\nEND:VCALENDAR';
      var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='parcela-cbc-'+d+'.ics';
      document.body.appendChild(a); a.click(); a.remove();
      toast('Abra o arquivo para salvar no seu Calendário');
    } else {
      window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(tit)+
        '&dates='+dt+'/'+dt+'&details='+encodeURIComponent(det),'_blank');
    }
  }

  // ====== extrato em PDF (gerado no aparelho) ======
  function carregaJsPDF(){
    return new Promise(function(res,rej){
      if(window.jspdf) return res();
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload=res; s.onerror=function(){rej(new Error('sem conexão'));};
      document.head.appendChild(s);
    });
  }
  function geraExtratoPDF(){
    var btn=$('btn-extrato'); if(btn){btn.disabled=true;btn.textContent='Gerando…';}
    carregaJsPDF().then(function(){
      var doc=new window.jspdf.jsPDF();
      var W=doc.internal.pageSize.getWidth(); var y=20;
      doc.setFont('times','bold'); doc.setFontSize(16); doc.setTextColor('#142A43');
      doc.text('CBC Advogados',W/2,y,{align:'center'}); y+=6;
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor('#7A8CA0');
      doc.text('Conforto, Bergonsi & Cavalari · OAB/SP 55227 · Americana-SP',W/2,y,{align:'center'}); y+=10;
      doc.setDrawColor('#B99249'); doc.line(20,y,W-20,y); y+=10;
      doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor('#142A43');
      doc.text('Extrato de honorários',20,y); y+=6;
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor('#3D5570');
      var c=state.dados.cliente||{};
      doc.text('Cliente: '+(c.nome||''),20,y); y+=5;
      doc.text('Emitido em '+new Date().toLocaleString('pt-BR')+' pelo Portal do Cliente',20,y); y+=10;
      var pg=state.dados.pagamentos||{}; var r=pg.resumo||{};
      doc.setFont('helvetica','bold'); doc.setTextColor('#5C7A4E');
      doc.text('Total pago: '+BRL.format(r.total_pago||0)+'  ('+(r.qtd_pagos||0)+' pagamento'+((r.qtd_pagos||0)===1?'':'s')+')',20,y); y+=6;
      doc.setTextColor('#A66A1F');
      doc.text('Em aberto: '+BRL.format(r.total_pendente||0)+'  ('+(r.qtd_pendentes||0)+' parcela'+((r.qtd_pendentes||0)===1?'':'s')+')',20,y); y+=10;
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor('#142A43');
      doc.text('Pago em',20,y); doc.text('Descrição',55,y); doc.text('Valor',W-20,y,{align:'right'});
      doc.setDrawColor('#E4DCCB'); doc.line(20,y+1.5,W-20,y+1.5); y+=7;
      doc.setFont('helvetica','normal'); doc.setTextColor('#3D5570');
      (pg.pagos||[]).forEach(function(b){
        if(y>270){doc.addPage();y=20;}
        doc.text(dataBR(b.pago_em||b.vencimento),20,y);
        doc.text(String(b.descricao||'Parcela de honorários').slice(0,52),55,y);
        doc.text(BRL.format(b.valor||0),W-20,y,{align:'right'}); y+=6;
      });
      if(!(pg.pagos||[]).length){doc.text('Nenhum pagamento registrado ainda.',20,y);y+=6;}
      y+=6; doc.setFontSize(7.5); doc.setTextColor('#7A8CA0');
      doc.text('Documento informativo gerado automaticamente. Valores conforme registros do sistema de cobrança.',20,y);
      doc.save('extrato-honorarios-cbc.pdf');
      if(btn){btn.disabled=false;btn.textContent='Baixar extrato em PDF';}
    }).catch(function(){
      toast('Não foi possível gerar agora — verifique sua conexão');
      if(btn){btn.disabled=false;btn.textContent='Baixar extrato em PDF';}
    });
  }

  // ====== ouvir resumo (voz nativa) ======
  var falando=false;
  function ouvirResumo(){
    if(!('speechSynthesis' in window)){ toast('Seu aparelho não suporta leitura em voz'); return; }
    var btn=$('ouvir-resumo');
    if(falando){ speechSynthesis.cancel(); falando=false; if(btn)btn.classList.remove('tocando'); return; }
    var ps=state.dados.processos||[]; var p=ps[Math.min(state.proc,ps.length-1)]; if(!p) return;
    var partes=['Situação do seu caso: tudo caminhando bem.','Fase atual: '+(p.fase||'em andamento')+'.'];
    if(p.atividades&&p.atividades.vez==='tribunal') partes.push('Neste momento aguardamos o tribunal — você não precisa fazer nada.');
    if(p.atividades&&p.atividades.vez==='escritorio') partes.push('Nossa equipe está trabalhando no seu caso agora.');
    if((p.andamentos||[])[0]) partes.push('Última movimentação, em '+dataBR(p.andamentos[0].data)+': '+p.andamentos[0].texto);
    if(p.proximos_passos) partes.push('Próximos passos: '+p.proximos_passos);
    partes.push('Qualquer novidade, este portal e a nossa equipe avisam você.');
    var u=new SpeechSynthesisUtterance(partes.join(' '));
    u.lang='pt-BR'; u.rate=0.96;
    u.onend=function(){ falando=false; if(btn)btn.classList.remove('tocando'); };
    falando=true; if(btn)btn.classList.add('tocando');
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }

  // ====== render principal ======
  function render(){
    var alvo=$('conteudo');
    var mudouAba=alvo._aba!==state.aba; alvo._aba=state.aba;
    var prm=window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(!prm && !state.semEntra && alvo.innerHTML && !alvo._primeira){
      alvo.style.opacity='0';
      clearTimeout(alvo._fade);
      alvo._fade=setTimeout(function(){ pinta(); alvo.style.opacity='1'; },170);
      return;
    }
    alvo._primeira=false;
    pinta();

    function pinta(){
      alvo.innerHTML = state.aba==='proc'?vProcesso():state.aba==='pag'?vPagamentos():state.aba==='faq'?vFaq():vAcordo();
      if(!state.semEntra){
        alvo.querySelectorAll(':scope > .entra').forEach(function(el,i){ el.style.animationDelay=Math.min(i*55,440)+'ms'; });
      }
      $('nav-proc').setAttribute('aria-pressed',state.aba==='proc');
      $('nav-pag').setAttribute('aria-pressed',state.aba==='pag');
      $('nav-acordo').setAttribute('aria-pressed',state.aba==='acordo');
      $('nav-faq').setAttribute('aria-pressed',state.aba==='faq');

      var ouvirBtn=$('ouvir-resumo'); if(ouvirBtn) ouvirBtn.addEventListener('click',ouvirResumo);
      var extBtn=$('btn-extrato'); if(extBtn) extBtn.addEventListener('click',geraExtratoPDF);
      alvo.querySelectorAll('[data-cal]').forEach(function(el){
        el.addEventListener('click',function(){ var b=state.dados.pagamentos.pendentes[+el.dataset.cal]; if(b) agendaCalendario(b); });
      });
      var pqBtn=$('pq-envia');
      if(pqBtn) pqBtn.addEventListener('click',function(){
        var txt=($('pq-texto').value||'').trim();
        if(txt.length<5){ toast('Escreva sua pergunta com um pouco mais de detalhe'); return; }
        (state.dados.minhas_perguntas=state.dados.minhas_perguntas||[]).unshift({ pergunta:txt, status:'pendente', criado_em:new Date().toISOString() });
        toast('Pergunta enviada — respondemos em até 1 dia útil');
        state.semEntra=true; render();
      });
      // glossário no toque
      alvo.querySelectorAll('.termo').forEach(function(el){
        function abreDef(){ var g=(state.dados.glossario||[])[+el.dataset.gi]; if(g) toast('“'+g.t+'”: '+g.d,7000); }
        el.addEventListener('click',abreDef);
        el.addEventListener('keydown',function(ev){ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); abreDef(); } });
      });
      // seletor de caso
      alvo.querySelectorAll('[data-proc]').forEach(function(el){
        el.addEventListener('click',function(){ state.proc=+el.dataset.proc; state.expand=false; state.semEntra=true; render(); });
      });
      // carteira: centraliza o caso selecionado + sincroniza pontinhos
      var casos=$('casos');
      if(casos){
        var sel=casos.querySelector('[aria-pressed="true"]');
        if(sel) casos.scrollLeft=Math.max(0,sel.offsetLeft-(casos.clientWidth-sel.clientWidth)/2);
        casos.addEventListener('scroll',function(){
          if(casos._raf) return;
          casos._raf=requestAnimationFrame(function(){
            casos._raf=null;
            var cards=casos.querySelectorAll('.caso-card'); if(!cards.length) return;
            var centro=casos.scrollLeft+casos.clientWidth/2, melhor=0, dist=1e9;
            cards.forEach(function(c,i){ var m=Math.abs((c.offsetLeft+c.clientWidth/2)-centro); if(m<dist){dist=m;melhor=i;} });
            document.querySelectorAll('#casos-dots span').forEach(function(dt,i){ dt.classList.toggle('on',i===melhor); });
          });
        },{passive:true});
      }
      var vm=$('ver-mais'); if(vm) vm.addEventListener('click',function(){ state.expand=!state.expand; state.semEntra=true; state.keepScroll=window.scrollY; render(); });
      // copiar PIX
      alvo.querySelectorAll('[data-pix]').forEach(function(el){
        el.addEventListener('click',function(){
          var b=state.dados.pagamentos.pendentes[+el.dataset.pix];
          (navigator.clipboard?navigator.clipboard.writeText(b.pix):Promise.reject()).then(function(){
            el.classList.add('copiado'); el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="m5 13 4 4L19 7"/></svg>PIX copiado!';
            toast('Código PIX copiado — cole no app do seu banco');
            setTimeout(function(){ el.classList.remove('copiado'); el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copiar PIX'; },3200);
          }).catch(function(){ toast('Não foi possível copiar — segure para selecionar'); });
        });
      });
      if(state.keepScroll!=null){ window.scrollTo({top:state.keepScroll,behavior:'instant'}); }
      else if(mudouAba){ window.scrollTo({top:0,behavior:'instant'}); }
      state.semEntra=false; state.keepScroll=null;
    }
  }

  $('nav-proc').addEventListener('click',function(){ state.aba='proc'; render(); });
  $('nav-pag').addEventListener('click',function(){ state.aba='pag'; render(); });
  $('nav-acordo').addEventListener('click',function(){ state.aba='acordo'; render(); });
  $('nav-faq').addEventListener('click',function(){ state.aba='faq'; render(); });

  // ====== bootstrap (saudação, vigilância, badges, autoridade) ======
  function montaTudo(){
    var j=state.dados, c=j.cliente||{};
    var temAcordo=!!j.acordo;
    var hora=new Date().getHours();
    var sauda=hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite';
    $('saudacao').innerHTML='<h1>'+sauda+', <em>'+esc(c.primeiro_nome||'cliente')+'</em></h1>'+
      '<p class="sub">Acompanhe aqui o seu caso'+(temAcordo?', seus pagamentos e seu acordo':' e seus pagamentos')+'</p>';

    // vigilância (verificado hoje ✓)
    var vg=j.vigilancia||{}, vhtml='';
    if(vg.ultima_verificacao){
      var dv=new Date(vg.ultima_verificacao);
      var opts={timeZone:'America/Sao_Paulo'};
      var ehHoje=dv.toLocaleDateString('pt-BR',opts)===new Date().toLocaleDateString('pt-BR',opts);
      var hhmm=dv.toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});
      vhtml+='<div class="vigia entra"><span class="dot"></span>'+
        (ehHoje?'Verificado hoje às '+hhmm:'Última verificação: '+dv.toLocaleDateString('pt-BR',opts)+' '+hhmm)+
        ' · monitoramento automático há '+(vg.dias_monitoramento||1)+' dias</div>';
      if(vg.proxima_verificacao) vhtml+='<div class="vigia-prox entra">Próxima verificação automática no próximo dia útil — você não precisa voltar todos os dias, a gente te avisa quando houver novidade.</div>';
    }
    $('vigia-box').innerHTML=vhtml;

    // autoridade institucional
    var inst=j.instituicao;
    if(inst){
      $('autoridade').innerHTML='Acompanhamos <b>'+Number(inst.processos_ativos||0).toLocaleString('pt-BR')+'</b> processos ativos · '+
        '<b>'+Number(inst.tarefas_ano||0).toLocaleString('pt-BR')+'</b> tarefas concluídas em '+(new Date().getFullYear())+' · '+
        '<b>'+Number(inst.casos_exito||0).toLocaleString('pt-BR')+'</b> casos conduzidos até a fase de êxito';
    }

    // badge de pendências em pagamentos
    var pend=(j.pagamentos&&j.pagamentos.resumo&&j.pagamentos.resumo.qtd_pendentes)||0;
    if(pend){ var bd=$('badge-pend'); bd.textContent=pend; bd.hidden=false; }

    // aba Acordo: só aparece se houver acordo (neste seed = null → oculta)
    if(temAcordo){
      $('nav-acordo').hidden=false;
      document.querySelector('.nav-inner').classList.add('quatro');
    }

    // frase de confiança rotativa (rodapé)
    var FRASES=[
      'Seu caso tem nome, rosto e responsável — não é um número.',
      'Verificamos cada processo todos os dias, automaticamente.',
      'Você não precisa entender de Direito: explicar é a nossa parte.',
      'Cada prazo do seu caso é monitorado pela nossa equipe.',
      'Transparência não é cortesia — é compromisso.'
    ];
    var doy=Math.floor((Date.now()-Date.UTC(new Date().getFullYear(),0,0))/86400000);
    $('frase-fe').textContent='“'+FRASES[doy%FRASES.length]+'”';

    render();
  }

  montaTudo();
})();
</script>
</body>
