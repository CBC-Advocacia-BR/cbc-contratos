<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
<meta name="robots" content="noindex, nofollow" />
<title>Meu Processo · CBC Advogados</title>
<meta name="theme-color" content="#142A43" />
<meta property="og:title" content="Meu Processo · CBC Advogados" />
<meta property="og:description" content="Acompanhe o andamento do seu processo, seus pagamentos e seu acordo — direto do celular, sem senha." />
<meta property="og:image" content="https://contratos-cbc.netlify.app/logo-navy.png" />
<meta property="og:type" content="website" />
<link rel="icon" href="/favicon.png" />
<link rel="apple-touch-icon" href="/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#142A43; --ink-soft:#3D5570; --ink-faint:#5A6D82;
    --paper:#F7F3EB; --card:#FFFFFF; --hairline:#E4DCCB;
    --gold:#B99249; --gold-soft:#E7D9B8; --gold-faint:#F4EDDD; --gold-text:#7E5F26;
    --ok:#5C7A4E; --ok-bg:#EDF2E6; --warn:#8F5A18; --warn-bg:#FBF1DE;
    --due:#8A5A2D; --due-bg:#F4E8DC;
    --r:18px; --r-sub:16px; --r-in:12px;
    --shadow:0 1px 2px rgba(20,42,67,.05),0 8px 28px -12px rgba(20,42,67,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  /* foco visível elegante (teclado/acessibilidade) */
  button:focus-visible,a:focus-visible,textarea:focus-visible,summary:focus-visible,.termo:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}
  body{
    font-family:'Lato',-apple-system,sans-serif;background:var(--paper);color:var(--ink);
    font-size:1rem;line-height:1.55;min-height:100dvh;
    background-image:radial-gradient(rgba(185,146,73,.05) 1px,transparent 1px);
    background-size:22px 22px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 18px calc(96px + env(safe-area-inset-bottom))}
  /* ---------- header ---------- */
  header{padding:20px 0 4px;text-align:center}
  .selo{
    width:48px;height:48px;margin:0 auto 8px;border-radius:50%;
    border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.125rem;color:var(--gold);
    letter-spacing:.06em;background:linear-gradient(160deg,#fff, var(--gold-faint));
    box-shadow:var(--shadow),0 0 0 3px var(--paper),0 0 0 4px var(--gold-soft);
  }
  .firma{font-size:0.65625rem;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.875rem;line-height:1.15;margin-top:10px}
  h1 em{font-style:italic;color:var(--gold)}
  .sub{color:var(--ink-soft);font-size:0.875rem;margin-top:4px}
  .linha-ouro{width:54px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto 2px;border:0}
  /* ---------- carteira de casos (multi-processo) ---------- */
  .carteira-resumo{margin:16px 2px 2px;font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:0.96875rem;color:var(--ink-soft);text-align:center}
  .carteira-resumo b{color:var(--gold);font-style:normal}
  .casos{display:flex;gap:10px;overflow-x:auto;padding:12px 2px 6px;scrollbar-width:none;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .casos::-webkit-scrollbar{display:none}
  .caso-card{
    flex:0 0 78%;max-width:340px;scroll-snap-align:center;text-align:left;cursor:pointer;
    background:var(--card);border:1.5px solid var(--hairline);border-radius:var(--r-sub);
    padding:14px 16px 13px;position:relative;
    transition:border-color .18s, box-shadow .18s, opacity .18s, transform .12s ease-out;
    opacity:.88;font-family:'Lato'
  }
  .caso-card:active{transform:scale(.98)}
  .caso-card[aria-pressed="true"]{border-color:var(--gold);box-shadow:var(--shadow),0 0 0 1px var(--gold);opacity:1}
  .caso-card[aria-pressed="true"]::after{content:'';position:absolute;inset:0 auto 0 0;width:4px;
    border-radius:16px 0 0 16px;background:linear-gradient(180deg,var(--gold),var(--gold-soft))}
  .caso-topo{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .caso-num{font-size:0.625rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .caso-badge{font-size:0.625rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-text);
    background:var(--gold-faint);border:1px solid var(--gold-soft);border-radius:999px;padding:2px 8px;white-space:nowrap}
  .caso-titulo{font-family:'Cormorant Garamond',serif;font-size:1.09375rem;font-weight:700;line-height:1.2;
    color:var(--ink);margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .caso-status{display:flex;align-items:center;gap:6px;margin-top:7px;font-size:0.75rem;font-weight:700}
  .caso-status .dotc{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .caso-fase{font-size:0.6875rem;color:var(--ink-faint);margin-top:3px}
  .caso-cnj{font-size:0.6875rem;color:var(--ink-faint);margin-top:6px;font-variant-numeric:tabular-nums;letter-spacing:.03em}
  .casos-dots{display:flex;justify-content:center;gap:6px;padding:2px 0 4px}
  .casos-dots span{width:6px;height:6px;border-radius:999px;background:var(--hairline);transition:background .25s, width .25s ease-out}
  .casos-dots span.on{background:var(--gold);width:18px}
  /* ---------- cards ---------- */
  .card{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .fase-card{margin-top:14px;padding:22px 20px 20px;position:relative}
  .fase-card::before{content:'';position:absolute;inset:0 auto 0 0;width:4px;background:linear-gradient(180deg,var(--gold),var(--gold-soft))}
  .rotulo{font-size:0.625rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .fase-nome{font-family:'Cormorant Garamond',serif;font-size:1.6875rem;font-weight:700;line-height:1.18;margin-top:6px}
  .quadro-tag{display:inline-block;margin-top:8px;font-size:0.6875rem;font-weight:700;letter-spacing:.08em;color:var(--gold-text);
    background:var(--gold-faint);border:1px solid var(--gold-soft);border-radius:6px;padding:3px 9px;text-transform:uppercase}
  .fase-texto{margin-top:14px;font-size:0.9375rem;color:var(--ink-soft)}
  .passos{margin-top:12px;padding:13px 14px;background:var(--gold-faint);border-radius:12px;font-size:0.90625rem;color:var(--ink)}
  .passos b{color:var(--gold-text);font-size:0.6875rem;letter-spacing:.14em;text-transform:uppercase;display:block;margin-bottom:4px}
  .meta-proc{display:flex;flex-wrap:wrap;gap:14px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--hairline)}
  .meta-proc div{font-size:0.75rem;color:var(--ink-faint)}
  .meta-proc b{display:block;font-size:0.8125rem;color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
  /* ---------- timeline ---------- */
  .tl-titulo{display:flex;align-items:baseline;justify-content:space-between;margin:26px 2px 12px}
  .tl-titulo h2{font-family:'Cormorant Garamond',serif;font-size:1.4375rem;font-weight:700}
  .tl-titulo span{font-size:0.71875rem;color:var(--ink-faint)}
  .timeline{position:relative;padding-left:26px}
  .timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:14px;width:1.5px;
    background:linear-gradient(180deg,var(--gold) 0%,var(--hairline) 70%,transparent)}
  .evento{position:relative;padding:0 0 22px}
  .evento::before{content:'';position:absolute;left:-24px;top:5px;width:11px;height:11px;border-radius:50%;
    background:var(--card);border:2.5px solid var(--gold);box-shadow:0 0 0 3px var(--paper)}
  .evento:first-child::before{background:var(--gold)}
  .evento .data{font-size:0.71875rem;font-weight:700;letter-spacing:.1em;color:var(--gold-text);font-variant-numeric:tabular-nums}
  .evento .txt{margin-top:3px;font-size:0.9375rem;color:var(--ink)}
  .evento .fonte{margin-top:2px;font-size:0.71875rem;color:var(--ink-faint);letter-spacing:.04em}
  .ver-mais{margin:2px 0 8px;background:none;border:1.5px solid var(--hairline);border-radius:999px;
    padding:10px 18px;font-size:0.8125rem;font-weight:700;color:var(--ink-soft);cursor:pointer;min-height:44px;width:100%;
    transition:transform .12s ease-out,border-color .15s}
  .ver-mais:active{transform:scale(.98)}
  /* ---------- pagamentos ---------- */
  .resumo{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .resumo .card{padding:16px}
  .resumo .rotulo{margin-bottom:4px}
  .resumo .valor{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:700;font-variant-numeric:tabular-nums}
  .resumo .ok{color:var(--ok)} .resumo .pend{color:var(--warn)}
  .bol{margin-top:12px;padding:18px}
  .bol-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .bol-head>div:last-child{text-align:right}
  .pago-card .venc{font-size:0.6875rem}
  .pago-card .venc b{display:inline;font-size:0.8125rem}
  .bol .venc{font-size:0.75rem;color:var(--ink-faint)}
  .bol .venc b{display:block;font-size:1.0625rem;color:var(--ink);font-variant-numeric:tabular-nums}
  .bol .valor{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;line-height:1.15}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:0.6875rem;font-weight:700;letter-spacing:.08em;
    border-radius:999px;padding:4px 11px;text-transform:uppercase}
  .pill.pago{background:var(--ok-bg);color:var(--ok)}
  .pill.pendente{background:var(--warn-bg);color:var(--warn)}
  .pill.vencido{background:var(--due-bg);color:var(--due)}
  .bol .desc{margin-top:8px;font-size:0.8125rem;color:var(--ink-soft)}
  .bol-acoes{display:flex;gap:10px;margin-top:14px}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;min-height:48px;border-radius:var(--r-in);
    font-size:0.875rem;font-weight:700;cursor:pointer;text-decoration:none;transition:transform .12s ease-out, background .18s}
  /* raio 12 padronizado */
  .btn:active{transform:scale(.97)}
  .btn-ouro{background:var(--ink);color:#fff;border:none}
  .btn-ouro.copiado{background:var(--ok)}
  .btn-claro{background:#fff;color:var(--ink);border:1.5px solid var(--hairline)}
  .btn svg{width:17px;height:17px;flex:0 0 auto}
  .secao-pagos{margin-top:26px}
  .bol.pago-card{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .bol.pago-card .valor{font-size:1.1875rem}
  /* ---------- nota fiscal por cobrança (aprovado 2026-07-02) ---------- */
  .nf-btn{flex-basis:100%;display:flex;align-items:center;justify-content:center;gap:8px;min-height:44px;margin-top:8px;border:1.5px solid var(--gold-soft);border-radius:12px;background:var(--paper);font-size:0.8125rem;font-weight:700;color:var(--ink);text-decoration:none}
  .nf-btn svg{width:17px;height:17px;flex:0 0 auto;color:var(--gold)}
  .nf-btn .seta{width:15px;height:15px;color:var(--gold-text)}
  .nf-btn:active{transform:scale(.98)}
  .nf-aguarde{flex-basis:100%;display:flex;align-items:center;justify-content:center;gap:7px;min-height:40px;margin-top:8px;border:1.5px dashed var(--gold-soft);border-radius:12px;font-size:0.71875rem;font-weight:700;color:var(--ink-faint);text-align:center;padding:4px 10px}
  .nf-aviso{margin-top:9px;font-size:0.71875rem;color:var(--ink-faint);display:flex;align-items:center;gap:6px}
  .nf-aviso svg{width:14px;height:14px;flex:0 0 auto}
  .nf-rodape{font-size:0.6875rem;color:var(--ink-faint);text-align:center;line-height:1.55;margin-top:14px}
  .nf-ano{display:flex;align-items:center;justify-content:center;gap:8px;min-height:46px;margin-top:10px;width:100%;border:1.5px solid var(--gold);border-radius:12px;background:#fff;font-size:0.8125rem;font-weight:800;color:var(--ink);text-decoration:none;font-family:Lato}
  .nf-ano svg{width:17px;height:17px;color:var(--gold);flex:0 0 auto}
  /* ---------- nav inferior ---------- */
  nav{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:rgba(255,255,255,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--hairline);padding:8px 18px calc(8px + env(safe-area-inset-bottom));
  }
  .nav-inner{max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:var(--paper);
    border-radius:999px;padding:4px;border:1px solid var(--hairline)}
  .nav-inner.quatro{grid-template-columns:repeat(4,1fr)}
  .nav-inner.quatro .nav-btn{font-size:0.6875rem;gap:3px;padding:0 1px}
  .nav-inner.quatro .nav-btn svg{width:15px;height:15px}
  .nav-btn{display:flex;align-items:center;justify-content:center;gap:5px;min-height:46px;border-radius:999px;
    border:none;background:transparent;font-family:'Lato';font-size:0.78125rem;font-weight:700;color:var(--ink-faint);
    cursor:pointer;transition:background .2s ease-out,color .2s ease-out,transform .12s ease-out;padding:0 2px}
  .nav-btn:active{transform:scale(.93)}
  .nav-btn svg{width:16px;height:16px}
  .nav-btn[aria-pressed="true"]{background:var(--ink);color:#fff;box-shadow:var(--shadow)}
  .nav-btn[hidden]{display:none}
  .nav-inner.cinco{grid-template-columns:repeat(5,1fr)}
  .nav-inner.cinco .nav-btn{font-size:0.625rem;gap:2px;padding:0 1px}
  .nav-inner.cinco .nav-btn svg{width:14px;height:14px}
  /* ---- conversas com a equipe (chat) ---- */
  .chat-lista{max-height:56vh;min-height:200px;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:8px;background:linear-gradient(180deg,rgba(185,146,73,.05),transparent 120px)}
  .chat-vazio{text-align:center;color:var(--ink-faint);font-size:0.84375rem;padding:28px 12px;line-height:1.5}
  .cmsg{max-width:86%;padding:9px 13px;border-radius:14px;font-size:0.90625rem;line-height:1.45;overflow-wrap:break-word;white-space:pre-line}
  .cmsg .autor{display:block;font-weight:800;font-size:0.75rem;color:var(--gold-text);margin-bottom:2px}
  .cmsg .hora{display:block;font-size:0.625rem;color:var(--ink-faint);margin-top:4px;text-align:right}
  .cmsg.meu{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:4px}
  .cmsg.meu .hora{color:rgba(255,255,255,.55)}
  .cmsg.deles{align-self:flex-start;background:var(--paper);border:1px solid var(--gold-soft);border-bottom-left-radius:4px}
  .chat-compose{display:flex;gap:8px;align-items:flex-end;padding:10px 12px;border-top:1px solid var(--gold-soft);background:var(--paper)}
  .chat-compose textarea{flex:1;resize:none;border:1.5px solid var(--gold-soft);border-radius:14px;padding:10px 13px;font:inherit;font-size:16px;max-height:120px;background:#fff}
  .chat-compose textarea:focus{outline:none;border-color:var(--gold)}
  .chat-send{flex:0 0 auto;width:46px;height:46px;border-radius:50%;border:none;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .chat-send:disabled{opacity:.5}
  .chat-send svg{width:20px;height:20px}
  .chat-dia{align-self:center;font-size:0.625rem;color:var(--ink-faint);background:var(--paper);border:1px solid var(--gold-soft);border-radius:999px;padding:3px 12px;margin:6px 0 2px}
  /* vez (de quem é a bola) */
  .fase-acoes{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:12px}
  .vez{display:inline-flex;align-items:center;gap:6px;font-size:0.71875rem;font-weight:700;
    letter-spacing:.06em;border-radius:999px;padding:8px 13px;text-transform:uppercase}
  .vez.tribunal{background:var(--ok-bg);color:var(--ok)}
  .vez.escritorio{background:var(--gold-faint);color:var(--warn)}
  /* pergunte aqui */
  .pq-status{font-size:0.625rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:999px;padding:3px 9px}
  .pq-status.pendente{background:var(--warn-bg);color:var(--warn)}
  .pq-status.respondida{background:var(--ok-bg);color:var(--ok)}
  .pq-resposta{margin-top:8px;padding:11px 13px;background:var(--ok-bg);border-radius:var(--r-in);font-size:0.875rem}
  .link-cal{display:flex;align-items:center;justify-content:center;text-align:center;margin-top:12px;font-size:0.78125rem;font-weight:700;color:var(--ink-soft);
    text-decoration:none;border:1.5px dashed var(--hairline);border-radius:var(--r-in);padding:9px 12px;min-height:48px;cursor:pointer;background:none;width:100%;
    transition:transform .12s ease-out,border-color .15s}
  .link-cal:active{transform:scale(.98)}
  .ouvir{display:inline-flex;align-items:center;gap:6px;font-size:0.78125rem;font-weight:700;min-height:44px;
    border:1.5px solid var(--hairline);border-radius:999px;padding:9px 16px;background:var(--card);color:var(--ink-soft);cursor:pointer;
    transition:transform .12s ease-out,border-color .15s,color .15s}
  .ouvir:active{transform:scale(.96)}
  .ouvir.tocando{border-color:var(--gold);color:var(--gold-text)}
  .ouvir.tocando svg{animation:tocando 1.1s ease-in-out infinite}
  @keyframes tocando{50%{opacity:.3;transform:scale(.85)}}
  /* ---------- jornada do processo ---------- */
  .jornada{margin-top:12px;padding:18px 14px 14px}
  .j-track{display:flex;align-items:flex-start}
  .j-step{flex:1;text-align:center;position:relative}
  .j-step::before{content:'';position:absolute;top:6.5px;left:-50%;width:100%;height:2px;background:var(--hairline)}
  .j-step:first-child::before{display:none}
  .j-step.done::before{background:var(--gold)}
  .j-dot{width:15px;height:15px;border-radius:50%;margin:0 auto;background:var(--card);border:2.5px solid var(--hairline);position:relative;z-index:1}
  .j-step.done .j-dot{background:var(--gold);border-color:var(--gold)}
  .j-step.atual .j-dot{box-shadow:0 0 0 4px var(--gold-faint);animation:pulsoAtual 2.6s ease-in-out infinite}
  @keyframes pulsoAtual{0%,100%{box-shadow:0 0 0 4px var(--gold-faint)}50%{box-shadow:0 0 0 8px rgba(185,146,73,.10)}}
  .j-lbl{font-size:0.625rem;letter-spacing:.02em;margin-top:7px;padding:0 2px;color:var(--ink-faint);font-weight:700;text-transform:uppercase;line-height:1.25;hyphens:auto;overflow-wrap:break-word;word-break:normal}
  .j-step.done .j-lbl{color:var(--ink)}
  .j-step.atual .j-lbl{color:var(--gold)}
  .j-rapidez{margin-top:13px;text-align:center;font-size:0.78125rem;color:var(--gold-text);font-weight:700}
  .calma{margin-top:14px;display:flex;gap:8px;align-items:flex-start;padding:0 2px;font-size:0.8125rem;color:var(--ink-soft)}
  .calma b{color:var(--ok)}
  .calma-aviso b{color:var(--due)}
  .vez-micro{margin-top:9px;font-size:0.8125rem;line-height:1.55;color:var(--ink-soft);padding:0 2px}
  .evento-card{margin-top:12px;padding:15px 18px}
  .evento-tit{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;color:var(--ink);line-height:1.2;margin-top:3px}
  .evento-txt{margin-top:8px;font-size:0.875rem;line-height:1.6;color:var(--ink-soft)}
  .evento-txt b{color:var(--ink)}
  .evento-data{margin-top:10px;font-size:0.71875rem;font-weight:700;letter-spacing:.08em;color:var(--gold-text);font-variant-numeric:tabular-nums}
  .btn-whats{display:inline-flex;align-items:center;gap:8px;background:#25613f;color:#fff;border:none;min-height:44px;padding:0 20px;border-radius:999px;font-family:Lato;font-size:0.875rem;font-weight:700;text-decoration:none}
  .btn-whats svg{flex:0 0 auto}
  .pag-ok{display:flex;gap:12px;align-items:flex-start;background:var(--ok-bg);border:1px solid var(--gold-soft);border-radius:var(--r-sub);padding:14px 16px;margin-bottom:14px;font-size:0.875rem;line-height:1.55}
  .pag-ok b{color:var(--ok)}
  .vigia-prox{text-align:center;font-size:0.71875rem;color:var(--ink-faint);margin:5px auto 0;max-width:34rem;line-height:1.5;padding:0 12px}
  .j-prova{margin-top:9px;text-align:center;font-size:0.75rem;color:var(--ink-soft);line-height:1.5}
  .j-prova b{color:var(--gold-text)}
  .equipe-fotos{display:flex;margin-top:10px;padding-left:10px}
  .equipe-fotos img{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2.5px solid #fff;box-shadow:var(--shadow);margin-left:-10px;background:var(--gold-faint)}
  /* ---------- acordo / prestacao de contas ---------- */
  .ac-linha{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px dashed var(--hairline);font-size:0.90625rem;color:var(--ink-soft)}
  .ac-linha:last-child{border-bottom:none}
  .ac-linha b{color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}
  .ac-destaque{margin-top:12px;padding:20px;background:linear-gradient(150deg,#0F2035,#1B3A5C);color:#fff;border:none}
  .ac-destaque .valor-big{font-family:'Cormorant Garamond',serif;font-size:2.25rem;font-weight:700;font-variant-numeric:tabular-nums;margin-top:4px}
  .ac-nota{padding:18px 20px;margin-top:12px}
  .ac-nota p{font-size:0.84375rem;color:var(--ink-soft)}
  /* ---------- NPS + indicacao ---------- */
    .nps-notas{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:12px}
  .nps-n{height:48px;border-radius:10px;border:1.5px solid var(--hairline);background:#fff;padding:0;
    font-family:'Lato';font-weight:700;font-size:0.9375rem;cursor:pointer;color:var(--ink-soft);
    transition:background .15s,color .15s,border-color .15s,transform .15s ease-out}
  .nps-n:active{transform:scale(.93)}
  .nps-n.sel{background:var(--ink);color:#fff;border-color:var(--ink);transform:scale(1.08)}
  .nps-area{width:100%;border:1.5px solid var(--hairline);border-radius:var(--r-in);padding:11px 13px;
    font-family:'Lato';font-size:1rem;color:var(--ink);resize:vertical;background:#fff}
  .badge{min-width:18px;height:18px;border-radius:9px;background:var(--gold);color:#fff;font-size:0.65625rem;
    display:inline-flex;align-items:center;justify-content:center;padding:0 5px;font-variant-numeric:tabular-nums}
  .badge[hidden]{display:none}
  .badge{animation:badgeIn .35s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes badgeIn{from{transform:scale(.4);opacity:0}}
  /* ---------- skeleton / estados ---------- */
  .skel{border-radius:var(--r);background:linear-gradient(100deg,#EFE9DC 40%,#F7F3EB 50%,#EFE9DC 60%);
    background-size:200% 100%;animation:shimmer 1.4s infinite}
  @keyframes shimmer{to{background-position:-200% 0}}
  .estado{padding:60px 24px;text-align:center}
  .estado h2{font-family:'Cormorant Garamond',serif;font-size:1.625rem;margin-top:14px}
  .estado p{color:var(--ink-soft);margin-top:8px;font-size:0.9375rem}
  .toast{position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);
    background:var(--ink);color:#fff;font-size:0.84375rem;font-weight:700;padding:11px 20px;border-radius:999px;
    opacity:0;pointer-events:none;transition:all .25s ease-out;z-index:60;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .entra{animation:entra .45s ease-out both}
  @keyframes entra{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .tl-titulo h2{line-height:1.2}
  .estado h2{line-height:1.2}
  .resumo .valor{line-height:1.15}
  .ac-destaque .valor-big{line-height:1.1}
  .nota-card{font-size:0.75rem;color:var(--ink-faint)}
  .barra{height:7px;border-radius:4px;background:var(--gold-faint);overflow:hidden;margin-top:10px}
  .barra i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--ok))}
  .sem-anim .entra{animation:none!important}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}html{scroll-behavior:auto}}
  footer{margin-top:42px;text-align:center;font-size:0.6875rem;color:var(--ink-faint);line-height:1.7}
  footer .oab{letter-spacing:.18em;text-transform:uppercase}
  .autoridade{margin-top:8px;font-size:0.6875rem;color:var(--ink-faint)}
  .autoridade b{color:var(--gold-text)}
  /* ---------- vigilância (verificado hoje) + recesso ---------- */
  .vigia{display:flex;align-items:center;justify-content:center;gap:7px;margin:10px auto 0;max-width:fit-content;
    font-size:0.71875rem;font-weight:700;color:var(--ok);background:var(--ok-bg);border-radius:999px;padding:7px 15px}
  .vigia .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulsa 2.2s infinite}
  @keyframes pulsa{0%,100%{box-shadow:0 0 0 0 rgba(92,122,78,.45)}50%{box-shadow:0 0 0 5px rgba(92,122,78,0)}}
  .recesso{margin-top:10px;padding:13px 15px;border-radius:var(--r-sub);background:var(--warn-bg);border:1px solid var(--gold-soft);
    font-size:0.8125rem;color:var(--ink);display:flex;gap:10px;align-items:flex-start}
  .recesso b{color:var(--warn)}
  /* ---------- status humano no card da fase (#73) ---------- */
  .status-humano{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:700;line-height:1.18;
    margin-top:6px;color:var(--ok);display:flex;align-items:center;gap:8px}
  .fase-nome.menor{font-size:1.375rem}
  .fase-sub{margin-top:8px;font-size:0.75rem;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .fase-sub b{color:var(--ink-soft)}
  /* ---------- acessibilidade A+/A− (#76) ---------- */
  .a11y{position:absolute;top:10px;right:0;display:flex;gap:6px}
  .a11y button{width:44px;height:44px;border-radius:11px;border:1.5px solid var(--hairline);background:var(--card);
    color:var(--ink-soft);font-weight:700;cursor:pointer;font-family:'Lato';
    transition:border-color .15s,color .15s,transform .12s ease-out}
  .a11y button:hover{border-color:var(--gold);color:var(--ink)}
  .a11y button:active{transform:scale(.93)}
  .a11y button:first-child{font-size:0.6875rem}.a11y button:last-child{font-size:0.9375rem}
  header{position:relative}
  .oab-in{color:var(--gold-text)}
  /* ---------- glossário-tooltip (#63) ---------- */
  .termo{border-bottom:1.5px dotted var(--gold);cursor:pointer;position:relative}
  .termo::after{content:'';position:absolute;inset:-12px -8px}
  /* ---------- educação por fase (#64/65) ---------- */
  .edu{margin-top:12px}
  .edu details{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-sub);margin-top:8px;overflow:hidden}
  .edu summary{padding:14px 16px;font-size:0.875rem;font-weight:700;color:var(--ink);cursor:pointer;list-style:none;
    display:flex;align-items:center;justify-content:space-between;min-height:48px}
  .edu summary::-webkit-details-marker{display:none}
  .edu summary::after{content:'+';color:var(--gold);font-size:1.1875rem;font-weight:400;line-height:1;transition:transform .25s ease}
  .edu details[open] summary::after{transform:rotate(45deg)}
  @supports (interpolate-size: allow-keywords){
    :root{interpolate-size:allow-keywords}
    .edu details::details-content{block-size:0;overflow:hidden;transition:block-size .3s ease,content-visibility .3s allow-discrete}
    .edu details[open]::details-content{block-size:auto}
  }
  .edu .corpo-edu{padding:0 16px 15px;font-size:0.875rem;color:var(--ink-soft)}
  .edu .nao{margin-top:10px;padding:11px 13px;background:var(--ok-bg);border-radius:11px;font-size:0.84375rem}
  .edu .nao b{color:var(--ok)}
  .edu .faq-q{font-weight:700;color:var(--ink);margin-top:11px;font-size:0.84375rem}
  .edu .faq-a{font-size:0.84375rem;margin-top:2px}
  /* ---------- equipe duotone (#82) + resumo do mês ---------- */
  .equipe-fotos img{filter:grayscale(1) sepia(.28) hue-rotate(172deg) saturate(.85)}
  .mes-card{margin-top:10px;padding:14px 18px}
  .mes-card .linha-mes{font-size:0.84375rem;color:var(--ink-soft);margin-top:4px}
  .mes-card .linha-mes b{color:var(--ink)}
  /* ---------- crossfade entre abas (#77) ---------- */
  #conteudo{transition:opacity .18s ease-out}
  /* ---------- divisor entre seções (#80) ---------- */
  .divisor{width:54px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
    margin:30px auto 2px;border:0}
</style>
</head>
<body>

<script>
(function(){
  'use strict';
  var token = new URLSearchParams(location.search).get('t') || (location.hash||'').replace('#','');
  var $ = function(id){ return document.getElementById(id); };
  var BRL = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
  var dataBR = function(iso){ if(!iso) return '—'; var p=String(iso).slice(0,10).split('-'); return p[2]+'/'+p[1]+'/'+p[0]; };
  // aceita numero, "1234.56" e formato BR "1.234,56"
  var plural = function(n,um,varios){ return (Number(n)||0)===1 ? um : varios; };
  var numBR = function(v){
    if(v==null||v==='') return null;
    if(typeof v==='number') return v;
    var s=String(v).trim();
    if(/,\d{1,2}$/.test(s)) s=s.replace(/\./g,'').replace(',','.');
    var n=parseFloat(s); return isNaN(n)?null:n;
  };
  var esc = function(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); };
  var titulo = function(s){ return String(s||'').toLowerCase().replace(/(^|\s)\S/g,function(c){return c.toUpperCase();}); };
  var state = { dados:null, proc:0, aba:'proc', expand:false, semEntra:false, keepScroll:null };
  // conversas com a equipe (chat). MVP: polling com a aba aberta.
  // ATIVAÇÃO FUTURA (não ligar sem ler CHAT-PORTAL.md): Realtime do Supabase
  // no lugar do polling — flag abaixo fica false até lá.
  var CHAT_REALTIME = false;
  var CHAT_POLL_MS = 20000;
  var chat = { msgs:[], lastId:0, carregado:false, timer:null, enviando:false };

  function toast(msg, ms){ var t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');}, ms||2600); }

  // acessibilidade: tamanho da letra em 3 niveis (persistido) (#76)
  (function(){
    var nivel=0; try{ nivel=Math.min(2,Math.max(0,+localStorage.getItem('cbc_fonte')||0)); }catch(e){ /* sem storage */ }
    function aplica(){ document.documentElement.style.fontSize=(100+nivel*12.5)+'%'; try{localStorage.setItem('cbc_fonte',String(nivel));}catch(e){ /* ok */ } }
    aplica();
    $('fonte-mais').addEventListener('click',function(){ if(nivel<2){nivel++;aplica();} });
    $('fonte-menos').addEventListener('click',function(){ if(nivel>0){nivel--;aplica();} });
  })();

  // helpers da carteira de casos (multi-processo)
  function diasDesde(d){
    if(!d) return 999;
    var t=new Date(String(d).slice(0,10)).getTime();
    return isNaN(t)?999:Math.floor((Date.now()-t)/86400000);
  }
  function tituloCaso(x){
    // apelido legível: tipo da ação em caixa normal; fallback no nº
    var t = String(x.tipo||'').trim();
    return t ? titulo(t) : ('Processo '+x.numero);
  }
  function statusCurto(x){
    var dias = diasDesde((x.andamentos||[])[0]&&x.andamentos[0].data);
    var novidade = dias <= 7;
    if(x.jornada >= 4) return { txt:'Reta final', cor:'var(--gold-text)', novidade:novidade };
    if(novidade) return { txt:'Novidade recente', cor:'var(--gold-text)', novidade:true };
    if(dias > 30) return { txt:'Sob vigilância diária', cor:'var(--ok)', novidade:false };
    return { txt:'Caminhando bem', cor:'var(--ok)', novidade:false };
  }

  // status humano calculado (#73): leitura tranquilizadora, cor coerente com a carteira
  function statusHumano(p){
    var svg='<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex:0 0 auto"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>';
    var d=(p.andamentos&&p.andamentos[0])?p.andamentos[0].data:null;
    var dias=d?Math.floor((Date.now()-new Date(String(d).slice(0,10)).getTime())/86400000):999;
    var reta=p.jornada>=4, nov=dias<=7;
    var txt=reta?'Reta final do seu caso':(nov?'Novidades recentes no seu caso':(dias>30?'Sob vigilância diária — tudo em ordem':'Tudo caminhando bem'));
    return { html: svg+'<span>'+txt+'</span>', cor: (reta||nov)?'var(--gold-text)':'var(--ok)' };
  }

  // microcopy "de quem é a vez" + silêncio saudável (tribunal vs escritório)
  function vezMicrocopy(p){
    var a=p.atividades; if(!a||!a.vez) return '';
    if(a.vez==='escritorio') return 'Estamos com uma tarefa em aberto no seu caso e já cuidando dela — é a nossa vez de agir.';
    var dias=a.vez_dias||0;
    var porEspera={
      juiz:'Seu caso está concluso para decisão: aguardamos o juiz analisar. Nessa fase, o silêncio costuma ser sinal de que tudo segue seu curso.',
      parte:'Corre um prazo da outra parte (ou uma etapa entre os advogados). É um tempo normal e previsto pela lei.',
      pericia:'Aguardamos uma etapa técnica do processo (perícia ou diligência). Assim que o resultado chegar, retomamos.',
      audiencia:'O próximo passo é uma audiência já no horizonte — perto da data falamos com você.'
    };
    var base=porEspera[p.espera]||'Neste momento o próximo passo cabe ao tribunal — por isso não há ação recente da nossa parte.';
    base += dias>=21 ? ' A fila está um pouco mais lenta que o usual, mas verificamos o seu processo todos os dias úteis.'
                     : ' Continuamos verificando o seu processo todos os dias úteis.';
    return base;
  }
  // card de evento crítico (citação, sentença favorável, decisão neutra, acordo)
  function cardEvento(p){
    var ev=p.evento; if(!ev||ev.tipo==='audiencia') return ''; // audiência já tem "Compromisso marcado"
    var M={
      sentenca_favoravel:{cor:'var(--gold)',tit:'Saiu a decisão — e foi favorável a você! 🎉',txt:'O juiz reconheceu o seu direito. É uma grande conquista. <b>Um detalhe importante:</b> a vitória ainda não é o dinheiro na conta — agora começa o <b>cumprimento de sentença</b> (cálculos e liberação dos valores), que acompanhamos de perto. Em breve detalhamos os próximos passos.'},
      decisao_neutra:{cor:'var(--gold)',tit:'Houve uma decisão no seu caso',txt:'O juiz analisou o seu processo e proferiu uma decisão. Nossa equipe já está estudando o conteúdo e as melhores opções e <b>vai entrar em contato com você</b> para explicar tudo com calma. Você não precisa fazer nada agora.'},
      citacao:{cor:'var(--ok)',tit:'A outra parte foi oficialmente notificada',txt:'A Justiça comunicou oficialmente a outra parte sobre o seu processo. Isso é um passo positivo: o seu caso entrou em movimento. A partir daqui corre o prazo de resposta dela — etapa normal e prevista.'},
      acordo:{cor:'var(--ok)',tit:'Acordo homologado',txt:'Um acordo foi homologado pela Justiça no seu caso. Os detalhes e valores aparecem na aba Acordo. É um caminho que costuma trazer a solução mais rápida.'}
    };
    var c=M[ev.tipo]; if(!c) return '';
    return '<section class="card evento-card entra" style="border-left:4px solid '+c.cor+'">'+
      '<div class="rotulo">Novidade importante</div>'+
      '<div class="evento-tit">'+c.tit+'</div>'+
      '<p class="evento-txt">'+c.txt+'</p>'+
      '<div class="evento-data">Registrado em '+dataBR(ev.data)+'</div></section>';
  }
  // WhatsApp 1-clique contextualizado (número vem de bot_config.portal_contato)
  function linkWhats(p){
    var w=(state.dados.contato||{}).whatsapp; if(!w) return '';
    var nome=(state.dados.cliente||{}).primeiro_nome||'';
    var proc=(p&&p.numero&&p.numero!=='em distribuição')?(' (processo '+p.numero+')'):'';
    return 'https://wa.me/'+w+'?text='+encodeURIComponent('Olá! Sou '+nome+proc+'. Gostaria de tirar uma dúvida sobre o meu caso.');
  }
  function btnWhats(p,rotulo){
    var l=linkWhats(p); if(!l) return '';

  // contador "dias sem nenhuma pendência sua" (persistido por token no aparelho)
  function diasSemPendencia(temPend){
    try{
      var k='cbc_sempend_'+token.slice(0,8);
      if(temPend){ localStorage.removeItem(k); return 0; }
      var v=localStorage.getItem(k);
      if(!v){ v=new Date().toISOString().slice(0,10); localStorage.setItem(k,v); }
      return Math.floor((Date.now()-new Date(v).getTime())/86400000);
    }catch(e){ return 0; }
  }
  function diasAte(d){ if(!d) return 999; return Math.ceil((new Date(String(d).slice(0,10)).getTime()-Date.now())/86400000); }

  // ---------- métricas de uso (beacon; LGPD: só token + tipo de evento) ----------
  var _ev=[], _t0=Date.now(), _flushedTempo=false;
  function track(e,a,v){ try{ _ev.push(v!=null?{e:e,a:a||'',v:String(v)}:{e:e,a:a||''}); if(_ev.length>=12) flushEv(); }catch(_){} }
  function flushEv(final){
    try{
      if(final && !_flushedTempo){ _flushedTempo=true; var s=Math.round((Date.now()-_t0)/1000); if(s>0&&s<7200) _ev.push({e:'tempo',v:String(s)}); }
      if(!_ev.length) return;
      var payload=JSON.stringify({ t:token, eventos:_ev.splice(0,50) });
      if(navigator.sendBeacon){ navigator.sendBeacon('/.netlify/functions/portal-track', new Blob([payload],{type:'application/json'})); }
      else { fetch('/.netlify/functions/portal-track',{method:'POST',headers:{'Content-Type':'application/json'},body:payload,keepalive:true}).catch(function(){}); }
    }catch(_){}
  }
  document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') flushEv(true); });
  window.addEventListener('pagehide', function(){ flushEv(true); });
  setInterval(function(){ if(_ev.length) flushEv(); }, 20000);
  document.addEventListener('click', function(ev){
    var t = ev.target && ev.target.closest ? ev.target.closest('.nav-btn,[data-pix],.link-cal,#btn-extrato,#ouvir-resumo,.btn-whats,#pq-envia,.nps-n,#ver-mais,.bol-acoes a.btn-claro') : null;
    if(!t) return;
    if(t.classList.contains('nav-btn')){ track('tab', (t.id||'').replace('nav-','')); return; }
    var a = t.hasAttribute('data-pix')?'copiar_pix'
      : t.classList.contains('link-cal')?'lembrete_cal'
      : t.id==='btn-extrato'?'extrato_pdf'
      : t.id==='ouvir-resumo'?'ouvir_resumo'
      : t.classList.contains('btn-whats')?'whatsapp'
      : t.id==='pq-envia'?'pergunta'
      : t.classList.contains('nps-n')?'nps'
      : t.id==='ver-mais'?'ver_historico'
      : t.matches('.bol-acoes a.btn-claro')?'ver_boleto':'';
    if(a) track('click', a);
  }, true);

  // glossário-tooltip (#63): termos sublinhados na timeline, definição no toque
  function marcaTermos(txtEsc){
    var gl=state.dados.glossario||[]; if(!gl.length) return txtEsc;
    var s=txtEsc;
    for(var i=0;i<gl.length;i++){
      var t=gl[i].t; if(!t||t.length<4) continue;
      try{
        var re=new RegExp('(^|[^\\wÀ-ÿ>])('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')(?![\\wÀ-ÿ])','i');
        if(re.test(s)){ s=s.replace(re,function(m,a,b){ return a+'<span class="termo" data-gi="'+i+'" role="button" tabindex="0">'+b+'</span>'; }); }
      }catch(e){ /* termo invalido em regex */ }
    }
    return s;
  }

  // números que sobem (#81) — sensação de sistema vivo
  function countUp(raiz){
    if(window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    raiz.querySelectorAll('[data-count]').forEach(function(el){
      var fim=+el.dataset.count||0; if(fim<2) return;
      var t0=null;
      function tick(t){ if(!t0)t0=t; var k=Math.min(1,(t-t0)/650); var e=1-Math.pow(1-k,3);
        el.textContent=Math.round(fim*(0.25+0.75*e)).toLocaleString('pt-BR');
        if(k<1)requestAnimationFrame(tick); else el.textContent=fim.toLocaleString('pt-BR'); }
      requestAnimationFrame(tick);
    });
  }

  // ---------- conversas com a equipe (chat) ----------
  function chatHoraFmt(iso){
    try{ var d=new Date(iso); return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; }
  }
  function chatDiaFmt(iso){
    var hoje = new Date(); var d = new Date(iso);
    var mesmo = function(a,b){ return a.toDateString()===b.toDateString(); };
    if(mesmo(d,hoje)) return 'Hoje';
    var ontem = new Date(hoje.getTime()-86400000);
    if(mesmo(d,ontem)) return 'Ontem';
    return d.toLocaleDateString('pt-BR');
  }
  function chatMsgsHtml(){
    if(!chat.msgs.length){
      return '<div class="chat-vazio">Nenhuma mensagem ainda.<br/>Escreva abaixo — a nossa equipe responde aqui mesmo, normalmente em até 1 dia útil.</div>';
    }
    var h='', diaAnt='';
    chat.msgs.forEach(function(m){
      var dia = chatDiaFmt(m.criada_em);
      if(dia!==diaAnt){ h += '<div class="chat-dia">'+esc(dia)+'</div>'; diaAnt=dia; }
      var meu = m.autor==='cliente';
      h += '<div class="cmsg '+(meu?'meu':'deles')+'">'+
        (!meu && m.autor_nome ? '<span class="autor">'+esc(m.autor_nome)+' · CBC</span>' : '')+
        esc(m.corpo)+
        '<span class="hora">'+chatHoraFmt(m.criada_em)+'</span>'+
      '</div>';
    });
    return h;
  }
  function chatPintaLista(){
    var el = $('chat-lista'); if(!el) return;
    el.innerHTML = chatMsgsHtml();
    el.scrollTop = el.scrollHeight;
  }
  function chatBadge(n){
    var b = $('badge-chat'); if(!b) return;
    if(n>0 && state.aba!=='chat'){ b.textContent = n>9?'9+':n; b.hidden=false; } else { b.hidden=true; }
  }
  function chatBusca(){
    if(document.visibilityState==='hidden') return Promise.resolve();
    return fetch('/.netlify/functions/portal-chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ t: token, op:'listar', apos: chat.lastId })
    }).then(function(r){ return r.json(); }).then(function(d){
      if(!d.ok) return;
      chat.carregado = true;
      var novas = d.mensagens||[];
      if(novas.length){
        novas.forEach(function(m){ chat.msgs.push(m); if(m.id>chat.lastId) chat.lastId=m.id; });
        if(state.aba==='chat') chatPintaLista();
      } else if(state.aba==='chat' && $('chat-lista') && $('chat-lista').querySelector('.chat-vazio')===null && !chat.msgs.length){
        chatPintaLista();
      }
      chatBadge(0); // abrir/pollar a conversa marca como lida no servidor
    }).catch(function(){ /* silencioso: tenta no próximo ciclo */ });
  }
  function chatEntra(){
    chatBusca().then(function(){ if(state.aba==='chat') chatPintaLista(); });
    if(chat.timer) clearInterval(chat.timer);
    chat.timer = setInterval(function(){ if(state.aba==='chat') chatBusca(); }, CHAT_POLL_MS);
  }
  function chatSai(){ if(chat.timer){ clearInterval(chat.timer); chat.timer=null; } }
  function chatEnvia(){
    var ta = $('chat-texto'), btn = $('chat-envia');
    var txt = (ta && ta.value || '').trim();
    if(txt.length < 1) return;
    if(txt.length > 4000){ toast('Mensagem muito longa — divida em partes'); return; }
    if(chat.enviando) return;
    chat.enviando = true; if(btn) btn.disabled = true;
    fetch('/.netlify/functions/portal-chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ t: token, op:'enviar', corpo: txt })
    }).then(function(r){ return r.json(); }).then(function(d){
      if(d.ok){
        chat.msgs.push({ id: d.id, autor:'cliente', corpo: txt, criada_em: d.criada_em || new Date().toISOString() });
        if(d.id > chat.lastId) chat.lastId = d.id;
        if(ta) ta.value='';
        chatPintaLista();
      } else if(d.erro==='token'){
        toast('Seu acesso expirou — peça um novo link ao escritório');
      } else {
        toast(d.msg || 'Não foi possível enviar agora — tente de novo');
      }
    }).catch(function(){ toast('Sem conexão — sua mensagem não foi enviada'); })
    .finally(function(){ chat.enviando=false; if(btn) btn.disabled=false; if(ta) ta.focus(); });
  }

  // ---------- lembrete de parcela no calendário (iOS .ics / Android Google) ----------
  function agendaCalendario(b){
    var d = String(b.vencimento||'').slice(0,10);
    if(!d) return;
    var dt = d.replace(/-/g,'');
    var titulo = 'Parcela CBC Advogados — R$ '+(typeof b.valor==='number'?b.valor.toFixed(2).replace('.',','):b.valor);
    var det = 'Pagamento de honorários CBC Advogados. Boleto e PIX no seu portal: '+location.origin+'/portal?t='+encodeURIComponent(token);
    if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){
      var ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CBC Advogados//Portal//PT\r\nBEGIN:VEVENT\r\n'+
        'UID:cbc-'+dt+'-'+Math.random().toString(36).slice(2)+'\r\nDTSTART;VALUE=DATE:'+dt+'\r\n'+
        'SUMMARY:'+titulo.replace(/,/g,'\\,')+'\r\nDESCRIPTION:'+det.replace(/,/g,'\\,')+'\r\n'+
        'BEGIN:VALARM\r\nTRIGGER:-PT15H\r\nACTION:DISPLAY\r\nDESCRIPTION:'+titulo.replace(/,/g,'\\,')+'\r\nEND:VALARM\r\n'+
        'END:VEVENT\r\nEND:VCALENDAR';
      var blob = new Blob([ics], {type:'text/calendar;charset=utf-8'});
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'parcela-cbc-'+d+'.ics';
      document.body.appendChild(a); a.click(); a.remove();
      toast('Abra o arquivo para salvar no seu Calendário');
    } else {
      window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(titulo)+
        '&dates='+dt+'/'+dt+'&details='+encodeURIComponent(det), '_blank');
    }
  }

  // ---------- extrato de honorários em PDF (gerado no aparelho) ----------
  function carregaJsPDF(){
    return new Promise(function(res, rej){
      if(window.jspdf) return res();
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload=res; s.onerror=function(){rej(new Error('sem conexão'));};
      document.head.appendChild(s);
    });
  }
  function geraExtratoPDF(){

    }).then(function(blob){
      var done=function(logo){
        var doc=new window.jspdf.jsPDF();
        var W=doc.internal.pageSize.getWidth();
        if(logo) doc.addImage(logo,'PNG',W/2-12,12,24,24);
        var y=logo?42:20;
        doc.setFont('times','bold'); doc.setFontSize(16); doc.setTextColor('#142A43');
        doc.text('CBC Advogados',W/2,y,{align:'center'}); y+=6;
        doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor('#7A8CA0');
        doc.text('Conforto, Bergonsi & Cavalari · OAB/SP 55227 · Americana-SP',W/2,y,{align:'center'}); y+=10;
        doc.setDrawColor('#B99249'); doc.line(20,y,W-20,y); y+=10;
        doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor('#142A43');

  var falando=false;
  function ouvirResumo(){
    if(!('speechSynthesis' in window)){ toast('Seu aparelho não suporta leitura em voz'); return; }
    var btn=$('ouvir-resumo');
    if(falando){ speechSynthesis.cancel(); falando=false; if(btn)btn.classList.remove('tocando'); return; }
    var ps=state.dados.processos||[]; var p=ps[Math.min(state.proc,ps.length-1)]; if(!p) return;
    var partes=['Situação do seu caso: tudo caminhando bem.','Fase atual: '+(p.fase||'em andamento')+'.'];
    if(p.atividades&&p.atividades.vez==='tribunal') partes.push('Neste momento aguardamos o tribunal — você não precisa fazer nada.');
    if(p.atividades&&p.atividades.vez==='escritorio') partes.push('Nossa equipe está trabalhando no seu caso agora.');
    if((p.andamentos||[])[0]) partes.push('Última movimentação, em '+dataBR(p.andamentos[0].data)+': '+p.andamentos[0].texto);
    if(p.proximos_passos) partes.push('Próximos passos: '+p.proximos_passos);
    partes.push('Qualquer novidade, este portal e a nossa equipe avisam você.');
    var u=new SpeechSynthesisUtterance(partes.join(' '));
    u.lang='pt-BR'; u.rate=0.96;
    u.onend=function(){ falando=false; if(btn)btn.classList.remove('tocando'); };
    falando=true; if(btn)btn.classList.add('tocando');
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }

  function urlB64ToU8(b64){
    var pad='='.repeat((4-b64.length%4)%4);
    var base=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
    var raw=atob(base); var arr=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
    return arr;
  }

    var s=$('push');
    navigator.serviceWorker.ready.then(function(reg){
      return reg.pushManager.getSubscription();
    }).then(function(sub){
      s.hidden=false; s.classList.add('entra');
      if(sub){
        s.innerHTML='<div style="display:flex;gap:10px;align-items:center"><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--ok)"></span>'+

        }).then(function(reg){

        }).then(function(sub){
          return fetch('/.netlify/functions/portal-push', {

      if(j.calendario_proativo){
        var cp=j.calendario_proativo;
        vhtml += '<div class="recesso entra"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="1.8" style="flex:0 0 auto;margin-top:2px" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path stroke-linecap="round" d="M3 9h18M8 3v3m8-3v3"/></svg><span>'+
          (cp.recesso
            ? 'A partir de <b>'+dataBR(cp.em)+'</b> começa o recesso do Judiciário (prazos suspensos até 20/01). É normal não haver movimentação nesse período — e o seu caso segue monitorado.'
            : 'No dia <b>'+dataBR(cp.em)+'</b> o fórum não funciona (<b>'+esc(cp.nome)+'</b>). É normal não haver movimentação por perto dessa data; tudo retoma no dia útil seguinte.')+
          '</span></div>';
      }
      $('vigia-box').innerHTML = vhtml;

      // autoridade por números reais do escritório
      var inst = j.instituicao;
      if(inst){
        $('autoridade').innerHTML = 'Acompanhamos <b>'+Number(inst.processos_ativos||0).toLocaleString('pt-BR')+'</b> processos ativos · '+
          '<b>'+Number(inst.tarefas_ano||0).toLocaleString('pt-BR')+'</b> tarefas concluídas em '+(new Date().getFullYear())+' · '+
          '<b>'+Number(inst.casos_exito||0).toLocaleString('pt-BR')+'</b> casos conduzidos até a fase de êxito';
      }
      var pend = (j.pagamentos&&j.pagamentos.resumo&&j.pagamentos.resumo.qtd_pendentes)||0;
      if(pend){ var bd=$('badge-pend'); bd.textContent=pend; bd.hidden=false; }
      if(temAcordo){
        $('nav-acordo').hidden = false;
        document.querySelector('.nav-inner').classList.add('cinco');
        $('nav-proc').lastChild.textContent = ' Caso';
      }
      // badge de mensagens do escritório não lidas (sem marcar como lida)
      fetch('/.netlify/functions/portal-chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ t: token, op:'badge' })
      }).then(function(r){ return r.json(); })
        .then(function(d){ if(d.ok) chatBadge(d.nao_lidas||0); })
        .catch(function(){ /* badge é opcional */ });
      $('nav').hidden = false;
      var dvs=$('divisor-servicos'); if(dvs) dvs.hidden=false;
      montaNps();
      montaIndicar(esc(c.primeiro_nome||'cliente'));
      render();
      track('tab','proc'); // 1ª aba vista na sessão

      // frase de confiança rotativa (rodapé)
      try {
        var doy = Math.floor((Date.now() - Date.UTC(new Date().getFullYear(),0,0)) / 86400000);
        var ff = document.getElementById('frase-fe');
        if(ff) ff.textContent = '“' + FRASES[doy % FRASES.length] + '”';
      } catch(e) { /* opcional */ }

      montaFamilia();
      montaPush();

      // aviso de modo offline (dados da última visita)
      if(offlineEm){
        $('vigia-box').innerHTML = '<div class="recesso entra"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="1.8" style="flex:0 0 auto;margin-top:2px"><path stroke-linecap="round" stroke-linejoin="round" d="M8.5 14.5a5 5 0 0 1 7 0M5.7 11.7a9 9 0 0 1 12.6 0M3 8.9a13 13 0 0 1 18 0M12 18h.01"/></svg>'+
          '<span><b>Você está offline.</b> Mostrando seu portal de '+new Date(offlineEm).toLocaleString('pt-BR')+'. Conecte-se para atualizar.</span></div>' + $('vigia-box').innerHTML;
      }
  }

  fetch('/.netlify/functions/portal-data?t='+encodeURIComponent(token))
    .then(function(r){ return r.json().then(function(j){ return {ok:r.ok, j:j}; }); })
    .then(function(res){
      if(!res.ok || res.j.erro){
        erroEstado('Acesso não encontrado','Este link não está mais ativo');
        return;
      }
      try { localStorage.setItem('cbc_payload', JSON.stringify({ t: token, em: Date.now(), dados: res.j })); } catch(e) { /* cache opcional */ }
      montaTudo(res.j);
    })
    .catch(function(){
      // sem rede: usa a última cópia salva deste mesmo token
      var cache = null;
      try { cache = JSON.parse(localStorage.getItem('cbc_payload')||'null'); } catch(e) { cache = null; }
      if(cache && cache.t === token && cache.dados){ montaTudo(cache.dados, cache.em); }
      else erroEstado('Fora do ar','Não conseguimos carregar agora');
    });
})();
</script>
</body>
</html>
