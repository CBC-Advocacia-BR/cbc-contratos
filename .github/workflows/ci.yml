name: CI

# Roda build + testes + verificacao de sintaxe das functions a cada push/PR.
# BUILD e TESTES sao portao (falha = bloqueia).
# LINT e informativo por enquanto (baseline conhecido de ~55 erros em 06/07/2026;
# em sua maioria react-hooks/static-components cosmeticos). A meta (auditoria #54)
# e "congelar e nao piorar": travar o CI so quando surgir erro NOVO fora do baseline.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build (portão — falha bloqueia)
        run: npm run build

      - name: Testes (portão — falha bloqueia) (bug-9)
        run: npm test

      # (auditoria #92) As ~62 Netlify Functions (dinheiro/contratos/CRM) nao entram
      # no build do Vite nem nos testes. Um `node --check` em cada .mjs pega erro de
      # sintaxe/parse antes de ir a producao, por centavos de custo. Portao (bloqueia).
      - name: Sintaxe das Netlify Functions (portão — node --check)
        run: |
          set -e
          fail=0
          for f in $(find netlify/functions -name '*.mjs'); do
            node --check "$f" || { echo "::error file=$f::Erro de sintaxe em $f"; fail=1; }
          done
          exit $fail

      - name: Lint (informativo até o baseline ser zerado)
        run: npm run lint || echo "::warning::Lint encontrou problemas (baseline conhecido). Não bloqueia o build por enquanto."
